// ─── Revalue Shares Modal ─────────────────────────────────────────────────────
// Increases the share price for all members going forward.
// IMPORTANT: Share COUNTS are never changed — only the unit price changes.
// Each member's share count stays the same; their share VALUE increases proportionally.
function RevalueSharesModal({ close, data, persist, payload }) {
  const currentUser = payload?.currentUser;
  const [newPrice, setNewPrice] = useState("");
  const [reason, setReason] = useState("");
  const [confirm, setConfirm] = useState(false);
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);

  const sc = data.shareCapital || [];
  // Get per-member share counts for preview
  const memberSummary = (data.members || []).map(m => {
    const bought   = sc.filter(e => e.memberId === m.id && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
    const received = sc.filter(e => e.toMemberId === m.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    const sent     = sc.filter(e => e.memberId === m.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    const held = Math.round((bought + received - sent) * 100) / 100;
    return { ...m, held };
  }).filter(m => m.held > 0);

  const newPriceNum = Number(newPrice);
  const isValid = newPriceNum > SHARE_PRICE && !isNaN(newPriceNum) && newPriceNum > 0;

  const handleApply = async () => {
    if (!isValid) return;
    if (!reason.trim()) { alert("Please enter a reason / AGM resolution reference."); return; }
    if (!confirm) { alert("Please tick the confirmation checkbox before applying the revaluation."); return; }
    setBusy(true);
    try {
      const oldPrice = SHARE_PRICE;
      // 1. Update the global variable immediately
      SHARE_PRICE = newPriceNum;
      // 2. Persist to Firebase config so all sessions see the new price
      if (window.__firebase && window.__firebase.setConfig) {
        await window.__firebase.setConfig({
          [SHARE_PRICE_CONFIG_KEY]: newPriceNum,
          [SHARE_PRICE_HISTORY_KEY]: [
            ...((await window.__firebase.getConfig())?.[SHARE_PRICE_HISTORY_KEY] || []),
            {
              date: today(),
              oldPrice,
              newPrice: newPriceNum,
              changedBy: currentUser?.fullName || currentUser?.username || "Admin",
              reason: reason.trim(),
            }
          ]
        });
      }
      // 3. Persist to localStorage fallback
      try { localStorage.setItem("acujus:sharePrice", String(newPriceNum)); } catch(e) {}
      // 4. Log to audit trail
      const auditEntry = {
        date: today(),
        action: "Share Revaluation",
        target: "Share Capital",
        detail: `Share price increased from ${fmt(oldPrice)} to ${fmt(newPriceNum)} per share. Reason: ${reason.trim()}. Member share counts UNCHANGED. Performed by ${currentUser?.fullName || currentUser?.username || "Admin"}.`,
        performedBy: currentUser?.username || "admin",
        timestamp: new Date().toISOString(),
      };
      persist("auditLog", [...(data.auditLog || []), auditEntry]);
      setDone(true);
    } catch(e) {
      alert("Error saving share price: " + (e.message || String(e)));
    }
    setBusy(false);
  };

  if (done) {
    return (
      <ModalShell title="Share Revaluation Complete" close={close} submitLabel="Close" onSubmit={close}>
        <div style={{ textAlign:"center", padding:"20px 0" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#22c55e", marginBottom: 8 }}>Share Price Updated!</div>
          <div style={{ fontSize: 14, color: "#94a3b8", marginBottom: 20 }}>
            New price: <strong style={{ color: "#f8fafc" }}>{fmt(Number(newPrice))}</strong> per share
          </div>
          <div style={{ background: "#0f172a", borderRadius: 8, padding: "14px 18px", marginBottom: 16 }}>
            {memberSummary.map(m => (
              <div key={m.id} style={{ display:"flex", justifyContent:"space-between", borderBottom:"1px solid #1e293b", padding:"6px 0", fontSize: 13 }}>
                <span style={{ color: "#f8fafc" }}>{m.fullName}</span>
                <span>
                  <span style={{ color: "#94a3b8" }}>{Number(m.held).toFixed(2)} shares</span>
                  <span style={{ color: "#22c55e", fontWeight: 700, marginLeft: 10 }}>= {fmt(m.held * Number(newPrice))}</span>
                </span>
              </div>
            ))}
          </div>
          <div style={{ fontSize: 12, color: "#475569" }}>Share counts are unchanged. All existing members retain the same number of shares.</div>
        </div>
      </ModalShell>
    );
  }

  return (
    <ModalShell title="Revalue Shares" close={close} onSubmit={handleApply} submitLabel={busy ? "Applying…" : "Apply Revaluation"}>
      {/* Info banner */}
      <div style={{ background:"#1e1a3f", border:"1px solid #4c1d95", borderRadius:8, padding:"12px 16px", marginBottom:16 }}>
        <div style={{ fontSize:14, fontWeight:700, color:"#a78bfa", marginBottom:4 }}>📋 How Share Revaluation Works</div>
        <div style={{ fontSize:13, color:"#c4b5fd", lineHeight:1.7 }}>
          • Each member's <strong>share count stays the same</strong> — no fractions, no reductions.<br/>
          • The share <strong>unit price increases</strong>, so each share becomes more valuable.<br/>
          • Example: 1 share @ UGX 50,000 → 1 share @ UGX 100,000 (member gains, not loses).<br/>
          • This requires an <strong>AGM resolution</strong> or board approval.
        </div>
      </div>

      {/* Current price */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
        <div style={{ background:"#0f172a", borderRadius:8, padding:"12px 14px" }}>
          <div style={{ fontSize:11, color:"#64748b", textTransform:"uppercase", letterSpacing:1, marginBottom:4 }}>Current Share Price</div>
          <div style={{ fontSize:22, fontWeight:800, color:"#f59e0b" }}>{fmt(SHARE_PRICE)}</div>
        </div>
        <div style={{ background:"#0f172a", borderRadius:8, padding:"12px 14px" }}>
          <div style={{ fontSize:11, color:"#64748b", textTransform:"uppercase", letterSpacing:1, marginBottom:4 }}>New Share Price</div>
          <div style={{ fontSize:22, fontWeight:800, color: isValid ? "#22c55e" : "#475569" }}>
            {newPrice && !isNaN(newPriceNum) ? fmt(newPriceNum) : "—"}
          </div>
        </div>
      </div>

      <Field label="New Share Price (UGX)">
        <input
          type="number"
          style={{ ...styles.input, fontSize:16, fontWeight:700 }}
          value={newPrice}
          onChange={e => { setNewPrice(e.target.value); setConfirm(false); }}
          placeholder={`Must be greater than ${fmt(SHARE_PRICE)}`}
          min={SHARE_PRICE + 1}
        />
        {newPrice && !isNaN(newPriceNum) && newPriceNum <= SHARE_PRICE && (
          <div style={{ fontSize:12, color:"#ef4444", marginTop:4 }}>
            ❌ New price must be higher than current price ({fmt(SHARE_PRICE)})
          </div>
        )}
        {isValid && (
          <div style={{ fontSize:12, color:"#22c55e", marginTop:4 }}>
            ✓ Increase of {fmt(newPriceNum - SHARE_PRICE)} ({(((newPriceNum - SHARE_PRICE) / SHARE_PRICE) * 100).toFixed(1)}%) per share
          </div>
        )}
      </Field>

      <Field label="AGM Resolution / Reason">
        <input
          type="text"
          style={styles.input}
          value={reason}
          onChange={e => setReason(e.target.value)}
          placeholder="e.g. AGM Resolution #2025-04, Board approval May 2025…"
        />
      </Field>

      {/* Member impact preview */}
      {isValid && memberSummary.length > 0 && (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:11, color:"#64748b", textTransform:"uppercase", letterSpacing:1, marginBottom:8, fontWeight:700 }}>MEMBER IMPACT PREVIEW</div>
          <div style={{ background:"#0f172a", borderRadius:8, padding:"10px 14px", maxHeight:180, overflowY:"auto" }}>
            <div style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:8, fontSize:11, color:"#475569", fontWeight:700, borderBottom:"1px solid #1e293b", paddingBottom:6, marginBottom:6 }}>
              <span>Member</span><span>Shares</span><span>New Total Value</span>
            </div>
            {memberSummary.map(m => (
              <div key={m.id} style={{ display:"grid", gridTemplateColumns:"1fr auto auto", gap:8, fontSize:12, padding:"4px 0", borderBottom:"1px solid #1e293b11" }}>
                <span style={{ color:"#f8fafc", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.fullName}</span>
                <span style={{ color:"#94a3b8", textAlign:"right" }}>{Number(m.held).toFixed(2)}</span>
                <span style={{ color:"#22c55e", fontWeight:700, textAlign:"right" }}>{fmt(m.held * newPriceNum)}</span>
              </div>
            ))}
          </div>
          <div style={{ fontSize:11, color:"#475569", marginTop:6, fontStyle:"italic" }}>
            Share counts are not changed — only the price per share increases.
          </div>
        </div>
      )}

      {/* Confirmation checkbox */}
      {isValid && reason.trim() && (
        <div
          onClick={() => setConfirm(c => !c)}
          style={{ background: confirm ? "#052e16" : "#1e293b", border:`1px solid ${confirm ? "#16a34a" : "#334155"}`, borderRadius:8, padding:"12px 14px", cursor:"pointer", display:"flex", alignItems:"flex-start", gap:10, marginBottom:4 }}
        >
          <div style={{ width:18, height:18, borderRadius:4, border:`2px solid ${confirm ? "#22c55e" : "#475569"}`, background: confirm ? "#22c55e" : "transparent", flexShrink:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, color:"#fff", marginTop:1 }}>
            {confirm ? "✓" : ""}
          </div>
          <span style={{ fontSize:13, color: confirm ? "#86efac" : "#94a3b8", lineHeight:1.5 }}>
            I confirm this revaluation has been approved by the AGM/Board. Share counts will remain unchanged — only the unit price will increase from <strong style={{color:"#f59e0b"}}>{fmt(SHARE_PRICE)}</strong> to <strong style={{color:"#22c55e"}}>{fmt(newPriceNum)}</strong>.
          </span>
        </div>
      )}
    </ModalShell>
  );
}

// ─── Adjust Share Capacity Modal (Admin-only) ────────────────────────────────
function AdjustShareCapacityModal({ close, data, persist, payload }) {
  const currentUser = payload?.currentUser;
  const sc = data.shareCapital || [];
  const totalSharesSold = sc.filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
  const currentMax = COMPANY_MAX_SHARES;
  const sharesRemaining = currentMax - totalSharesSold;

  const [newMax, setNewMax] = useState("");
  const [agmRef, setAgmRef] = useState("");
  const [confirm, setConfirm] = useState(false);
  const [busy, setBusy] = useState(false);
  const [done, setDone] = useState(false);

  const newMaxNum = parseInt(newMax, 10);
  const isValid = !isNaN(newMaxNum) && newMaxNum > currentMax && newMaxNum >= Math.ceil(totalSharesSold);

  const handleApply = async () => {
    if (!isValid) return;
    if (!agmRef.trim()) { alert("Please enter an AGM resolution reference."); return; }
    if (!confirm) { alert("Please tick the confirmation checkbox before applying the change."); return; }
    setBusy(true);
    try {
      const oldMax = COMPANY_MAX_SHARES;
      // 1. Update global variable immediately
      COMPANY_MAX_SHARES = newMaxNum;
      // 2. Persist to Firebase config
      if (window.__firebase && window.__firebase.setConfig) {
        const existingHistory = (await window.__firebase.getConfig())?.[MAX_SHARES_HISTORY_KEY] || [];
        await window.__firebase.setConfig({
          [MAX_SHARES_CONFIG_KEY]: newMaxNum,
          [MAX_SHARES_HISTORY_KEY]: [
            ...existingHistory,
            {
              date: today(),
              oldMax,
              newMax: newMaxNum,
              changedBy: currentUser?.fullName || currentUser?.username || "Admin",
              agmRef: agmRef.trim(),
            }
          ]
        });
      }
      // 3. Persist to localStorage fallback
      try { localStorage.setItem("acujus:maxShares", String(newMaxNum)); } catch(e) {}
      // 4. Log to audit trail
      const auditEntry = {
        id: "AL" + Date.now() + Math.random().toString(36).slice(2, 6).toUpperCase(),
        ts: new Date().toISOString(),
        date: today(),
        action: "Share Capacity Adjusted",
        collection: "shareCapital",
        target: "Share Capacity",
        detail: `Maximum shares increased from ${oldMax} to ${newMaxNum}. AGM Resolution: ${agmRef.trim()}. Performed by ${currentUser?.fullName || currentUser?.username || "Admin"}.`,
        userId: currentUser?.id || "?",
        userName: currentUser?.fullName || currentUser?.username || "Admin",
        userRole: currentUser?.role || "Admin",
        performedBy: currentUser?.username || "admin",
        timestamp: new Date().toISOString(),
      };
      persist("auditLog", [auditEntry, ...(data.auditLog || [])].slice(0, 2000), false);
      setDone(true);
    } catch(e) {
      alert("Error saving share capacity: " + (e.message || String(e)));
    }
    setBusy(false);
  };

  if (done) {
    return (
      <ModalShell title="Share Capacity Updated" close={close} submitLabel="Close" onSubmit={close}>
        <div style={{ textAlign: "center", padding: "20px 0" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#22c55e", marginBottom: 8 }}>Capacity Increased!</div>
          <div style={{ fontSize: 14, color: "#94a3b8", marginBottom: 20 }}>
            New maximum: <strong style={{ color: "#f8fafc" }}>{Number(newMax).toLocaleString()}</strong> shares
          </div>
          <div style={{ background: "#0f172a", borderRadius: 8, padding: "14px 18px", fontSize: 13 }}>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #1e293b" }}>
              <span style={{ color: "#94a3b8" }}>Shares sold</span>
              <span style={{ color: "#f8fafc", fontWeight: 700 }}>{totalSharesSold.toFixed(2)}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: "1px solid #1e293b" }}>
              <span style={{ color: "#94a3b8" }}>New capacity</span>
              <span style={{ color: "#f8fafc", fontWeight: 700 }}>{Number(newMax).toLocaleString()}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "5px 0" }}>
              <span style={{ color: "#94a3b8" }}>Shares remaining</span>
              <span style={{ color: "#22c55e", fontWeight: 700 }}>{(Number(newMax) - totalSharesSold).toFixed(2)}</span>
            </div>
          </div>
          <div style={{ fontSize: 11, color: "#475569", marginTop: 12 }}>
            AGM Reference: {agmRef}
          </div>
        </div>
      </ModalShell>
    );
  }

  return (
    <ModalShell title="Adjust Share Capacity" close={close} onSubmit={handleApply} submitLabel={busy ? "Applying…" : "Apply Increase"}>
      {/* Info banner */}
      <div style={{ background: "#0c2010", border: "1px solid #166534", borderRadius: 8, padding: "12px 16px", marginBottom: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: "#4ade80", marginBottom: 4 }}>📋 How Share Capacity Adjustment Works</div>
        <div style={{ fontSize: 13, color: "#86efac", lineHeight: 1.7 }}>
          • Maximum shares can only be <strong>increased</strong>, never reduced below currently issued shares.<br/>
          • An <strong>AGM resolution reference</strong> is required for every change.<br/>
          • All changes are permanently logged in the audit trail.<br/>
          • New capacity takes effect immediately across all sessions.
        </div>
      </div>

      {/* Current status */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {[
          { label: "Current Max", val: currentMax.toLocaleString(), color: "#94a3b8" },
          { label: "Shares Sold", val: totalSharesSold.toFixed(2), color: "#f59e0b" },
          { label: "Remaining", val: sharesRemaining.toFixed(2), color: sharesRemaining > 0 ? "#22c55e" : "#ef4444" },
        ].map(({ label, val, color }) => (
          <div key={label} style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 7, padding: "10px 12px", textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color }}>{val}</div>
            <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", marginTop: 2 }}>{label}</div>
          </div>
        ))}
      </div>

      {/* New max shares input */}
      <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 4 }}>New Maximum Shares *</label>
      <input
        type="number"
        min={currentMax + 1}
        value={newMax}
        onChange={e => setNewMax(e.target.value)}
        placeholder={`Must be greater than ${currentMax}`}
        style={{ ...styles.input, width: "100%", marginBottom: 4 }}
      />
      {newMax && !isNaN(newMaxNum) && newMaxNum <= currentMax && (
        <div style={{ fontSize: 11, color: "#ef4444", marginBottom: 8 }}>
          ⚠ New capacity must exceed the current maximum of {currentMax.toLocaleString()}.
        </div>
      )}
      {newMax && !isNaN(newMaxNum) && newMaxNum > currentMax && newMaxNum < Math.ceil(totalSharesSold) && (
        <div style={{ fontSize: 11, color: "#ef4444", marginBottom: 8 }}>
          ⚠ Cannot be lower than shares already issued ({Math.ceil(totalSharesSold)}).
        </div>
      )}
      {isValid && (
        <div style={{ fontSize: 11, color: "#22c55e", marginBottom: 8 }}>
          ✓ {(newMaxNum - totalSharesSold).toFixed(2)} shares will be available after this change.
        </div>
      )}

      {/* AGM Reference */}
      <label style={{ fontSize: 12, color: "#94a3b8", display: "block", marginBottom: 4, marginTop: 8 }}>AGM Resolution Reference *</label>
      <input
        type="text"
        value={agmRef}
        onChange={e => setAgmRef(e.target.value)}
        placeholder="e.g. AGM/2025/RES-04 or Board Minute Ref"
        style={{ ...styles.input, width: "100%", marginBottom: 12 }}
      />

      {/* Confirmation */}
      <label style={{ display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer", fontSize: 13, color: "#94a3b8", marginBottom: 8 }}>
        <input type="checkbox" checked={confirm} onChange={e => setConfirm(e.target.checked)} style={{ marginTop: 2, flexShrink: 0 }} />
        <span>I confirm this change is backed by a valid AGM resolution or board approval and has been duly recorded in the company minutes.</span>
      </label>
    </ModalShell>
  );
}

// ─── Share Capital Ledger ─────────────────────────────────────────────────────
function ShareCapital({ data, persist, setModal, kpi, currentUser }) {
  const sc = data.shareCapital || [];
  const totalCapital = sc.filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.amountPaid || 0), 0);
  const totalSharesSold = sc.filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
  const remaining = COMPANY_MAX_SHARES - kpi.totalShares;

  // Per-member share summary
  const memberSummary = data.members.map(m => {
    const bought    = sc.filter(e => e.memberId === m.id && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
    const received  = sc.filter(e => e.toMemberId === m.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    const sent      = sc.filter(e => e.memberId === m.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    const held      = Math.round((bought + received - sent) * 100) / 100;
    const paid      = sc.filter(e => e.memberId === m.id && e.type === "Purchase").reduce((s, e) => s + Number(e.amountPaid || 0), 0);
    return { ...m, held, paid };
  }).filter(m => m.held > 0 || m.paid > 0);

  const typeLabel = (t) => t === "Purchase" ? { bg:"#dcfce7", col:"#16a34a", lbl:"Purchase" } : { bg:"#dbeafe", col:"#1d4ed8", lbl:"Transfer" };
  const { q: scQ, setQ: setScQ, filtered: filteredSc } = useSearch([...sc].reverse(), ["memberName", "memberId", "type", "receiptNo", "recordedBy", "toMemberName"]);

  return (
    <div>
      {/* KPI cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(140px, 1fr))", gap:10, marginBottom:14 }}>
        <div style={{ ...styles.card, borderLeft:"4px solid #a855f7" }}><div style={{ ...styles.cardVal, color:"#a855f7" }}>{fmt(totalCapital)}</div><div style={styles.cardLabel}>Total Share Capital</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #f59e0b" }}><div style={{ ...styles.cardVal, color:"#f59e0b" }}>{Number(kpi.totalShares).toFixed(2)}</div><div style={styles.cardLabel}>Shares Held</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #3b82f6" }}><div style={{ ...styles.cardVal, color:"#3b82f6" }}>{remaining}</div><div style={styles.cardLabel}>Shares Available</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #22c55e" }}><div style={{ ...styles.cardVal, color:"#22c55e" }}>{fmt(SHARE_PRICE)}</div><div style={styles.cardLabel}>Price Per Share</div></div>
      </div>

      {/* Share capacity bar */}
      <div style={{ ...styles.panel, marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
          <span style={{ fontSize:12, color:"#94a3b8", fontWeight:700 }}>SHARE CAPACITY</span>
          <span style={{ fontSize:12, color:"#94a3b8" }}>{Number(kpi.totalShares).toFixed(2)} / {COMPANY_MAX_SHARES} shares issued</span>
        </div>
        <div style={{ background:"#1e293b", borderRadius:999, height:10, overflow:"hidden" }}>
          <div style={{ width:`${Math.min(100, kpi.totalShares / COMPANY_MAX_SHARES * 100)}%`, background: kpi.totalShares >= COMPANY_MAX_SHARES ? "#ef4444" : "#a855f7", height:"100%", borderRadius:999, transition:"width 0.4s" }} />
        </div>
        {remaining === 0 && <div style={{ fontSize:12, color:"#ef4444", marginTop:6 }}>⚠ Maximum share capacity reached. No new shares can be issued.</div>}
      </div>

      {/* Share Price History Panel */}
      <SharePriceHistoryPanel />

      {/* Member shareholding summary */}
      <div style={{ ...styles.panel, marginBottom:14 }}>
        <div style={styles.panelTitle}>MEMBER SHAREHOLDING SUMMARY</div>
        <ResizableTableWrap headers={["Member","Shares Held","Share Value","Amount Paid","% Ownership"]} defaultWidth={140}>
          <tbody>
            {memberSummary.length === 0 && <tr><td colSpan={5} style={styles.empty}>No share purchases recorded yet</td></tr>}
            {memberSummary.map(m => (
              <tr key={m.id} style={styles.tr}>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}><strong>{m.fullName}</strong> <span style={{ color:"#475569" }}>({m.id})</span></td>
                <td style={styles.td}>{Number(m.held).toFixed(2)}</td>
                <td style={styles.td}>{fmt(m.held * SHARE_PRICE)}</td>
                <td style={styles.td}>{fmt(m.paid)}</td>
                <td style={styles.td}>{kpi.totalShares > 0 ? (m.held / kpi.totalShares * 100).toFixed(2) : "0.00"}%</td>
              </tr>
            ))}
          </tbody>
        </ResizableTableWrap>
      </div>

      {/* Transaction ledger */}
      <div style={{ ...styles.toolbar, flexWrap:"wrap" }}>
        <SearchBar q={scQ} setQ={setScQ} placeholder="Search by member, type, receipt…" count={filteredSc.length} total={sc.length} />
        <span style={{ ...styles.count, flexShrink: 0 }}>{sc.length} Transaction{sc.length !== 1 ? "s" : ""}</span>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          <button style={{ ...styles.btnPrimary, padding:"6px 10px", fontSize:11 }} onClick={() => setModal({ type: "addSharePurchase" })}>+ Purchase</button>
          <button style={{ ...styles.btnPrimary, background:"#1d4ed8", padding:"6px 10px", fontSize:11 }} onClick={() => setModal({ type: "addShareTransfer" })}>⇄ Transfer</button>
          {(currentUser?.role === "Admin" || currentUser?.role === "Manager" || currentUser?.role === "Treasurer") && (
            <button style={{ ...styles.btnPrimary, background:"#0f766e", padding:"6px 10px", fontSize:11 }} onClick={() => setModal({ type: "exchangeSavingsShares" })}>⇌ Exchange</button>
          )}
          {currentUser?.role === "Admin" && (
            <button style={{ ...styles.btnPrimary, background:"#7c3aed", padding:"6px 10px", fontSize:11 }} onClick={() => setModal({ type: "revalueShares", payload: { currentUser } })}>↑ Revalue Shares</button>
          )}
          {currentUser?.role === "Admin" && (
            <button style={{ ...styles.btnPrimary, background:"#065f46", border:"1px solid #059669", padding:"6px 10px", fontSize:11 }} onClick={() => setModal({ type: "adjustShareCapacity", payload: { currentUser } })}>⬆ Adjust Capacity</button>
          )}
        </div>
      </div>
      <ResizableTableWrap headers={["Date","Type","Member","Shares","Amount Paid","Price/Share","To Member","Receipt No.","Recorded By","Actions"]}>
        <tbody>
          {filteredSc.length === 0 && <tr><td colSpan={10} style={styles.empty}>{scQ ? "No transactions match your search" : "No share transactions yet — record the first purchase above"}</td></tr>}
          {filteredSc.map((e, i) => {
            const tl = typeLabel(e.type);
            const realIdx = sc.indexOf(e);
            return (
              <tr key={i} style={styles.tr}>
                <td style={{ ...styles.td, whiteSpace:"nowrap" }}>{e.date}</td>
                <td style={styles.td}><span style={{ ...styles.badge, background:tl.bg, color:tl.col }}>{tl.lbl}</span></td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}><strong>{e.memberName}</strong></td>
                <td style={styles.td}>{Number(e.shares).toFixed(2)}</td>
                <td style={styles.td}>{e.amountPaid ? fmt(e.amountPaid) : "-"}</td>
                <td style={styles.td}>{e.amountPaid ? fmt(Math.round(Number(e.amountPaid) / Number(e.shares))) : "-"}</td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.toMemberName || "-"}</td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.receiptNo || "-"}</td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.recordedBy || "-"}</td>
                <td style={{ ...styles.td, whiteSpace:"nowrap" }}>
                  <button style={styles.btnSm} onClick={() => setModal({ type: "editShareEntry", payload: { entry: e, index: realIdx } })}>Edit</button>
                  <button style={{ ...styles.btnSm, background:"#7f1d1d", color:"#fca5a5", marginLeft:4 }} onClick={() => {
                    if (window.confirm(`Delete this ${e.type} entry for ${e.memberName} (${Number(e.shares).toFixed(2)} shares)? This cannot be undone.`)) {
                      const updated = sc.filter((_, idx) => idx !== realIdx);
                      persist("shareCapital", updated);
                    }
                  }}>Delete</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </ResizableTableWrap>
    </div>
  );
}

// ─── Share Purchase Modal ─────────────────────────────────────────────────────
function SharePurchaseModal({ close, data, persist }) {
  // inputMode: "amount" = enter money → auto-calc shares; "shares" = enter shares → auto-calc amount
  const [inputMode, setInputMode] = useState("amount");
  const [f, setF] = useState({ date: today(), memberId: "", memberName: "", shares: "", amountPaid: "", receiptNo: "", recordedBy: "" });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const pickMember = (id) => {
    const m = data.members.find(m => m.id === id);
    setF(p => ({ ...p, memberId: id, memberName: m ? m.fullName : "" }));
  };
  const sc = data.shareCapital || [];
  // Total issued shares = sum of all Purchase entries (transfers net to 0 for company total)
  const totalShares = sc.filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
  const remaining = COMPANY_MAX_SHARES - totalShares;

  // Auto-derive the other field
  const derivedShares = inputMode === "amount" && f.amountPaid
    ? (Number(f.amountPaid) / SHARE_PRICE)
    : Number(f.shares || 0);
  const derivedAmount = inputMode === "shares" && f.shares
    ? Number(f.shares) * SHARE_PRICE
    : Number(f.amountPaid || 0);

  const displayShares = inputMode === "amount"
    ? (f.amountPaid ? (Number(f.amountPaid) / SHARE_PRICE).toFixed(2) : "")
    : f.shares;
  const displayAmount = inputMode === "shares"
    ? (f.shares ? (Number(f.shares) * SHARE_PRICE).toFixed(0) : "")
    : f.amountPaid;

  const submit = () => {
    const finalShares = inputMode === "amount"
      ? (Number(f.amountPaid) / SHARE_PRICE)
      : Number(f.shares);
    const finalAmount = inputMode === "shares"
      ? Number(f.shares) * SHARE_PRICE
      : Number(f.amountPaid);
    if (!f.memberId) return alert("Member is required");
    if (!finalShares || finalShares <= 0) return alert("Amount/shares must be greater than zero");
    if (finalShares > remaining) return alert(`Only ${remaining} share(s) remaining. Cannot issue ${finalShares.toFixed(2)}.`);
    if (!f.recordedBy) return alert("Recorded By is required");
    const entry = { ...f, type: "Purchase", shares: finalShares, amountPaid: finalAmount };
    persist("shareCapital", [...sc, entry]);
    close();
  };

  return (
    <ModalShell title="Record Share Purchase" close={close} onSubmit={submit}>
      <div style={{ background:"#0f172a", border:"1px solid #312e81", borderRadius:6, padding:"10px 14px", fontSize:13, color:"#a5b4fc", marginBottom:10 }}>
        Share price: <strong style={{ color:"#f8fafc" }}>{fmt(SHARE_PRICE)}</strong> per share &nbsp;·&nbsp; Available: <strong style={{ color: remaining > 0 ? "#22c55e" : "#ef4444" }}>{remaining} shares</strong>
      </div>
      {/* Input mode toggle */}
      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
        <button onClick={() => setInputMode("amount")} style={{ flex:1, padding:"8px", borderRadius:6, border:"none", cursor:"pointer", fontWeight:700, fontSize:13, background: inputMode === "amount" ? "#3b82f6" : "#1e293b", color: inputMode === "amount" ? "#fff" : "#94a3b8" }}>
          Enter Amount → Auto Shares
        </button>
        <button onClick={() => setInputMode("shares")} style={{ flex:1, padding:"8px", borderRadius:6, border:"none", cursor:"pointer", fontWeight:700, fontSize:13, background: inputMode === "shares" ? "#3b82f6" : "#1e293b", color: inputMode === "shares" ? "#fff" : "#94a3b8" }}>
          Enter Shares → Auto Amount
        </button>
      </div>
      <Field label="Date"><input type="date" style={styles.input} value={f.date} onChange={e => set("date", e.target.value)} /></Field>
      <Field label="Member">
        <select style={styles.input} value={f.memberId} onChange={e => pickMember(e.target.value)}>
          <option value="">Select member...</option>
          {data.members.map(m => <option key={m.id} value={m.id}>{m.id} – {m.fullName}</option>)}
        </select>
      </Field>
      {inputMode === "amount" ? (
        <Field label="Amount Paid (UGX)">
          <input type="number" style={styles.input} value={f.amountPaid} onChange={e => set("amountPaid", e.target.value)} placeholder="Enter amount paid" />
        </Field>
      ) : (
        <Field label="Number of Shares (decimals allowed)">
          <input type="number" style={styles.input} value={f.shares} step="0.0001" min="0.0001" onChange={e => set("shares", e.target.value)} placeholder={`Max ${remaining} (decimals allowed)`} />
        </Field>
      )}
      {(derivedShares > 0 || derivedAmount > 0) && (
        <div style={styles.computedBox}>
          <div style={{ fontSize:11, color:"#64748b", fontWeight:700, letterSpacing:1, textTransform:"uppercase", marginBottom:6 }}>AUTO CALCULATION</div>
          {inputMode === "amount" ? (
            <>
              <Row label="Amount Paid" val={fmt(f.amountPaid)} />
              <Row label="Price Per Share" val={fmt(SHARE_PRICE)} />
              <div style={{ borderTop:"1px solid #334155", margin:"6px 0" }} />
              <Row label="Shares Allocated" val={(Number(f.amountPaid) / SHARE_PRICE).toFixed(2) + " shares"} bold color="#a855f7" />
            </>
          ) : (
            <>
              <Row label="Shares" val={Number(f.shares).toFixed(2)} />
              <Row label="Price Per Share" val={fmt(SHARE_PRICE)} />
              <div style={{ borderTop:"1px solid #334155", margin:"6px 0" }} />
              <Row label="Amount Payable" val={fmt(Number(f.shares) * SHARE_PRICE)} bold color="#a855f7" />
            </>
          )}
        </div>
      )}
      <Field label="Receipt No. (optional)"><input style={styles.input} value={f.receiptNo} onChange={e => set("receiptNo", e.target.value)} placeholder="e.g. RCT-0001" /></Field>
      <Field label="Recorded By"><input style={styles.input} value={f.recordedBy} onChange={e => set("recordedBy", e.target.value)} placeholder="Officer name" /></Field>
    </ModalShell>
  );
}

// ─── Share Transfer Modal ─────────────────────────────────────────────────────
function ShareTransferModal({ close, data, persist }) {
  const [f, setF] = useState({ date: today(), memberId: "", memberName: "", toMemberId: "", toMemberName: "", shares: "", note: "", recordedBy: "" });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));
  const sc = data.shareCapital || [];

  const pickFrom = (id) => {
    const m = data.members.find(m => m.id === id);
    setF(p => ({ ...p, memberId: id, memberName: m ? m.fullName : "", toMemberId: p.toMemberId === id ? "" : p.toMemberId, toMemberName: p.toMemberId === id ? "" : p.toMemberName }));
  };
  const pickTo = (id) => {
    const m = data.members.find(m => m.id === id);
    setF(p => ({ ...p, toMemberId: id, toMemberName: m ? m.fullName : "" }));
  };

  const fromShares = (() => {
    if (!f.memberId) return 0;
    const bought   = sc.filter(e => e.memberId === f.memberId && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
    const received = sc.filter(e => e.toMemberId === f.memberId && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    const sent     = sc.filter(e => e.memberId === f.memberId && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    return bought + received - sent;
  })();

  // Savings balances
  const savingsBalance = (memberId) => {
    if (!memberId) return 0;
    const deposits    = data.savings.filter(s => s.memberId === memberId).reduce((a, s) => a + Number(s.amount || 0), 0);
    const withdrawals = (data.withdrawals || []).filter(w => w.memberId === memberId).reduce((a, w) => a + Number(w.amount || 0) + Number(w.charge || 0), 0);
    return deposits - withdrawals;
  };

  const TRANSFER_CHARGE_RATE = 0.10; // 10%
  const COMPANY_ACCOUNT_ID   = "ACJ-2024-0000";

  const transferShares  = Number(f.shares) || 0;
  const transferValue   = transferShares * SHARE_PRICE;
  const transferCharge  = Math.round(transferValue * TRANSFER_CHARGE_RATE);
  const senderNetCredit = transferValue - transferCharge;
  const senderSavings   = savingsBalance(f.memberId);
  const receiverSavings = savingsBalance(f.toMemberId);

  const submit = () => {
    if (!f.memberId || !f.toMemberId) return alert("Both From and To members are required");
    if (f.memberId === f.toMemberId)  return alert("Cannot transfer to the same member");
    if (!f.shares || transferShares <= 0) return alert("Number of shares must be greater than zero");
    if (transferShares > fromShares)  return alert(`${f.memberName} only holds ${fromShares.toFixed(2)} share(s). Cannot transfer ${transferShares}.`);
    if (receiverSavings < transferValue) return alert(`${f.toMemberName}'s savings balance (${fmt(receiverSavings)}) is less than the share value (${fmt(transferValue)}). Insufficient funds to complete transfer.`);
    if (!f.recordedBy) return alert("Recorded By is required");

    const refId = "TRF-" + Date.now();
    const month = new Date(f.date).toLocaleString("default", { month: "long" });
    const year  = new Date(f.date).getFullYear();

    // 1. Record share transfer entry in share capital ledger
    const shareEntry = { ...f, type: "Transfer", shares: transferShares, amountPaid: transferValue };

    // 2. Deduct full transferValue from receiver's (buyer's) savings
    const receiverDeduction = {
      id: refId + "-RD",
      date: f.date, memberId: f.toMemberId, memberName: f.toMemberName,
      amount: -Math.abs(transferValue), month, year,
      note: `Share transfer payment — ${transferShares.toFixed(2)} shares purchased from ${f.memberName} @ ${fmt(SHARE_PRICE)}/share. Ref: ${refId}`,
      recordedBy: f.recordedBy, type: "ShareTransfer",
    };

    // 3. Credit net amount (90%) to sender's savings after 10% charge
    const senderCredit = {
      id: refId + "-SC",
      date: f.date, memberId: f.memberId, memberName: f.memberName,
      amount: Math.abs(senderNetCredit), month, year,
      note: `Share sale proceeds — ${transferShares.toFixed(2)} shares sold to ${f.toMemberName}. Gross: ${fmt(transferValue)}, less 10% charge (${fmt(transferCharge)}). Net: ${fmt(senderNetCredit)}. Ref: ${refId}`,
      recordedBy: f.recordedBy, type: "ShareTransfer",
    };

    // 4. Post 10% charge to company account ACJ-2024-0000 savings
    const companyMember = data.members.find(m => m.id === COMPANY_ACCOUNT_ID);
    const companyCharge = {
      id: refId + "-CC",
      date: f.date,
      memberId: COMPANY_ACCOUNT_ID,
      memberName: companyMember ? companyMember.fullName : "ACUJUS Investment Company",
      amount: Math.abs(transferCharge), month, year,
      note: `10% share transfer charge — ${f.memberName} sold ${transferShares.toFixed(2)} shares to ${f.toMemberName}. Ref: ${refId}`,
      recordedBy: f.recordedBy, type: "ShareTransferCharge",
    };

    persist("shareCapital", [...sc, shareEntry]);
    persist("savings", [...data.savings, receiverDeduction, senderCredit, companyCharge]);
    close();
  };

  return (
    <ModalShell title="⇄ Transfer Shares" close={close} onSubmit={submit} submitLabel="Confirm Transfer">
      <div style={{ background:"#0f172a", border:"1px solid #1e3a5f", borderRadius:6, padding:"10px 14px", fontSize:13, color:"#93c5fd", marginBottom:10 }}>
        ⇄ Transfers shares between two members. The receiver's savings are <strong style={{color:"#fca5a5"}}>debited the full share value</strong>. The seller receives <strong style={{color:"#86efac"}}>90% credited to savings</strong> — a <strong style={{color:"#f59e0b"}}>10% charge</strong> is automatically posted to the company account.
      </div>

      {f.memberId && (
        <div style={{ ...styles.computedBox, marginBottom:10 }}>

      <Field label="To Member — Buying (Receiving)">
        <select style={styles.input} value={f.toMemberId} onChange={e => pickTo(e.target.value)}>

          {data.members.filter(m => m.id !== f.memberId).map(m => <option key={m.id} value={m.id}>{m.id} – {m.fullName}</option>)}
        </select>
      </Field>
      {f.toMemberId && (
        <div style={{ ...styles.computedBox, marginBottom:10 }}>

          <Row label={`${f.memberName} receives (net)`} val={fmt(senderNetCredit)} color="#86efac" bold />
          <Row label="Posted to Company (ACJ-2024-0000)" val={fmt(transferCharge)} color="#f59e0b" />

    </ModalShell>
  );
}

// ─── Edit Share Entry Modal ───────────────────────────────────────────────────
function EditShareEntryModal({ close, data, persist, payload }) {
  const { entry, index } = payload;
  const isPurchase = entry.type === "Purchase";

  // For purchases: allow editing amount/shares, date, receiptNo, recordedBy
  // For transfers: allow editing date, shares, note, recordedBy
  const [f, setF] = useState({ ...entry });
  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const sc = data.shareCapital || [];

  // Shares available in company excluding this entry (for purchase cap check)
  const otherPurchasedShares = sc
    .filter((e, i) => e.type === "Purchase" && i !== index)
    .reduce((s, e) => s + Number(e.shares || 0), 0);
  const remaining = COMPANY_MAX_SHARES - otherPurchasedShares;

  // For transfers: shares available from the sender excluding THIS entry
  const fromSharesExcluding = (() => {
    if (!isPurchase) {
      const bought   = sc.filter((e, i) => e.memberId === f.memberId && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
      const received = sc.filter((e, i) => e.toMemberId === f.memberId && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
      const sent     = sc.filter((e, i) => i !== index && e.memberId === f.memberId && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
      return bought + received - sent;
    }
    return 0;
  })();

  const submit = () => {
    const shares = Number(f.shares);
    if (!shares || shares <= 0) return alert("Shares must be greater than zero");
    if (isPurchase) {
      if (shares > remaining) return alert(`Only ${remaining} share(s) available (excluding this entry). Cannot set ${shares}.`);
      if (!f.amountPaid || Number(f.amountPaid) <= 0) return alert("Amount Paid is required");
    } else {
      if (shares > fromSharesExcluding) return alert(`${f.memberName} only has ${fromSharesExcluding} shares available. Cannot transfer ${shares}.`);
    }
    if (!f.recordedBy) return alert("Recorded By is required");
    const updated = [...sc];
    updated[index] = { ...f, shares };
    persist("shareCapital", updated);
    close();
  };

  const deleteEntry = () => {
    if (window.confirm(`Permanently delete this ${isPurchase ? "purchase" : "transfer"} entry for ${entry.memberName} (${Number(entry.shares).toFixed(2)} shares)?\n\nThis will affect all share totals, KPIs, and dividends. This cannot be undone.`)) {
      const updated = sc.filter((_, i) => i !== index);
      persist("shareCapital", updated);
      close();
    }
  };

  return (
    <ModalShell title={`Edit ${isPurchase ? "Share Purchase" : "Share Transfer"}`} close={close} onSubmit={submit} submitLabel="Save Changes">
      <div style={{ background:"#0f172a", border:"1px solid #f59e0b", borderRadius:6, padding:"10px 14px", fontSize:13, color:"#fcd34d", marginBottom:10 }}>
        ✏ You are editing an existing {isPurchase ? "purchase" : "transfer"} entry. Changes will affect all derived calculations (shares held, KPIs, dividends).
      </div>
      <div style={{ marginBottom:12 }}>
        <button onClick={deleteEntry} style={{ width:"100%", padding:"9px 14px", background:"#7f1d1d", color:"#fca5a5", border:"1px solid #ef4444", borderRadius:6, cursor:"pointer", fontSize:13, fontWeight:600, letterSpacing:0.3 }}>
          🗑 Delete This Entry (Erase Error)
        </button>
      </div>

      <Field label="Date"><input type="date" style={styles.input} value={f.date} onChange={e => set("date", e.target.value)} /></Field>
      <Field label="Member"><input style={{ ...styles.input, background:"#0f172a", color:"#64748b" }} value={`${f.memberId} – ${f.memberName}`} readOnly /></Field>

      {isPurchase ? (
        <>
          <div style={{ background:"#0c1a2e", border:"1px solid #1e3a5f", borderRadius:6, padding:"8px 12px", fontSize:12, color:"#7dd3fc", marginBottom:10 }}>
            Share price: <strong style={{ color:"#f8fafc" }}>{fmt(SHARE_PRICE)}</strong> per share &nbsp;·&nbsp;
            Max allowed (excl. this entry): <strong style={{ color:"#22c55e" }}>{remaining} shares</strong>
          </div>
          <Field label="Number of Shares">
            <input type="number" style={styles.input} value={f.shares} step="0.0001" min="0.0001"
              onChange={e => { set("shares", e.target.value); set("amountPaid", (Number(e.target.value) * SHARE_PRICE).toFixed(0)); }} />
          </Field>
          <Field label="Amount Paid (UGX)">
            <input type="number" style={styles.input} value={f.amountPaid} min="1"
              onChange={e => { set("amountPaid", e.target.value); set("shares", (Number(e.target.value) / SHARE_PRICE).toFixed(2)); }} />
          </Field>
          {Number(f.shares) > 0 && (
            <div style={styles.computedBox}>
              <Row label="Shares" val={Number(f.shares).toFixed(2)} />
              <Row label="Amount Paid" val={fmt(f.amountPaid)} />
              <Row label="Price per Share" val={fmt(Math.round(Number(f.amountPaid) / Number(f.shares)))} />
            </div>
          )}
          <Field label="Receipt No. (optional)"><input style={styles.input} value={f.receiptNo || ""} onChange={e => set("receiptNo", e.target.value)} /></Field>
        </>
      ) : (
        <>
          <div style={{ background:"#0c1a2e", border:"1px solid #1e3a5f", borderRadius:6, padding:"8px 12px", fontSize:12, color:"#7dd3fc", marginBottom:10 }}>
            To: <strong>{f.toMemberName}</strong> &nbsp;·&nbsp; Available from sender (excl. this transfer): <strong style={{ color:"#22c55e" }}>{fromSharesExcluding}</strong>
          </div>
          <Field label="Number of Shares to Transfer">
            <input type="number" style={styles.input} value={f.shares} min="0.0001" step="0.0001" max={fromSharesExcluding}
              onChange={e => set("shares", e.target.value)} />
          </Field>
          <Field label="Note (optional)"><input style={styles.input} value={f.note || ""} onChange={e => set("note", e.target.value)} /></Field>
        </>
      )}

      <Field label="Recorded By"><input style={styles.input} value={f.recordedBy} onChange={e => set("recordedBy", e.target.value)} /></Field>
    </ModalShell>
  );
}


// ─── Exchange Savings ↔ Shares Modal ──────────────────────────────────────────
function ExchangeSavingsSharesModal({ close, data, persist }) {
  const today = () => new Date().toISOString().slice(0, 10);
  const [direction, setDirection] = React.useState("savingsToShares"); // or "sharesToSavings"
  const [memberId, setMemberId]   = React.useState("");
  const [amount,   setAmount]     = React.useState("");
  const [note,     setNote]       = React.useState("");
  const [recordedBy, setRecordedBy] = React.useState("");
  const [date,     setDate]       = React.useState(today());

  const member = data.members.find(m => m.id === memberId);

  // Member's current savings balance
  const memberSavings = member
    ? data.savings.filter(s => s.memberId === memberId).reduce((a, s) => a + Number(s.amount || 0), 0)
      - (data.withdrawals || []).filter(w => w.memberId === memberId).reduce((a, w) => a + Number(w.amount || 0) + Number(w.charge || 0), 0)
    : 0;

  // Member's current shares held
  const sc = data.shareCapital || [];
  const sharesHeld = member ? (() => {
    const bought   = sc.filter(e => e.memberId === memberId && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
    const received = sc.filter(e => e.toMemberId === memberId && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    const sent     = sc.filter(e => e.memberId === memberId && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    return bought + received - sent;
  })() : 0;

  const sharesFromAmount  = Number(amount) > 0 ? (Number(amount) / SHARE_PRICE).toFixed(2) : "0.00";
  const amountFromShares  = Number(amount) > 0 ? Number(amount) * SHARE_PRICE : 0;
  const remainingShares   = COMPANY_MAX_SHARES - (kpiTotalShares(sc));

  function kpiTotalShares(sc) {
    return sc.filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0)
           - sc.filter(e => e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0) * 0; // purchases net
  }

  const submit = () => {
    if (!member)        return alert("Please select a member");
    if (!Number(amount) || Number(amount) <= 0) return alert("Enter a valid amount");
    if (!recordedBy)    return alert("Recorded By is required");

    if (direction === "savingsToShares") {
      // Deduct from savings, add to share capital
      const sharesToAdd = Number(amount) / SHARE_PRICE;
      const totalIssued = sc.filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
      if (totalIssued + sharesToAdd > COMPANY_MAX_SHARES) return alert(`Not enough share capacity. Only ${(COMPANY_MAX_SHARES - totalIssued).toFixed(2)} shares available.`);
      if (Number(amount) > memberSavings) return alert(`Member only has ${fmt(memberSavings)} in savings. Cannot convert ${fmt(Number(amount))}.`);

      // Post negative savings entry (deduction)
      const savingsDeduction = {
        id: "EX-" + Date.now(),
        date,
        memberId,
        memberName: member.fullName,
        amount: -Math.abs(Number(amount)),
        month: new Date(date).toLocaleString("default", { month: "long" }),
        year:  new Date(date).getFullYear(),
        note:  `Exchanged to shares — ${sharesToAdd.toFixed(2)} shares @ ${fmt(SHARE_PRICE)}/share. ${note}`,
        recordedBy,
        type: "Exchange",
      };
      // Post share capital entry
      const shareEntry = {
        date,
        memberId,
        memberName: member.fullName,
        shares: sharesToAdd,
        amountPaid: Number(amount),
        type: "Purchase",
        receiptNo: "EX-" + Date.now(),
        recordedBy,
        note: `Converted from savings. ${note}`,
      };
      persist("savings", [...data.savings, savingsDeduction]);
      persist("shareCapital", [...sc, shareEntry]);

    } else {
      // Shares → Savings: remove shares (negative purchase entry), credit savings
      const sharesToRemove = Number(amount); // here "amount" is number of shares
      if (sharesToRemove > sharesHeld) return alert(`Member only holds ${sharesHeld.toFixed(2)} shares. Cannot convert ${sharesToRemove}.`);
      const amountToCredit = sharesToRemove * SHARE_PRICE;

      // Record share reduction as a negative-share purchase entry
      const shareReduction = {
        date,
        memberId,
        memberName: member.fullName,
        shares: -Math.abs(sharesToRemove),
        amountPaid: -Math.abs(amountToCredit),
        type: "Purchase",
        receiptNo: "EX-" + Date.now(),
        recordedBy,
        note: `Converted to savings. ${note}`,
      };
      // Credit savings
      const savingsCredit = {
        id: "EX-" + Date.now(),
        date,
        memberId,
        memberName: member.fullName,
        amount: amountToCredit,
        month: new Date(date).toLocaleString("default", { month: "long" }),
        year:  new Date(date).getFullYear(),
        note:  `Exchanged from shares — ${sharesToRemove} shares @ ${fmt(SHARE_PRICE)}/share. ${note}`,
        recordedBy,
        type: "Exchange",
      };
      persist("shareCapital", [...sc, shareReduction]);
      persist("savings", [...data.savings, savingsCredit]);
    }
    close();
  };

  return (
    <ModalShell title="⇌ Exchange Savings ↔ Shares" close={close} onSubmit={submit} submitLabel="Execute Exchange">
      <div style={{ background:"#0f172a", border:"1px solid #0d9488", borderRadius:6, padding:"10px 14px", fontSize:13, color:"#5eead4", marginBottom:12 }}>
        Convert a member's savings balance into share capital, or redeem shares back to savings. All changes are reflected immediately in both ledgers.
      </div>

      {/* Direction toggle */}
      <div style={{ display:"flex", gap:8, marginBottom:14 }}>
        <button onClick={() => { setDirection("savingsToShares"); setAmount(""); }}
          style={{ flex:1, padding:"10px 0", borderRadius:6, border: direction === "savingsToShares" ? "2px solid #0d9488" : "1px solid #1e293b",
            background: direction === "savingsToShares" ? "#134e4a" : "#1e293b", color: direction === "savingsToShares" ? "#5eead4" : "#94a3b8",
            fontWeight:600, fontSize:13, cursor:"pointer" }}>
          💰 → 📈 Savings to Shares
        </button>
        <button onClick={() => { setDirection("sharesToSavings"); setAmount(""); }}
          style={{ flex:1, padding:"10px 0", borderRadius:6, border: direction === "sharesToSavings" ? "2px solid #7c3aed" : "1px solid #1e293b",
            background: direction === "sharesToSavings" ? "#2e1065" : "#1e293b", color: direction === "sharesToSavings" ? "#c4b5fd" : "#94a3b8",
            fontWeight:600, fontSize:13, cursor:"pointer" }}>
          📈 → 💰 Shares to Savings
        </button>
      </div>

      <Field label="Date"><input type="date" style={styles.input} value={date} onChange={e => setDate(e.target.value)} /></Field>

      <Field label="Member">
        <select style={styles.input} value={memberId} onChange={e => { setMemberId(e.target.value); setAmount(""); }}>
          <option value="">— Select member —</option>
          {data.members.filter(m => m.status !== "Inactive").map(m => (
            <option key={m.id} value={m.id}>{m.fullName} ({m.id})</option>
          ))}
        </select>
      </Field>

      {member && (
        <div style={{ background:"#0c1a2e", border:"1px solid #1e3a5f", borderRadius:6, padding:"10px 14px", fontSize:12, color:"#7dd3fc", marginBottom:12 }}>
          <div style={{ display:"flex", justifyContent:"space-between", marginBottom:4 }}>
            <span>💰 Savings Balance:</span><strong style={{ color:"#22c55e" }}>{fmt(memberSavings)}</strong>
          </div>
          <div style={{ display:"flex", justifyContent:"space-between" }}>
            <span>📈 Shares Held:</span><strong style={{ color:"#a855f7" }}>{sharesHeld.toFixed(2)} shares ({fmt(sharesHeld * SHARE_PRICE)})</strong>
          </div>
        </div>
      )}

      {direction === "savingsToShares" ? (
        <>
          <Field label="Amount to Convert (UGX)">
            <input type="number" style={styles.input} value={amount} min="1" placeholder="Enter savings amount"
              onChange={e => setAmount(e.target.value)} />
          </Field>
          {Number(amount) > 0 && (
            <div style={styles.computedBox}>
              <Row label="Amount Deducted from Savings" val={fmt(Number(amount))} />
              <Row label="Shares to Allocate" val={`${(Number(amount) / SHARE_PRICE).toFixed(2)} shares`} bold color="#a855f7" />
              <Row label="Price per Share" val={fmt(SHARE_PRICE)} />
            </div>
          )}
        </>
      ) : (
        <>
          <Field label="Number of Shares to Redeem">
            <input type="number" style={styles.input} value={amount} min="0.01" step="0.01"
              max={sharesHeld} placeholder="Enter number of shares"
              onChange={e => setAmount(e.target.value)} />
          </Field>
          {Number(amount) > 0 && (
            <div style={styles.computedBox}>
              <Row label="Shares Redeemed" val={`${Number(amount).toFixed(2)} shares`} />
              <Row label="Savings to Credit" val={fmt(Number(amount) * SHARE_PRICE)} bold color="#22c55e" />
              <Row label="Price per Share" val={fmt(SHARE_PRICE)} />
            </div>
          )}
        </>
      )}

      <Field label="Note (optional)"><input style={styles.input} value={note} onChange={e => setNote(e.target.value)} placeholder="Reason for exchange..." /></Field>
      <Field label="Recorded By"><input style={styles.input} value={recordedBy} onChange={e => setRecordedBy(e.target.value)} /></Field>
    </ModalShell>
  );
}

// ACTIVITY / AUDIT LOG  (Admin-only)
// ══════════════════════════════════════════════════════════════════════════════
const AUDIT_COLLECTION_LABELS = {
  members: "Members", savings: "Savings", loans: "Loans",
  investments: "Investments", expenses: "Expenses", otherIncome: "Other Income",
  welfare: "Welfare Fund", dividends: "Dividends", users: "User Accounts",
  withdrawals: "Withdrawals", mobileDeposits: "Mobile Deposits",
  loanApplications: "Loan Applications", shareCapital: "Share Capital",
  announcements: "Announcements",
};

const AUDIT_ACTION_COLORS = {
  added:    { bg: "#052e16", color: "#4ade80", border: "#166534" },
  edited:   { bg: "#1e1a3f", color: "#a5b4fc", border: "#3730a3" },
  deleted:  { bg: "#450a0a", color: "#fca5a5", border: "#991b1b" },
  approved: { bg: "#0c2340", color: "#7dd3fc", border: "#0369a1" },
  rejected: { bg: "#3b1d06", color: "#fdba74", border: "#9a3412" },
  modified: { bg: "#0f1e2e", color: "#93c5fd", border: "#1e3a5f" },
};

function AuditLog({ data, currentUser }) {
  const log = data.auditLog || [];
  const [q, setQ] = useState("");
  const [filterCollection, setFilterCollection] = useState("all");
  const [filterAction, setFilterAction] = useState("all");
  const [filterUser, setFilterUser] = useState("all");
  const [page, setPage] = useState(1);
  const PAGE_SIZE = 50;

  // Collect distinct values for filter dropdowns
  const collections = React.useMemo(() => {
    const s = new Set(log.map(e => e.collection).filter(Boolean));
    return Array.from(s).sort();
  }, [log]);
  const actions = React.useMemo(() => {
    const s = new Set(log.map(e => e.action).filter(Boolean));
    return Array.from(s).sort();
  }, [log]);
  const users = React.useMemo(() => {
    const seen = new Map();
    log.forEach(e => { if (e.userId && !seen.has(e.userId)) seen.set(e.userId, e.userName || e.userId); });
    return Array.from(seen.entries());
  }, [log]);

  const filtered = React.useMemo(() => {
    const t = q.trim().toLowerCase();
    return log.filter(e => {
      if (filterCollection !== "all" && e.collection !== filterCollection) return false;
      if (filterAction !== "all" && e.action !== filterAction) return false;
      if (filterUser !== "all" && e.userId !== filterUser) return false;
      if (t) {
        return [e.userName, e.userRole, e.action, e.collection, e.target, e.detail]
          .some(v => String(v || "").toLowerCase().includes(t));
      }
      return true;
    });
  }, [log, q, filterCollection, filterAction, filterUser]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const safePage = Math.min(page, totalPages);
  const paged = filtered.slice((safePage - 1) * PAGE_SIZE, safePage * PAGE_SIZE);

  // Reset to page 1 when filters change
  React.useEffect(() => { setPage(1); }, [q, filterCollection, filterAction, filterUser]);

  const fmtTs = ts => {
    try {
      const d = new Date(ts);
      return d.toLocaleDateString("en-UG", { day: "2-digit", month: "short", year: "numeric" }) +
        " " + d.toLocaleTimeString("en-UG", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    } catch { return ts || ""; }
  };

  const handleExportCSV = () => {
    exportCSV("acujus_activity_log.csv",
      ["Timestamp", "User", "Role", "Action", "Section", "Target / Record", "Details"],
      filtered.map(e => [fmtTs(e.ts), e.userName, e.userRole, e.action, AUDIT_COLLECTION_LABELS[e.collection] || e.collection, e.target, e.detail])
    );
  };

  const handleExportPDF = () => {
    const rows = filtered.slice(0, 500);
    const trs = rows.map(e => {
      const cfg = AUDIT_ACTION_COLORS[e.action] || AUDIT_ACTION_COLORS.modified;
      return `<tr>
        <td style="white-space:nowrap;font-size:10px">${fmtTs(e.ts)}</td>
        <td><strong>${e.userName || ""}</strong><br/><span style="font-size:10px;color:#666">${e.userRole || ""}</span></td>
        <td><span class="badge" style="background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.border}">${e.action}</span></td>
        <td>${AUDIT_COLLECTION_LABELS[e.collection] || e.collection || ""}</td>
        <td>${e.target || ""}</td>
        <td style="font-size:10px;color:#555">${e.detail || ""}</td>
      </tr>`;
    }).join("");
    printStyledHTML("Activity / Audit Log", `
      <h1>📋 Activity / Audit Log</h1>
      <div class="meta">Exported by ${currentUser?.fullName || "Admin"} · ${new Date().toLocaleString()} · ${filtered.length} entries${filtered.length > 500 ? " (first 500 shown)" : ""}</div>
      <table>
        <thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th>Section</th><th>Target</th><th>Details</th></tr></thead>
        <tbody>${trs}</tbody>
      </table>
    `);
  };

  const selStyle = { background: "#0f172a", border: "1px solid #334155", borderRadius: 5, color: "#f8fafc", padding: "6px 10px", fontSize: 12, cursor: "pointer" };

  return (
    <div style={{ padding: "16px 18px", maxWidth: 1200 }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 800, color: "#f8fafc" }}>📋 Activity / Audit Log</div>
          <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>
            {log.length.toLocaleString()} total entries · {filtered.length.toLocaleString()} matching · Admin-only view
          </div>
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <ExportCSVButton onClick={handleExportCSV} />
          <ExportPDFButton onClick={handleExportPDF} />
        </div>
      </div>

      {/* Filters */}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 12, alignItems: "center" }}>
        <div style={{ flex: "1 1 180px", minWidth: 140 }}>
          <SearchBar q={q} setQ={setQ} placeholder="Search user, action, detail…" count={filtered.length} total={log.length} />
        </div>
        <select value={filterCollection} onChange={e => setFilterCollection(e.target.value)} style={selStyle}>
          <option value="all">All Sections</option>
          {collections.map(c => <option key={c} value={c}>{AUDIT_COLLECTION_LABELS[c] || c}</option>)}
        </select>
        <select value={filterAction} onChange={e => setFilterAction(e.target.value)} style={selStyle}>
          <option value="all">All Actions</option>
          {actions.map(a => <option key={a} value={a}>{a}</option>)}
        </select>
        <select value={filterUser} onChange={e => setFilterUser(e.target.value)} style={selStyle}>
          <option value="all">All Users</option>
          {users.map(([id, name]) => <option key={id} value={id}>{name}</option>)}
        </select>
      </div>

      {/* Table */}
      <div style={styles.tableWrap}>
        <table style={styles.table}>
          <thead>
            <tr>
              {["Timestamp", "User", "Role", "Action", "Section", "Target / Record", "Details"].map(h => (
                <th key={h} style={styles.th}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {paged.length === 0 ? (
              <tr><td colSpan={7} style={styles.empty}>
                {log.length === 0
                  ? "No activity recorded yet. Actions taken in the system will appear here."
                  : "No entries match the current filters."}
              </td></tr>
            ) : paged.map(e => {
              const cfg = AUDIT_ACTION_COLORS[e.action] || AUDIT_ACTION_COLORS.modified;
              return (
                <tr key={e.id} style={styles.tr}>
                  <td style={{ ...styles.td, whiteSpace: "nowrap", fontSize: 11, color: "#94a3b8" }}>{fmtTs(e.ts)}</td>
                  <td style={styles.td}>
                    <div style={{ fontWeight: 600, color: "#e2e8f0", fontSize: 12 }}>{e.userName || "—"}</div>
                    <div style={{ fontSize: 10, color: "#64748b" }}>ID: {e.userId || "—"}</div>
                  </td>
                  <td style={{ ...styles.td, fontSize: 11, color: "#64748b" }}>{e.userRole || "—"}</td>
                  <td style={styles.td}>
                    <span style={{ ...styles.badge, background: cfg.bg, color: cfg.color, border: "1px solid " + cfg.border }}>
                      {e.action}
                    </span>
                  </td>
                  <td style={{ ...styles.td, fontSize: 12 }}>{AUDIT_COLLECTION_LABELS[e.collection] || e.collection || "—"}</td>
                  <td style={{ ...styles.td, fontSize: 12, color: "#93c5fd", maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={e.target}>{e.target || "—"}</td>
                  <td style={{ ...styles.td, fontSize: 11, color: "#94a3b8", maxWidth: 260, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }} title={e.detail}>{e.detail || ""}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Pagination */}
      {totalPages > 1 && (
        <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 12, flexWrap: "wrap" }}>
          <button onClick={() => setPage(1)} disabled={safePage === 1} style={{ ...styles.btnSecondary, padding: "5px 10px", fontSize: 12 }}>«</button>
          <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={safePage === 1} style={{ ...styles.btnSecondary, padding: "5px 10px", fontSize: 12 }}>‹</button>
          <span style={{ fontSize: 12, color: "#64748b" }}>Page {safePage} of {totalPages}</span>
          <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={safePage === totalPages} style={{ ...styles.btnSecondary, padding: "5px 10px", fontSize: 12 }}>›</button>
          <button onClick={() => setPage(totalPages)} disabled={safePage === totalPages} style={{ ...styles.btnSecondary, padding: "5px 10px", fontSize: 12 }}>»</button>
          <span style={{ fontSize: 11, color: "#475569", marginLeft: 4 }}>
            Showing {((safePage - 1) * PAGE_SIZE) + 1}–{Math.min(safePage * PAGE_SIZE, filtered.length)} of {filtered.length}
          </span>
        </div>
      )}
    </div>
  );
}

// Global singleton styles object — updated reactively via ThemeProvider
let styles = makeStyles(DARK);

function ThemeProvider({ children }) {
  const [isDark, setIsDark] = React.useState(() => {
    try { const s = localStorage.getItem("acujus_theme"); return s === null ? true : s !== "light"; } catch { return true; }
  });
  const toggleTheme = React.useCallback(() => {
    setIsDark(d => {
      const next = !d;
      try { localStorage.setItem("acujus_theme", next ? "dark" : "light"); } catch {}
      return next;
    });
  }, []);
  // Keep global styles in sync
  styles = makeStyles(isDark ? DARK : LIGHT);
  // Update CSS-level rules (scrollbars, tr:hover, body bg)
  React.useEffect(() => {
    const t = isDark ? DARK : LIGHT;
    let el = document.getElementById("acujus-theme-css");
    if (!el) { el = document.createElement("style"); el.id = "acujus-theme-css"; document.head.appendChild(el); }
    el.textContent = `
      html, body { background: ${t.bgPage} !important; color: ${t.text}; }
      ::-webkit-scrollbar-track { background: ${t.scrollTrack} !important; }
      ::-webkit-scrollbar-thumb { background: ${t.scrollThumb} !important; }
      tr:hover td { background: ${t.trHover} !important; }
      input, select, textarea { color-scheme: ${isDark ? "dark" : "light"}; }
    `;
    document.querySelector('meta[name="theme-color"]')?.setAttribute("content", t.bgDeep);
  }, [isDark]);
  return React.createElement(ThemeContext.Provider, { value: { isDark, toggleTheme } }, children);
}


const root = ReactDOM.createRoot(document.getElementById('root'));
