// ─── Investments ──────────────────────────────────────────────────────────────
function Investments({ data, persist, setModal }) {
  const todayStr = today();

  // ── Auto-maturity: runs once on mount and whenever investments change ────────
  // On maturity date: flip status from "Active" → "Matured (Pending Recovery)".
  // Does NOT auto-fill principalRecovered — admin records what actually came back.
  // Partial recovery: principalRecovered < poolAmount → status stays "Partial Recovery".
  // Full recovery:    principalRecovered >= poolAmount → status = "Matured".
  useEffect(() => {
    const needsUpdate = data.investments.some(inv => {
      if (!inv.maturityDate) return false;
      return inv.maturityDate <= todayStr && inv.status === "Active";
    });
    if (!needsUpdate) return;
    const updated = data.investments.map(inv => {
      if (!inv.maturityDate || inv.maturityDate > todayStr || inv.status !== "Active") return inv;
      return {
        ...inv,
        status: "Matured (Pending Recovery)",
        autoMaturedOn: todayStr,
      };
    });
    persist("investments", updated);
  }, [data.investments]);

  const totals = {
    invested: data.investments.reduce((s, r) => s + Number(r.poolAmount || 0), 0),
    expected: data.investments.reduce((s, r) => s + Number(r.expectedReturn || 0), 0),
    current: data.investments.reduce((s, r) => s + Number(r.currentValue || 0), 0),
    recovered: data.investments.reduce((s, r) => s + Number(r.principalRecovered || 0), 0),
  };

  const maturedToday = data.investments.filter(inv => inv.autoMaturedOn === todayStr);

  const { q, setQ, filtered: filteredInvestments } = useSearch(data.investments, ["name", "type", "status", "date"]);
  return (
    <div>
      {maturedToday.length > 0 && (
        <div style={{ background:"#052e16", border:"1px solid #166534", borderRadius:8, padding:"10px 16px", marginBottom:14, fontSize:13, color:"#86efac" }}>
          ✅ <strong>{maturedToday.length} investment{maturedToday.length > 1 ? "s" : ""} auto-matured today:</strong>{" "}
          {maturedToday.map(i => i.name).join(", ")} — principal fully recovered automatically.
        </div>
      )}
      <div style={styles.toolbar}>
        <SearchBar q={q} setQ={setQ} placeholder="Search by name, type, status…" count={filteredInvestments.length} total={data.investments.length} />
        <span style={{ ...styles.count, flexShrink: 0 }}>Portfolio: {fmt(totals.current)}</span>
        <ExportCSVButton onClick={() => exportCSV("investments.csv",
          ["Date","Name","Type","Pool Amount","Rate %","Expected Return","Actual Return","Current Value","Status","Maturity"],
          filteredInvestments.map(i => [i.date, i.name, i.type, i.poolAmount, i.rate, i.expectedReturn, i.actualReturn||0, i.currentValue||i.poolAmount, i.status, i.maturityDate||""])
        )} />
        <button style={styles.btnPrimary} onClick={() => setModal({ type: "addInvestment" })}>+ Add Investment</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
        <div style={{ ...styles.card, borderLeft: "4px solid #3b82f6" }}><div style={{ ...styles.cardVal, color: "#3b82f6" }}>{fmt(totals.invested)}</div><div style={styles.cardLabel}>Total Capital</div></div>

          {filteredInvestments.length === 0 && <tr><td colSpan={13} style={styles.empty}>{q ? "No investments match your search" : "No investments recorded"}</td></tr>}
          {filteredInvestments.map((inv, i) => {
            const daysLeft = inv.maturityDate
              ? Math.ceil((new Date(inv.maturityDate) - new Date(todayStr)) / 86400000)
              : null;
            const isOverdue = daysLeft !== null && daysLeft < 0;
            const isMaturedToday = daysLeft !== null && daysLeft === 0;
            const badgeBg = inv.status === "Active"
              ? (isOverdue ? "#451a03" : "#dbeafe")
              : inv.status === "Matured" ? "#dcfce7"
              : inv.status === "Partial Recovery" ? "#451a03"
              : inv.status === "Matured (Pending Recovery)" ? "#1c1a03"
              : "#f1f5f9";
            const badgeCol = inv.status === "Active"
              ? (isOverdue ? "#fcd34d" : "#1d4ed8")
              : inv.status === "Matured" ? "#16a34a"
              : inv.status === "Partial Recovery" ? "#fcd34d"
              : inv.status === "Matured (Pending Recovery)" ? "#fbbf24"
              : "#475569";
            return (
              <tr key={i} style={styles.tr}>
                <td style={{ ...styles.td, whiteSpace:"nowrap" }}>{inv.date}</td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  <strong>{inv.name}</strong>
                  {inv.autoMaturedOn && <span style={{ fontSize:10, color:"#4ade80", marginLeft:6 }}>⚡auto</span>}
                </td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{inv.type}</td>
                <td style={styles.td}>{fmt(inv.poolAmount)}</td>
                <td style={styles.td}>{inv.interestRate}%</td>
                <td style={styles.td}>{fmt(inv.expectedReturn)}</td>
                <td style={styles.td}>{fmt(inv.actualReturn)}</td>
                <td style={styles.td}>{fmt(inv.currentValue)}</td>
                <td style={styles.td}>
                  <span style={{ ...styles.badge, background: badgeBg, color: badgeCol }}>
                    {inv.status}{isMaturedToday ? " 🎯" : ""}
                  </span>
                </td>
                <td style={{ ...styles.td, whiteSpace:"nowrap" }}>{inv.maturityDate || "-"}</td>
                <td style={styles.td}>
                  {daysLeft === null ? "-"
                    : daysLeft > 0 ? <span style={{ color:"#93c5fd" }}>{daysLeft}d</span>
                    : daysLeft === 0 ? <span style={{ color:"#fbbf24", fontWeight:700 }}>Today!</span>
                    : <span style={{ color:"#ef4444" }}>{Math.abs(daysLeft)}d ago</span>}
                </td>
                <td style={styles.td}>
                  {Number(inv.principalRecovered || 0) >= Number(inv.poolAmount || 0) && Number(inv.poolAmount || 0) > 0
                    ? <span style={{ color:"#22c55e", fontWeight:700 }}>✓ {fmt(inv.principalRecovered)}</span>
                    : fmt(inv.principalRecovered)}
                </td>
                <td style={{ ...styles.td, whiteSpace:"nowrap" }}>
                  <button style={styles.btnSm} onClick={() => setModal({ type: "editInvestment", payload: { inv, idx: data.investments.indexOf(inv) } })}>Edit</button>
                  <button style={{ ...styles.btnSm, ...styles.btnDanger }} onClick={() => persist("investments", data.investments.filter(x => x !== inv))}>Del</button>
                </td>
              </tr>
            );
          })}
        </tbody>
      </ResizableTableWrap>
    </div>
  );
}

// ─── Dividends ───────────────────────────────────────────────────────────────
function Dividends({ data, persist, kpi, setModal }) {
  const [showOverrides, setShowOverrides] = React.useState(false);

  const memberShares = (m) => {
    const bought = (data.shareCapital || []).filter(e => e.memberId === m.id && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
    const received = (data.shareCapital || []).filter(e => e.toMemberId === m.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    const transferred = (data.shareCapital || []).filter(e => e.memberId === m.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
    return bought + received - transferred;
  };
  const calcDividend = (m) => memberShares(m) * kpi.dividendPerShare;
  const totalDisbursed = (data.dividends || []).reduce((s, d) => s + Number(d.amount || 0), 0);

  // Compute pending members for bulk action
  const pendingMembers = data.members.filter(m => {
    const earned = calcDividend(m);
    if (earned <= 0) return false;
    const disbursed = (data.dividends || []).filter(d => d.memberId === m.id).reduce((s, d) => s + Number(d.amount || 0), 0);
    return (earned - disbursed) > 0;
  });
  const allPaid = pendingMembers.length === 0 && data.members.length > 0;

  return (
    <div>
      {/* ── KPI Cards ── */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:12, marginBottom:16 }}>
        <div style={{ ...styles.card, borderLeft:"4px solid #22c55e" }}><div style={{ ...styles.cardVal, color:"#22c55e" }}>{fmt(kpi.shareableProfit)}</div><div style={styles.cardLabel}>Shareable Profit (60%)</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #3b82f6" }}><div style={{ ...styles.cardVal, color:"#3b82f6" }}>{fmt(kpi.dividendPerShare)}</div><div style={styles.cardLabel}>Dividend Per Share</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #f59e0b" }}><div style={{ ...styles.cardVal, color:"#f59e0b" }}>{Number(kpi.totalShares).toFixed(2)}</div><div style={styles.cardLabel}>Total Shares</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #ef4444" }}><div style={{ ...styles.cardVal, color:"#ef4444" }}>{fmt(totalDisbursed)}</div><div style={styles.cardLabel}>Total Disbursed</div></div>
      </div>

      {/* ── PRIMARY: Bulk Disbursement ── */}
      <div style={{ background:"#0f172a", border:"1px solid #1e3a5f", borderRadius:10, padding:"20px 22px", marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:12 }}>
          <div>
            <div style={{ fontSize:14, fontWeight:700, color:"#f8fafc", marginBottom:4 }}>
              Bulk Dividend Disbursement
            </div>
            <div style={{ fontSize:12, color:"#64748b", maxWidth:480 }}>
              Disburses the full remaining dividend for every eligible member in one action. All payments are posted to individual savings accounts and recorded in the ledger.
            </div>
            <div style={{ marginTop:10, display:"flex", gap:16, flexWrap:"wrap" }}>
              <span style={{ fontSize:12 }}>
                <span style={{ color:"#64748b" }}>Eligible members: </span>
                <strong style={{ color: pendingMembers.length > 0 ? "#f59e0b" : "#22c55e" }}>{pendingMembers.length}</strong>
              </span>
              <span style={{ fontSize:12 }}>
                <span style={{ color:"#64748b" }}>Remaining to disburse: </span>
                <strong style={{ color:"#14b8a6" }}>
                  {fmt(pendingMembers.reduce((s, m) => {
                    const earned = calcDividend(m);
                    const disbursed = (data.dividends || []).filter(d => d.memberId === m.id).reduce((acc, d) => acc + Number(d.amount || 0), 0);
                    return s + (earned - disbursed);
                  }, 0))}
                </strong>
              </span>
            </div>
          </div>
          <div style={{ flexShrink:0 }}>
            {allPaid ? (
              <div style={{ display:"flex", alignItems:"center", gap:8, background:"#052e16", border:"1px solid #14532d", borderRadius:8, padding:"10px 18px" }}>
                <span style={{ fontSize:18 }}>✅</span>
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:"#22c55e" }}>All Dividends Paid</div>
                  <div style={{ fontSize:11, color:"#4ade80" }}>Every member has been fully disbursed</div>
                </div>
              </div>
            ) : data.members.length === 0 ? (
              <div style={{ fontSize:12, color:"#475569", fontStyle:"italic", padding:"10px 0" }}>No members yet</div>
            ) : (
              <button
                style={{ background:"linear-gradient(135deg,#1d4ed8,#2563eb)", color:"#fff", border:"none", borderRadius:8, padding:"12px 28px", fontSize:14, fontWeight:700, cursor:"pointer", boxShadow:"0 4px 14px rgba(37,99,235,0.4)", letterSpacing:0.3 }}
                onClick={() => setModal({ type:"bulkDisburseDividend", payload:{ pendingMembers, calcDividend, memberShares } })}
              >
                ⚡ Disburse All Dividends
              </button>
            )}
          </div>
        </div>

        {/* Preview table of pending members */}
        {pendingMembers.length > 0 && (
          <div style={{ marginTop:16 }}>
            <div style={{ fontSize:11, color:"#475569", fontWeight:600, letterSpacing:0.5, textTransform:"uppercase", marginBottom:8 }}>Preview — Members to be Disbursed</div>
            <div style={{ overflowX:"auto", borderRadius:6, border:"1px solid #1e293b" }}>
              <table style={{ ...styles.table, fontSize:11 }}>
                <thead>
                  <tr>
                    {["Member","Shares","Dividend Earned","Already Disbursed","Will Receive"].map(h => (
                      <th key={h} style={{ ...styles.th, fontSize:11 }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {pendingMembers.map(m => {
                    const shares = memberShares(m);
                    const earned = calcDividend(m);
                    const disbursed = (data.dividends || []).filter(d => d.memberId === m.id).reduce((s, d) => s + Number(d.amount || 0), 0);
                    const remaining = earned - disbursed;
                    return (
                      <tr key={m.id} style={styles.tr}>
                        <td style={styles.td}>{m.fullName}</td>
                        <td style={styles.td}>{Number(shares).toFixed(2)}</td>
                        <td style={styles.td}><strong style={{ color:"#22c55e" }}>{fmt(earned)}</strong></td>
                        <td style={styles.td}><span style={{ color:"#f97316" }}>{fmt(disbursed)}</span></td>
                        <td style={styles.td}><strong style={{ color:"#14b8a6" }}>{fmt(remaining)}</strong></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>

      {/* ── SECONDARY: Per-Member Override ── */}
      <div style={{ border:"1px solid #1e293b", borderRadius:8, marginBottom:20, overflow:"hidden" }}>
        <button
          style={{ width:"100%", background:"#0a0f1e", border:"none", padding:"11px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer", textAlign:"left" }}
          onClick={() => setShowOverrides(v => !v)}
        >
          <span style={{ fontSize:12, fontWeight:700, color:"#64748b", letterSpacing:0.5, textTransform:"uppercase" }}>
            🔧 Manual Override — Disburse per Member
          </span>
          <span style={{ fontSize:11, color:"#334155", fontWeight:600 }}>{showOverrides ? "▲ Hide" : "▼ Show"}</span>
        </button>
        {showOverrides && (
          <div style={{ padding:"0 0 4px 0" }}>
            <div style={{ padding:"8px 16px 10px", fontSize:11, color:"#475569", borderBottom:"1px solid #1e293b", background:"#0f172a" }}>
              Use individual overrides to disburse a partial amount or correct a specific member's dividend. For standard end-of-period distributions, use <strong style={{ color:"#64748b" }}>Disburse All Dividends</strong> above.
            </div>
            <ResizableTableWrap headers={["Member ID","Member Name","Shares","Dividend Earned","Already Disbursed","Remaining","Override"]} defaultWidth={150}>
              <tbody>
                {data.members.length === 0 && <tr><td colSpan={7} style={styles.empty}>No members yet</td></tr>}
                {data.members.map(m => {
                  const shares = memberShares(m);
                  const earned = calcDividend(m);
                  const disbursed = (data.dividends || []).filter(d => d.memberId === m.id).reduce((s, d) => s + Number(d.amount || 0), 0);
                  const remaining = earned - disbursed;
                  return (
                    <tr key={m.id} style={styles.tr}>
                      <td style={styles.td}>{m.id}</td>
                      <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.fullName}</td>
                      <td style={styles.td}>{Number(shares).toFixed(2)}</td>
                      <td style={styles.td}><strong style={{ color:"#22c55e" }}>{fmt(earned)}</strong></td>
                      <td style={styles.td}><span style={{ color:"#f97316" }}>{fmt(disbursed)}</span></td>
                      <td style={styles.td}><strong style={{ color: remaining > 0 ? "#14b8a6" : "#64748b" }}>{fmt(remaining)}</strong></td>
                      <td style={styles.td}>
                        {remaining > 0
                          ? <button style={{ ...styles.btnSm, background:"#1e3a5f", color:"#93c5fd", border:"1px solid #1e40af" }} onClick={() => setModal({ type:"disburseDividend", payload:{ member:m, earned, disbursed, remaining } })}>Override</button>
                          : <span style={{ color:"#22c55e", fontSize:12, fontWeight:700 }}>✓ Paid</span>
                        }
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </ResizableTableWrap>
          </div>
        )}
      </div>

      {/* ── Payment History ── */}
      <div style={{ marginTop:4 }}>
        <div style={styles.panelTitle}>DIVIDEND PAYMENT HISTORY</div>
        <ResizableTableWrap headers={["Date","Member ID","Member Name","Shares","Amount","Period","Posted to Savings","Ref"]} defaultWidth={140}>
          <tbody>
            {(data.dividends || []).length === 0 && <tr><td colSpan={8} style={styles.empty}>No dividend payments recorded yet</td></tr>}
            {(data.dividends || []).map((d, i) => (
              <tr key={i} style={styles.tr}>
                <td style={styles.td}>{d.date}</td>
                <td style={styles.td}>{d.memberId}</td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{d.memberName}</td>
                <td style={styles.td}>{Number(d.shares).toFixed(2)}</td>
                <td style={styles.td}><strong style={{ color:"#22c55e" }}>{fmt(d.amount)}</strong></td>
                <td style={styles.td}>{d.period}</td>
                <td style={styles.td}><span style={{ color:"#22c55e" }}>✓ Yes</span></td>
                <td style={styles.td}>{d.ref}</td>
              </tr>
            ))}
          </tbody>
        </ResizableTableWrap>
      </div>
    </div>
  );

// ─── Reports ─────────────────────────────────────────────────────────────────
function Reports({ data, kpi }) {
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const curYear = new Date().getFullYear();
  const curMonth = new Date().getMonth(); // 0-indexed

  // ── Report tab state ──────────────────────────────────────────────────────
  const [reportTab, setReportTab] = useState("income"); // "income" | "balance"

  // ── Filter mode state ──────────────────────────────────────────────────────
  const [mode, setMode] = useState("year");          // "year" | "quarter" | "month" | "custom"
  const [year, setYear]   = useState(curYear);
  const [quarter, setQuarter] = useState(Math.floor(curMonth / 3) + 1); // 1-4
  const [month, setMonth] = useState(curMonth);      // 0-indexed
  const [customFrom, setCustomFrom] = useState(() => `${curYear}-01-01`);
  const [customTo,   setCustomTo]   = useState(() => new Date().toISOString().slice(0,10));

  // ── Derive date range from mode ────────────────────────────────────────────
  const { rangeStart, rangeEnd, rangeLabel } = React.useMemo(() => {
    let s, e, label;
    if (mode === "year") {
      s = new Date(year, 0, 1);
      e = new Date(year, 11, 31, 23, 59, 59);
      label = `Full Year ${year}`;
    } else if (mode === "quarter") {
      const qStart = (quarter - 1) * 3;
      s = new Date(year, qStart, 1);
      e = new Date(year, qStart + 3, 0, 23, 59, 59);
      label = `Q${quarter} ${year}  (${SHORT_MONTHS[qStart]}–${SHORT_MONTHS[qStart+2]})`;
    } else if (mode === "month") {
      s = new Date(year, month, 1);
      e = new Date(year, month + 1, 0, 23, 59, 59);
      label = `${MONTHS[month]} ${year}`;
    } else {
      s = new Date(customFrom + "T00:00:00");
      e = new Date(customTo   + "T23:59:59");
      label = `${customFrom}  →  ${customTo}`;
    }
    return { rangeStart: s, rangeEnd: e, rangeLabel: label };
  }, [mode, year, quarter, month, customFrom, customTo]);

  // ── Helper: does a record's date fall in range? ────────────────────────────
  const inRange = (dateStr) => {
    if (!dateStr) return false;
    const d = new Date(dateStr);
    return d >= rangeStart && d <= rangeEnd;
  };

  // ── Filtered data slices ───────────────────────────────────────────────────
  const fSavings     = data.savings.filter(r => inRange(r.date));
  const fWithdrawals = data.withdrawals.filter(r => inRange(r.date));
  const fLoans       = data.loans.filter(r => inRange(r.date || r.issueDate || r.approvalDate));
  const fExpenses    = data.expenses.filter(r => inRange(r.date));
  const fOtherIncome = data.otherIncome.filter(r => inRange(r.date));
  const fWelfare     = data.welfare.filter(r => inRange(r.date));
  const fWelfareWithdrawals = (data.welfareWithdrawals || []).filter(r => inRange(r.date));
  const fInvestments = data.investments.filter(r => inRange(r.date || r.startDate));
  const fShareCap    = (data.shareCapital || []).filter(r => inRange(r.date));

  // ── Filtered KPI ───────────────────────────────────────────────────────────
  const fkpi = React.useMemo(() => {
    const totalSavings     = fSavings.reduce((s,r) => s + Number(r.amount||0), 0);
    const totalWithdrawals = fWithdrawals.reduce((s,r) => s + Number(r.amount||0) + Number(r.charge||0), 0);
    const netSavings       = totalSavings - totalWithdrawals;
    const totalLoans       = fLoans.reduce((s,r) => s + Number(r.loanAmount||0), 0);
    const totalLoanInterest = fLoans.reduce((s,r) => {
      const paid = Number(r.amountPaid||0); const interest = Number(r.interestAmount||0);
      return s + Math.min(paid, interest);
    }, 0);
    const totalLoanInterestAccrued = fLoans.reduce((s,r) => s + Number(r.interestAmount||0), 0);
    const outstandingLoans = fLoans.filter(l => l.status !== "Paid").reduce((s,r) => s + Number(r.balance||0), 0);
    const totalExpenses    = fExpenses.reduce((s,r) => s + Number(r.amount||0), 0);
    const otherIncome      = fOtherIncome.reduce((s,r) => s + Number(r.amount||0), 0);
    const welfareCollected   = fWelfare.reduce((s,r) => s + Number(r.contribution||0), 0);
    const welfareWithdrawn   = fWelfareWithdrawals.reduce((s,r) => s + Number(r.amount||0), 0);
    const welfare            = welfareCollected - welfareWithdrawn;
    const totalInvested    = fInvestments.reduce((s,r) => s + Number(r.poolAmount||0), 0);
    const expectedReturns  = fInvestments.reduce((s,r) => s + Number(r.expectedReturn||0), 0);
    const actualReturns    = fInvestments.reduce((s,r) => s + Number(r.actualReturn||0), 0);
    const principalRecovered = fInvestments.reduce((s,r) => s + Number(r.principalRecovered||0), 0);
    const penaltyIncome    = fLoans.reduce((s,r) => s + Number(r.penaltyAmount||0), 0);
    const totalIncome      = totalLoanInterest + actualReturns + otherIncome + penaltyIncome;
    const netProfit        = totalIncome - totalExpenses;
    const reserveFund      = netProfit * RESERVE_FUND_PCT;
    const adminFees        = netProfit * ADMIN_FEE_PCT;
    const shareableProfit  = netProfit * SHAREABLE_PCT;
    const totalShares      = fShareCap.filter(e => e.type === "Purchase").reduce((s,e) => s + Number(e.shares||0), 0);
    const totalShareCapital = fShareCap.filter(e => e.type === "Purchase").reduce((s,e) => s + Number(e.amountPaid||0), 0);
    const deployableFund   = totalShareCapital + otherIncome + totalLoanInterest + actualReturns + principalRecovered - outstandingLoans - totalInvested - totalExpenses;
    return {
      totalSavings, totalWithdrawals, netSavings, totalLoans, totalLoanInterest,
      totalLoanInterestAccrued, outstandingLoans, totalExpenses, otherIncome,
      welfare, welfareCollected, welfareWithdrawn, totalInvested, expectedReturns, actualReturns, principalRecovered,
      penaltyIncome, totalIncome, netProfit, reserveFund, adminFees, shareableProfit,
      totalShares, totalShareCapital, deployableFund,
      totalInvestmentValue: fInvestments.reduce((s,r) => s + Number(r.currentValue||0), 0),
      netCash: deployableFund + netSavings,
    };
  }, [fSavings, fWithdrawals, fLoans, fExpenses, fOtherIncome, fWelfare, fWelfareWithdrawals, fInvestments, fShareCap]);

  // ── Monthly breakdown (for table + chart) ─────────────────────────────────
  // Covers each month in the range
  const monthsInRange = React.useMemo(() => {
    const result = [];
    const cur = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), 1);
    const end = new Date(rangeEnd.getFullYear(), rangeEnd.getMonth(), 1);
    while (cur <= end) {
      result.push({ y: cur.getFullYear(), m: cur.getMonth() });
      cur.setMonth(cur.getMonth() + 1);
    }
    return result;
  }, [rangeStart, rangeEnd]);

  // Share capital purchased per month (only "Purchase" type entries)
  const monthlyShareCapital = monthsInRange.map(({y,m}) =>
    (data.shareCapital||[]).filter(r => { const d=new Date(r.date); return r.type==="Purchase"&&d.getFullYear()===y&&d.getMonth()===m&&inRange(r.date); }).reduce((a,r)=>a+Number(r.amountPaid||0),0)
  );
  // Total income per month: loan interest + investment returns + other income + penalties
  const monthlyIncome = monthsInRange.map(({y,m}) => {
    const interest = data.loans.filter(r => { const d=new Date(r.date||r.issueDate||r.approvalDate); return d.getFullYear()===y&&d.getMonth()===m&&inRange(r.date||r.issueDate||r.approvalDate); })
      .reduce((a,r)=>a+Math.min(Number(r.amountPaid||0),Number(r.interestAmount||0)),0);
    const penalties = data.loans.filter(r => { const d=new Date(r.date||r.issueDate||r.approvalDate); return d.getFullYear()===y&&d.getMonth()===m&&inRange(r.date||r.issueDate||r.approvalDate); })
      .reduce((a,r)=>a+Number(r.penaltyAmount||0),0);
    const investments = data.investments.filter(r => { const d=new Date(r.date||r.startDate); return d.getFullYear()===y&&d.getMonth()===m&&inRange(r.date||r.startDate); })
      .reduce((a,r)=>a+Number(r.actualReturn||0),0);
    const other = data.otherIncome.filter(r => { const d=new Date(r.date); return d.getFullYear()===y&&d.getMonth()===m&&inRange(r.date); })
      .reduce((a,r)=>a+Number(r.amount||0),0);
    return interest + penalties + investments + other;
  });
  const monthlyExpenses = monthsInRange.map(({y,m}) => data.expenses.filter(r => { const d=new Date(r.date); return d.getFullYear()===y&&d.getMonth()===m&&inRange(r.date); }).reduce((a,r)=>a+Number(r.amount||0),0));
  const monthLabels = monthsInRange.map(({y,m}) => monthsInRange.length > 12 ? `${SHORT_MONTHS[m]} ${y}` : SHORT_MONTHS[m]);

  // ── Export helpers ─────────────────────────────────────────────────────────
  const handleCSV = () => exportCSV(`report_${rangeLabel.replace(/[^a-z0-9]/gi,"_")}.csv`,
    ["Period","Share Capital (UGX)","Total Income (UGX)","Expenses (UGX)","Net (UGX)"],
    monthsInRange.map(({y,m},i) => {
      const net = monthlyIncome[i] - monthlyExpenses[i];
      return [`${SHORT_MONTHS[m]} ${y}`, monthlyShareCapital[i], monthlyIncome[i], monthlyExpenses[i], net];
    })
  );

  const handlePDF = () => {
    const tableRows = monthsInRange.map(({y,m},i) => {
      const net = monthlyIncome[i] - monthlyExpenses[i];
      return `<tr><td>${SHORT_MONTHS[m]} ${y}</td><td>${fmt(monthlyShareCapital[i])}</td><td>${fmt(monthlyIncome[i])}</td><td>${fmt(monthlyExpenses[i])}</td><td style="color:${net>=0?"#166534":"#dc2626"};font-weight:700">${fmt(net)}</td></tr>`;
    }).join("");
    const html = `
      <h1>ACUJUS Finance Report</h1>
      <div class="meta">Period: ${rangeLabel} &nbsp;|&nbsp; Generated: ${new Date().toLocaleDateString()}</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="val">${fmt(fkpi.totalShareCapital)}</div><div class="lbl">Share Capital</div></div>
        <div class="kpi"><div class="val">${fmt(fkpi.totalIncome)}</div><div class="lbl">Total Income</div></div>
        <div class="kpi"><div class="val">${fmt(fkpi.totalExpenses)}</div><div class="lbl">Total Expenses</div></div>
        <div class="kpi"><div class="val">${fmt(fkpi.netProfit)}</div><div class="lbl">Net Profit</div></div>
      </div>
      <h2>Monthly Share Capital &amp; Total Income vs Expenses</h2>
      <table><thead><tr><th>Period</th><th>Share Capital (UGX)</th><th>Total Income (UGX)</th><th>Expenses (UGX)</th><th>Net (UGX)</th></tr></thead><tbody>${tableRows}</tbody></table>
      <h2>Period Summary</h2>
      <table><thead><tr><th>Metric</th><th>Value</th></tr></thead><tbody>
        <tr><td>Total Savings (Gross)</td><td>${fmt(fkpi.totalSavings)}</td></tr>
        <tr><td>Total Withdrawals</td><td>${fmt(fkpi.totalWithdrawals)}</td></tr>
        <tr><td>Net Savings</td><td><strong>${fmt(fkpi.netSavings)}</strong></td></tr>
        <tr><td>Total Loans Disbursed</td><td>${fmt(fkpi.totalLoans)}</td></tr>
        <tr><td>Loan Interest Received</td><td>${fmt(fkpi.totalLoanInterest)}</td></tr>
        <tr><td>Investment Returns</td><td>${fmt(fkpi.actualReturns)}</td></tr>
        <tr><td>Other Income</td><td>${fmt(fkpi.otherIncome)}</td></tr>
        <tr><td>Penalty Income</td><td>${fmt(fkpi.penaltyIncome)}</td></tr>
        <tr><td>Total Income Received</td><td><strong>${fmt(fkpi.totalIncome)}</strong></td></tr>
        <tr><td>Total Expenses</td><td>${fmt(fkpi.totalExpenses)}</td></tr>
        <tr><td>Net Profit</td><td><strong style="color:#166534">${fmt(fkpi.netProfit)}</strong></td></tr>
        <tr><td>Reserve Fund (30%)</td><td>${fmt(fkpi.reserveFund)}</td></tr>
        <tr><td>Admin Fees (10%)</td><td>${fmt(fkpi.adminFees)}</td></tr>
        <tr><td>Shareable to Members (60%)</td><td><strong>${fmt(fkpi.shareableProfit)}</strong></td></tr>
      </tbody></table>
    `;
    printStyledHTML(`ACUJUS Finance Report – ${rangeLabel}`, html);
  };

  // ── Shared select style ────────────────────────────────────────────────────
  const selStyle = { ...styles.input, width: "auto", minWidth: 90, paddingRight: 8 };

  // ── Balance Sheet computations (all-time, as-at-today) ────────────────────
  // The accounting identity Assets = Liabilities + Equity is proven algebraically:
  //
  // CASH (what's physically in the bank / float):
  //   IN:  savings deposits + share purchases + loan principal repaid (interest excluded here)
  //        + loan interest income + investment returns + other income + penalties
  //        (welfare excluded — separate fund)
  //   OUT: loans disbursed + active investments still deployed + savings withdrawals + expenses
  //   Note: loanRepayments minus totalLoanInterest = principal only, preventing double-count
  //         since interest is already captured as income.
  //
  // ASSETS = Cash + Loan Book (outstanding) + Investment Portfolio (active deployed)
  // LIABILITIES = Net Savings owed to members  (Welfare is excluded — treated as a separate fund)
  // EQUITY = Share Capital + Net Profit (undistributed earnings)
  //
  // Proof: Assets - Liab - Equity cancels to zero (verified algebraically).

  const bs_activeInv      = data.investments.filter(i => i.status === "Active").reduce((s,i) => s + Number(i.poolAmount||0), 0);
  const bs_loanBook       = kpi.outstandingLoans;
  const bs_invPortfolio   = bs_activeInv;                                // active capital still deployed
  const bs_cash           = kpi.totalSavings       // raw savings deposits received
                            + kpi.totalShareCapital
                            + (kpi.loanRepayments - kpi.totalLoanInterest) // principal repaid only (interest excluded to avoid double-count)
                            + kpi.totalIncome       // all income: loan interest + investment returns + other + penalties
                            // welfare excluded — treated as a separate fund
                            - kpi.totalLoans        // loans disbursed out
                            - bs_activeInv          // investment capital still deployed
                            - kpi.totalWithdrawals  // savings withdrawals paid out
                            - kpi.totalExpenses;    // Proof: Assets = netSavings + shareCapital + netProfit = Liab + Equity ✅
  const bs_deployableCash = bs_cash - kpi.netSavings;                    // cash excluding members' savings (true deployable portion)
  const bs_totalAssets    = bs_cash + bs_loanBook + bs_invPortfolio;

  // LIABILITIES
  const bs_savingsLiab    = kpi.netSavings;                              // deposits owed back to members
  const bs_welfareFund    = kpi.welfare;                                 // welfare pool — treated as separate fund (excluded from balance sheet liabilities)
  const bs_totalLiab      = bs_savingsLiab;                              // welfare excluded — it is a separate fund, not a SACCO liability

  // EQUITY
  const bs_shareCapital   = kpi.totalShareCapital;
  const bs_retainedProfit = kpi.netProfit;                               // full undistributed earnings
  const bs_totalEquity    = bs_shareCapital + bs_retainedProfit;

  // RECONCILIATION
  const bs_balanceCheck   = bs_totalAssets - bs_totalLiab - bs_totalEquity; // should be ~0

  // LIQUIDITY RATIOS
  const bs_liquidityRatio    = bs_savingsLiab > 0 ? bs_deployableCash / bs_savingsLiab : null;   // deployable cash cover on savings (excludes savings themselves)
  const bs_loanToDeposit     = bs_savingsLiab > 0 ? bs_loanBook / bs_savingsLiab : null;
  const bs_debtToEquity      = bs_totalEquity > 0 ? bs_totalLiab / bs_totalEquity : null;
  const bs_savingsDepth      = kpi.totalSavings > 0 ? (kpi.netSavings / kpi.totalSavings) * 100 : null; // net retention %

  // Per-member savings average
  const bs_activeMemberCount = data.members.filter(m => m.status !== "Inactive").length || 1;
  const bs_avgSavingsPerMember = kpi.netSavings / bs_activeMemberCount;

  // Member savings breakdown table
  const memberSavingsRows = data.members.map(m => {
    const deposits    = data.savings.filter(s => String(s.memberId).trim() === String(m.id).trim()).reduce((a,s) => a + Number(s.amount||0), 0);
    const withdrawals = data.withdrawals.filter(w => w.memberId === m.id).reduce((a,w) => a + Number(w.amount||0) + Number(w.charge||0), 0);
    const balance     = deposits - withdrawals;
    const loanBal     = data.loans.filter(l => String(l.memberId).trim() === String(m.id).trim() && l.status !== "Paid").reduce((a,l) => a + Number(l.balance||0), 0);
    const pct         = kpi.netSavings > 0 ? ((balance / kpi.netSavings) * 100).toFixed(1) : "0.0";
    return { id: m.id, name: m.fullName, deposits, withdrawals, balance, loanBal, pct };
  }).filter(r => r.deposits > 0 || r.balance !== 0).sort((a,b) => b.balance - a.balance);

  const handleBalancePDF = () => {
    const memberRows = memberSavingsRows.map(r =>
      `<tr><td>${r.id}</td><td>${r.name}</td><td>${fmt(r.deposits)}</td><td>${fmt(r.withdrawals)}</td><td style="font-weight:700">${fmt(r.balance)}</td><td>${r.pct}%</td><td>${fmt(r.loanBal)}</td></tr>`
    ).join("");
    const html = `
      <h1>ACUJUS Balance Sheet &amp; Liquidity Report</h1>
      <div class="meta">As at: ${new Date().toLocaleDateString()} &nbsp;|&nbsp; Generated: ${new Date().toLocaleString()}</div>

      <div class="kpi-grid">
        <div class="kpi"><div class="val">${fmt(bs_totalAssets)}</div><div class="lbl">Total Assets</div></div>
        <div class="kpi"><div class="val">${fmt(bs_totalLiab)}</div><div class="lbl">Total Liabilities</div></div>
        <div class="kpi"><div class="val">${fmt(bs_totalEquity)}</div><div class="lbl">Members' Equity</div></div>
        <div class="kpi"><div class="val">${bs_liquidityRatio !== null ? (bs_liquidityRatio * 100).toFixed(1) + "%" : "N/A"}</div><div class="lbl">Cash Cover Ratio</div></div>
      </div>

      <h2>Assets</h2>
      <table><thead><tr><th>Item</th><th>Amount (UGX)</th></tr></thead><tbody>
        <tr><td>Total Cash Pool (incl. Members' Savings in trust)</td><td>${fmt(bs_cash)}</td></tr>
        <tr><td>&nbsp;&nbsp;↳ Net Deployable Cash (excl. ${fmt(bs_savingsLiab)} savings)</td><td>${fmt(bs_deployableCash)}</td></tr>
        <tr><td>Loan Book (Outstanding Principal)</td><td>${fmt(bs_loanBook)}</td></tr>
        <tr><td>Investment Portfolio (Active)</td><td>${fmt(bs_invPortfolio)}</td></tr>
        <tr style="font-weight:700"><td>TOTAL ASSETS</td><td>${fmt(bs_totalAssets)}</td></tr>
      </tbody></table>

      <h2>Liabilities</h2>
      <table><thead><tr><th>Item</th><th>Amount (UGX)</th></tr></thead><tbody>
        <tr><td>Members' Savings (Net Balance Owed)</td><td>${fmt(bs_savingsLiab)}</td></tr>
        <tr style="font-weight:700"><td>TOTAL LIABILITIES</td><td>${fmt(bs_totalLiab)}</td></tr>
      </tbody></table>

      <h2>Members' Equity</h2>
      <table><thead><tr><th>Item</th><th>Amount (UGX)</th></tr></thead><tbody>
        <tr><td>Share Capital</td><td>${fmt(bs_shareCapital)}</td></tr>
        <tr><td>Retained Earnings (Net Profit: Income − Expenses)</td><td>${fmt(bs_retainedProfit)}</td></tr>
        <tr style="font-weight:700"><td>TOTAL EQUITY</td><td>${fmt(bs_totalEquity)}</td></tr>
      </tbody></table>

      <h2>Liquidity Ratios</h2>
      <table><thead><tr><th>Ratio</th><th>Value</th><th>Interpretation</th></tr></thead><tbody>
        <tr><td>Cash Cover Ratio (Cash / Savings Liability)</td><td>${bs_liquidityRatio !== null ? (bs_liquidityRatio * 100).toFixed(1) + "%" : "N/A"}</td><td>${bs_liquidityRatio === null ? "—" : bs_liquidityRatio >= 0.5 ? "✅ Healthy" : bs_liquidityRatio >= 0.2 ? "⚠ Moderate" : "🔴 Low"}</td></tr>
        <tr><td>Loan-to-Deposit Ratio</td><td>${bs_loanToDeposit !== null ? (bs_loanToDeposit * 100).toFixed(1) + "%" : "N/A"}</td><td>${bs_loanToDeposit !== null ? bs_loanToDeposit <= 0.8 ? "✅ Healthy" : "⚠ High exposure" : "—"}</td></tr>
        <tr><td>Debt-to-Equity Ratio</td><td>${bs_debtToEquity !== null ? bs_debtToEquity.toFixed(2) + "x" : "N/A"}</td><td>${bs_debtToEquity !== null ? bs_debtToEquity <= 2 ? "✅ Healthy" : "⚠ Leveraged" : "—"}</td></tr>
        <tr><td>Savings Retention Rate</td><td>${bs_savingsDepth !== null ? bs_savingsDepth.toFixed(1) + "%" : "N/A"}</td><td>Net savings / Gross savings deposited</td></tr>
        <tr><td>Avg Savings per Active Member</td><td>${fmt(bs_avgSavingsPerMember)}</td><td>${bs_activeMemberCount} active members</td></tr>
      </tbody></table>

      <h2>Member Savings Breakdown</h2>
      <table><thead><tr><th>Member ID</th><th>Name</th><th>Total Deposited</th><th>Withdrawals</th><th>Net Balance</th><th>% of Pool</th><th>Loan Balance</th></tr></thead><tbody>
        ${memberRows}
        <tr style="font-weight:700"><td colspan="2">TOTAL</td><td>${fmt(memberSavingsRows.reduce((a,r)=>a+r.deposits,0))}</td><td>${fmt(memberSavingsRows.reduce((a,r)=>a+r.withdrawals,0))}</td><td>${fmt(kpi.netSavings)}</td><td>100%</td><td>${fmt(memberSavingsRows.reduce((a,r)=>a+r.loanBal,0))}</td></tr>
      </tbody></table>
    `;
    printStyledHTML("ACUJUS Balance Sheet & Liquidity Report", html);
  };

  return (
    <div>
      {/* ── Top-level Report tab switcher ── */}
      <div style={{ display: "flex", gap: 0, marginBottom: 14, borderRadius: 8, overflow: "hidden", border: "1px solid #1e3a5f", width: "fit-content" }}>
        {[["income","📊 Income Statement"],["balance","🏦 Balance Sheet & Liquidity"]].map(([v,l]) => (
          <button key={v} onClick={() => setReportTab(v)} style={{
            background: reportTab === v ? "#1d4ed8" : "#0f172a",
            color: reportTab === v ? "#fff" : "#64748b",
            border: "none", padding: "8px 18px", fontSize: 12, fontWeight: reportTab === v ? 700 : 400,
            cursor: "pointer", borderRight: "1px solid #1e3a5f", whiteSpace: "nowrap",
          }}>{l}</button>
        ))}
      </div>

      {/* ══════════════════════════════════════════════════════════════════════
          INCOME STATEMENT TAB
      ══════════════════════════════════════════════════════════════════════ */}
      {reportTab === "income" && <div>

      {/* ── Filter bar ── */}
      <div style={{ background: "#0a0f1e", border: "1px solid #1e293b", borderRadius: 10, padding: "12px 16px", marginBottom: 14, display: "flex", flexWrap: "wrap", alignItems: "center", gap: 10 }}>

        {/* Mode pills */}
        <div style={{ display: "flex", borderRadius: 7, overflow: "hidden", border: "1px solid #1e3a5f", flexShrink: 0 }}>
          {[["year","Full Year"],["quarter","Quarter"],["month","Month"],["custom","Custom"]].map(([v,l]) => (
            <button key={v} onClick={() => setMode(v)} style={{
              background: mode===v ? "#1d4ed8" : "#0f172a", color: mode===v ? "#fff" : "#64748b",
              border: "none", padding: "6px 13px", fontSize: 12, fontWeight: mode===v?700:400, cursor: "pointer",
              borderRight: "1px solid #1e3a5f", whiteSpace: "nowrap",
            }}>{l}</button>
          ))}
        </div>

        {/* Year picker — always shown */}
        <select value={year} onChange={e => setYear(Number(e.target.value))} style={selStyle}>
          {Array.from({length: 8}, (_,i) => curYear - 3 + i).map(y => <option key={y} value={y}>{y}</option>)}
        </select>

        {/* Quarter picker */}
        {mode === "quarter" && (
          <select value={quarter} onChange={e => setQuarter(Number(e.target.value))} style={selStyle}>
            <option value={1}>Q1 (Jan–Mar)</option>
            <option value={2}>Q2 (Apr–Jun)</option>
            <option value={3}>Q3 (Jul–Sep)</option>
            <option value={4}>Q4 (Oct–Dec)</option>
          </select>
        )}

        {/* Month picker */}
        {mode === "month" && (
          <select value={month} onChange={e => setMonth(Number(e.target.value))} style={selStyle}>
            {MONTHS.map((m,i) => <option key={i} value={i}>{m}</option>)}
          </select>
        )}

        {/* Custom date pickers */}
        {mode === "custom" && (<>
          <input type="date" value={customFrom} onChange={e => setCustomFrom(e.target.value)} style={{ ...selStyle, minWidth: 130 }} />
          <span style={{ color: "#475569", fontSize: 12 }}>to</span>
          <input type="date" value={customTo} onChange={e => setCustomTo(e.target.value)} style={{ ...selStyle, minWidth: 130 }} />
        </>)}

        {/* Active range label */}
        <span style={{ fontSize: 11, color: "#3b82f6", fontWeight: 600, marginLeft: 4, letterSpacing: 0.3 }}>
          📅 {rangeLabel}
        </span>

        {/* Spacer + exports */}
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <ExportCSVButton label="⬇ CSV" onClick={handleCSV} />
          <ExportPDFButton label="⬇ PDF" onClick={handlePDF} />
        </div>

// ─── Generic Table ────────────────────────────────────────────────────────────
// ─── Resizable Column Hook ────────────────────────────────────────────────────
function useResizableCols(initialCols, defaultWidth = 140) {
  const [widths, setWidths] = useState(() => initialCols.map(() => defaultWidth));
  const dragging = React.useRef(null);

  const onMouseDown = (idx, e) => {
    e.preventDefault();
    dragging.current = { idx, startX: e.clientX, startW: widths[idx] };
    const onMove = (me) => {
      if (!dragging.current) return;
      const delta = me.clientX - dragging.current.startX;
      const newW = Math.max(60, dragging.current.startW + delta);
      setWidths(ws => ws.map((w, i) => i === dragging.current.idx ? newW : w));
    };
    const onUp = () => { dragging.current = null; window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };

  // Touch support
  const onTouchStart = (idx, e) => {
    const t = e.touches[0];
    dragging.current = { idx, startX: t.clientX, startW: widths[idx] };
    const onMove = (te) => {
      if (!dragging.current) return;
      const delta = te.touches[0].clientX - dragging.current.startX;
      const newW = Math.max(60, dragging.current.startW + delta);
      setWidths(ws => ws.map((w, i) => i === dragging.current.idx ? newW : w));
    };
    const onEnd = () => { dragging.current = null; window.removeEventListener("touchmove", onMove); window.removeEventListener("touchend", onEnd); };
    window.addEventListener("touchmove", onMove);
    window.addEventListener("touchend", onEnd);
  };

  return { widths, setWidths, onMouseDown, onTouchStart };
}

function ResizableHeader({ label, width, onMouseDown, onTouchStart }) {
  return (
    <th style={{ ...styles.th, width, minWidth: width, maxWidth: width, position: "relative", userSelect: "none" }}>
      <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", display: "block", paddingRight: 12 }}>{label}</span>
      <div
        onMouseDown={onMouseDown}
        onTouchStart={onTouchStart}
        title="Drag to resize"
        style={{ position: "absolute", right: 0, top: 0, bottom: 0, width: 8, cursor: "col-resize", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2 }}
      >
        <div style={{ width: 2, height: "60%", background: "#334155", borderRadius: 2 }} />
      </div>

}

function GenericTable({ rows, cols, keys, fmtKeys = {}, onDelete }) {
  const showActions = !!onDelete;
  const allCols = showActions ? [...cols, "Actions"] : cols;
  const { widths, onMouseDown, onTouchStart } = useResizableCols(allCols, 130);
  return (
    <div style={{ ...styles.tableWrap, overflow: "auto" }}>
      <table style={{ ...styles.table, tableLayout: "fixed", width: widths.reduce((a, b) => a + b, 0) }}>
        <colgroup>{allCols.map((_, i) => <col key={i} style={{ width: widths[i] }} />)}</colgroup>
        <thead><tr>
          {allCols.map((h, i) => (
            <ResizableHeader key={h} label={h} width={widths[i]}
              onMouseDown={e => onMouseDown(i, e)}
              onTouchStart={e => onTouchStart(i, e)}
            />
          ))}
        </tr></thead>
        <tbody>
          {rows.length === 0 && <tr><td colSpan={allCols.length} style={styles.empty}>No records yet</td></tr>}
          {rows.map((row, i) => (
            <tr key={i} style={styles.tr}>
              {keys.map(k => (
                <td key={k} style={{ ...styles.td, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {fmtKeys[k] ? fmtKeys[k](row[k]) : row[k] || "-"}
                </td>
              ))}
              {showActions && (
                <td style={{ ...styles.td, whiteSpace: "nowrap" }}>
                  <button style={{ ...styles.btnSm, ...styles.btnDanger }} onClick={() => onDelete(row)}>Del</button>
                </td>
              )}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// Helper: wrap any inline table with resizable headers
function ResizableTableWrap({ headers, children, defaultWidth = 130 }) {
  const { widths, onMouseDown, onTouchStart } = useResizableCols(headers, defaultWidth);
  return (
    <div style={{ ...styles.tableWrap, overflow: "auto" }}>
      <table style={{ ...styles.table, tableLayout: "fixed", width: widths.reduce((a, b) => a + b, 0) }}>
        <colgroup>{headers.map((_, i) => <col key={i} style={{ width: widths[i] }} />)}</colgroup>
        <thead><tr>
          {headers.map((h, i) => (
            <ResizableHeader key={h + i} label={h} width={widths[i]}
              onMouseDown={e => onMouseDown(i, e)}
              onTouchStart={e => onTouchStart(i, e)}
            />
          ))}
        </tr></thead>
        {children}
      </table>
    </div>
  );
}

function Modal({ modal, setModal, data, persist }) {

    return <UserModal close={close} data={data} persist={persist} editing={modal.type === "editUser" ? modal.payload : null} />;
  }
  if (modal.type === "addMember" || modal.type === "editMember") {
    return <MemberModal close={close} data={data} persist={persist} editing={modal.payload} />;
  }
  if (modal.type === "addSaving") return <SavingModal close={close} data={data} persist={persist} prefillMemberId={modal.payload?.prefillMemberId} />;
  if (modal.type === "addWithdrawal") return <WithdrawalModal close={close} data={data} persist={persist} prefillMemberId={modal.payload?.prefillMemberId} />;
  if (modal.type === "addLoan") return <LoanModal close={close} data={data} persist={persist} />;
  if (modal.type === "addLoanApplication") return <LoanApplicationModal close={close} data={data} persist={persist} prefillMemberId={modal.payload?.prefillMemberId} />;
  if (modal.type === "reviewLoanApplication") return <ReviewLoanApplicationModal close={close} data={data} persist={persist} payload={modal.payload} />;
  if (modal.type === "addMobileDeposit") return <MobileDepositModal close={close} data={data} persist={persist} prefillMemberId={modal.payload?.prefillMemberId} prefillDepositType={modal.payload?.prefillDepositType} />;
  if (modal.type === "reviewMobileDeposit") return <ReviewMobileDepositModal close={close} data={data} persist={persist} payload={modal.payload} />;
  if (modal.type === "recordPayment") return <PaymentModal close={close} data={data} persist={persist} loanInfo={modal.payload} />;
  if (modal.type === "loanSchedule") return <LoanScheduleModal close={close} loan={modal.payload} />;
  if (modal.type === "addInvestment" || modal.type === "editInvestment") return <InvestmentModal close={close} data={data} persist={persist} editing={modal.payload} />;
  if (modal.type === "addSharePurchase") return <SharePurchaseModal close={close} data={data} persist={persist} />;
  if (modal.type === "addShareTransfer") return <ShareTransferModal close={close} data={data} persist={persist} />;
  if (modal.type === "editShareEntry") return <EditShareEntryModal close={close} data={data} persist={persist} payload={modal.payload} />;
  if (modal.type === "exchangeSavingsShares") return <ExchangeSavingsSharesModal close={close} data={data} persist={persist} />;
  if (modal.type === "revalueShares") return <RevalueSharesModal close={close} data={data} persist={persist} payload={modal.payload} />;
  if (modal.type === "adjustShareCapacity") return <AdjustShareCapacityModal close={close} data={data} persist={persist} payload={modal.payload} />;
  if (modal.type === "addExpense") return <ExpenseModal close={close} data={data} persist={persist} />;
  if (modal.type === "addOtherIncome") return <OtherIncomeModal close={close} data={data} persist={persist} />;
  if (modal.type === "addWelfare") return <WelfareModal close={close} data={data} persist={persist} />;
