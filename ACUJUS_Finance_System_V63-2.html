function AnnouncementManager({ announcements, persist, onClose }) {
  const list = announcements || [];
  const EMPTY_FORM = { message: "", type: "Announcement", active: true, mediaType: null, mediaData: "" };
  const [form, setForm] = useState(EMPTY_FORM);
  const [mediaTab, setMediaTab] = useState("none"); // "none" | "image" | "video" | "youtube"
  const [uploading, setUploading] = useState(false);
  const fileRef = React.useRef();

  const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));

  // Convert file to base64
  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const isVideo = file.type.startsWith("video/");
    const isImage = file.type.startsWith("image/");
    if (!isVideo && !isImage) return alert("Please select an image or video file.");
    const maxMB = isVideo ? 20 : 5;
    if (file.size > maxMB * 1024 * 1024) return alert(`File too large. Max ${maxMB}MB.`);
    setUploading(true);
    const reader = new FileReader();
    reader.onload = (ev) => {
      setF("mediaData", ev.target.result);
      setF("mediaType", isVideo ? "video" : "image");
      setUploading(false);
    };
    reader.readAsDataURL(file);
  };

  const add = () => {
    if (!form.message.trim()) return alert("Message is required.");
    const entry = {
      ...form,
      mediaType: mediaTab === "none" ? null : mediaTab,
      mediaData: mediaTab === "none" ? "" : (mediaTab === "youtube" ? form.mediaData : form.mediaData),
      id: `ANN${Date.now()}`,
      createdAt: today(),
    };
    persist("announcements", [...list, entry]);
    setForm(EMPTY_FORM);
    setMediaTab("none");
  };

  const toggle = (id) => persist("announcements", list.map(a => a.id === id ? { ...a, active: !a.active } : a));
  const remove = (id) => { if (confirm("Delete this announcement?")) persist("announcements", list.filter(a => a.id !== id)); };

  const mediaTabStyle = (t) => ({
    flex: 1, padding: "6px 4px", borderRadius: 6,
    border: `2px solid ${mediaTab === t ? "#3b82f6" : "#1e293b"}`,
    background: mediaTab === t ? "#1e3a5f" : "#1e293b",
    color: mediaTab === t ? "#93c5fd" : "#64748b",
    fontWeight: 700, fontSize: 11, cursor: "pointer",
  });

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.75)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center" }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: "#0f172a", border: "1px solid #1e293b", borderRadius: 12, width: "min(620px,97vw)", maxHeight: "90vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>

        {/* Header */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "15px 20px", borderBottom: "1px solid #1e293b" }}>
          <div style={{ fontWeight: 800, fontSize: 15, color: "#f1f5f9" }}>📢 Manage Announcements, Adverts & Promotions</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: "#64748b", fontSize: 20, cursor: "pointer" }}>✕</button>
        </div>

        {/* Add new form */}
        <div style={{ padding: "14px 20px", borderBottom: "1px solid #1e293b", display: "flex", flexDirection: "column", gap: 10 }}>
          {/* Type selector */}
          <div style={{ display: "flex", gap: 8 }}>
            {Object.entries(ANNC_COLORS).map(([type, cfg]) => (
              <button key={type} onClick={() => setF("type", type)} style={{ flex: 1, padding: "7px 4px", borderRadius: 7, border: `2px solid ${form.type === type ? cfg.badge : "#1e293b"}`, background: form.type === type ? cfg.bg : "#1e293b", color: form.type === type ? cfg.badge : "#64748b", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>
                {cfg.icon} {type}
              </button>
            ))}
          </div>

          {/* Message */}
          <textarea
            style={{ width: "100%", background: "#1e293b", border: "1px solid #334155", borderRadius: 6, padding: "8px 12px", color: "#f1f5f9", fontSize: 13, resize: "vertical", minHeight: 52, boxSizing: "border-box" }}
            placeholder="Type your message / caption here…"
            value={form.message}
            onChange={e => setF("message", e.target.value)}
            rows={2}
          />

          {/* Media type tabs */}
          <div>
            <div style={{ fontSize: 11, color: "#64748b", fontWeight: 600, marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.5 }}>Attach Media (optional)</div>
            <div style={{ display: "flex", gap: 6 }}>
              <button style={mediaTabStyle("none")}    onClick={() => setMediaTab("none")}>✕ None</button>
              <button style={mediaTabStyle("image")}   onClick={() => { setMediaTab("image");   fileRef.current && (fileRef.current.accept="image/*",  fileRef.current.click()); }}>🖼 Image</button>
              <button style={mediaTabStyle("video")}   onClick={() => { setMediaTab("video");   fileRef.current && (fileRef.current.accept="video/*",  fileRef.current.click()); }}>🎬 Video</button>
              <button style={mediaTabStyle("youtube")} onClick={() => setMediaTab("youtube")}>▶ YouTube</button>
            </div>
            <input ref={fileRef} type="file" style={{ display: "none" }} onChange={handleFile} />
          </div>

          {/* YouTube URL input */}
          {mediaTab === "youtube" && (
            <input
              style={{ width: "100%", background: "#1e293b", border: "1px solid #334155", borderRadius: 6, padding: "8px 12px", color: "#f1f5f9", fontSize: 13, boxSizing: "border-box" }}
              placeholder="Paste YouTube URL or video ID (e.g. https://youtu.be/xxxxx)"
              value={form.mediaData}
              onChange={e => setF("mediaData", e.target.value)}
            />
          )}

          {/* Media preview */}
          {(mediaTab === "image" || mediaTab === "video") && form.mediaData && (
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {mediaTab === "image" && <img src={form.mediaData} alt="preview" style={{ height: 60, borderRadius: 6, objectFit: "cover" }} />}
              {mediaTab === "video" && <video src={form.mediaData} style={{ height: 60, borderRadius: 6 }} muted />}
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700 }}>✓ {mediaTab === "image" ? "Image" : "Video"} loaded</div>
                <button onClick={() => { setF("mediaData", ""); setMediaTab("none"); }} style={{ background: "none", border: "none", color: "#f87171", fontSize: 11, cursor: "pointer", padding: 0 }}>Remove</button>
              </div>
              {uploading && <span style={{ fontSize: 12, color: "#94a3b8" }}>Loading…</span>}
            </div>
          )}
          {mediaTab === "youtube" && form.mediaData && (
            <div style={{ fontSize: 12, color: "#4ade80" }}>✓ YouTube link set</div>
          )}

          {/* Active + Add button */}
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8", cursor: "pointer", flex: 1 }}>
              <input type="checkbox" checked={form.active} onChange={e => setF("active", e.target.checked)} />
              Show immediately (active)
            </label>
            <button onClick={add} style={{ background: "#3b82f6", color: "#fff", border: "none", borderRadius: 7, padding: "9px 22px", fontWeight: 700, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>
              + Add {form.type}
            </button>
          </div>
        </div>

        {/* List of all announcements */}
        <div style={{ flex: 1, overflowY: "auto", padding: "10px 20px", display: "flex", flexDirection: "column", gap: 8 }}>
          {list.length === 0 && <div style={{ color: "#475569", fontSize: 13, textAlign: "center", padding: "24px 0" }}>No announcements yet. Add one above.</div>}
          {list.map(a => {
            const c = ANNC_COLORS[a.type] || ANNC_COLORS.Announcement;
            const hasMed = a.mediaType && a.mediaData;
            return (
              <div key={a.id} style={{ background: a.active ? c.bg : "#0f172a", border: `1px solid ${a.active ? c.border : "#1e293b"}`, borderRadius: 9, overflow: "hidden", opacity: a.active ? 1 : 0.5 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 13px" }}>
                  <span style={{ fontSize: 10, fontWeight: 800, background: c.badge, color: "#fff", borderRadius: 4, padding: "2px 6px", flexShrink: 0 }}>{c.icon} {a.type}</span>
                  {hasMed && <span style={{ fontSize: 11, color: c.badge, flexShrink: 0 }}>{a.mediaType === "image" ? "🖼" : a.mediaType === "youtube" ? "▶" : "🎬"}</span>}
                  <span style={{ flex: 1, fontSize: 12, color: "#e2e8f0", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{a.message}</span>
                  <button onClick={() => toggle(a.id)} style={{ background: a.active ? "#166534" : "#1e293b", border: "none", color: a.active ? "#4ade80" : "#64748b", borderRadius: 5, padding: "3px 9px", fontSize: 11, cursor: "pointer", fontWeight: 700, flexShrink: 0 }}>{a.active ? "ON" : "OFF"}</button>
                  <button onClick={() => remove(a.id)} style={{ background: "none", border: "1px solid #7f1d1d", color: "#f87171", borderRadius: 5, padding: "3px 8px", fontSize: 11, cursor: "pointer", flexShrink: 0 }}>Del</button>
                </div>
                {/* Media thumbnail preview in list */}
                {hasMed && a.mediaType === "image" && (
                  <div style={{ padding: "0 13px 10px" }}>
                    <img src={a.mediaData} alt="" style={{ height: 48, borderRadius: 5, objectFit: "cover" }} />
                  </div>
                )}
                {hasMed && (a.mediaType === "video") && (
                  <div style={{ padding: "0 13px 10px", fontSize: 11, color: "#64748b" }}>🎬 Video attached</div>
                )}
                {hasMed && a.mediaType === "youtube" && (
                  <div style={{ padding: "0 13px 10px", fontSize: 11, color: "#64748b" }}>▶ YouTube: {a.mediaData.slice(0, 50)}</div>
                )}
              </div>
            );
          })}
        </div>

        <div style={{ padding: "10px 20px", borderTop: "1px solid #1e293b", fontSize: 11, color: "#334155", textAlign: "center" }}>
          All items show to every logged-in user in real-time · Images max 5MB · Videos max 20MB
        </div>
      </div>
    </div>
  );
}

// ─── My Statement (Member self-service view) ──────────────────────────────────

function MyStatement({ data, persist, setModal, currentUser, kpi }) {

  const [activeTab, setActiveTab] = React.useState("personal");

  const tabStyle = (id) => ({
    padding: "8px 22px", borderRadius: 6, fontWeight: 700, fontSize: 13, cursor: "pointer",
    border: "1px solid",

    borderColor: activeTab === id ? (id === "personal" ? "#3b82f6" : "#16a34a") : "#1e293b",
    color: activeTab === id ? (id === "personal" ? "#93c5fd" : "#4ade80") : "#64748b",
    transition: "all 0.15s",
  });

  return (
    <div>
      {isStaff && (
        <div style={{ display:"flex", gap:8, marginBottom:18 }}>
          <button style={tabStyle("personal")} onClick={() => setActiveTab("personal")}>👤 Personal Account</button>
          <button style={tabStyle("admin")} onClick={() => setActiveTab("admin")}>🏢 Administrative View</button>

}

// ─── Administrative view shown on the admin tab ───────────────────────────────
function MyAdminView({ data, currentUser, kpi, setModal }) {
  const role = currentUser?.role;
  const pendingDeposits  = (data.mobileDeposits  || []).filter(d => d.status === "Pending");
  const pendingLoanApps  = (data.loanApplications || []).filter(a => a.status === "Pending");
  const overdueLoans     = (data.loans || []).filter(l => l.status !== "Paid" && l.dueDate && l.dueDate < new Date().toISOString().slice(0,10));
  const activeLoans      = (data.loans || []).filter(l => l.status === "Active");
  const totalMembers     = (data.members || []).filter(m => m.status !== "Inactive").length;

  const cardRow = (items) => (
    <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:10, marginBottom:16 }}>
      {items.map(c => (
        <div key={c.label} style={{ ...styles.card, borderLeft:`4px solid ${c.color}` }}>
          <div style={{ ...styles.cardVal, color:c.color }}>{c.val}</div>
          <div style={styles.cardLabel}>{c.label}</div>
        </div>
      ))}
    </div>
  );

  return (
    <div>
      {/* Role badge */}
      <div style={{ background:"linear-gradient(135deg,#0f2011,#0f172a)", border:"1px solid #166534", borderRadius:10, padding:"14px 20px", marginBottom:16, display:"flex", alignItems:"center", gap:14 }}>
        <div style={{ fontSize:32 }}>{role === "Manager" ? "🗂" : role === "Treasurer" ? "💰" : role === "Admin" ? "🛡" : role === "LoanOfficer" ? "📝" : role === "InternalAuditor" ? "🔍" : "🖥"}</div>
        <div>
          <div style={{ fontSize:18, fontWeight:800, color:"#f8fafc" }}>{currentUser.fullName}</div>
          <div style={{ fontSize:12, color:"#64748b" }}>Role: <strong style={{ color: role === "Manager" ? "#86efac" : role === "Treasurer" ? "#fbbf24" : role === "LoanOfficer" ? "#34d399" : role === "InternalAuditor" ? "#f472b6" : "#93c5fd" }}>{role}</strong> &nbsp;·&nbsp; Username: {currentUser.username}</div>
        </div>
      </div>

      {/* Pending actions alert */}
      {(pendingDeposits.length > 0 || pendingLoanApps.length > 0) && (
        <div style={{ background:"#451a03", border:"1px solid #92400e", borderRadius:8, padding:"10px 16px", marginBottom:14, display:"flex", gap:20, flexWrap:"wrap" }}>
          {pendingDeposits.length > 0  && <span style={{ fontSize:13, color:"#fcd34d" }}>📲 {pendingDeposits.length} mobile deposit{pendingDeposits.length > 1 ? "s" : ""} awaiting approval</span>}
          {pendingLoanApps.length > 0  && <span style={{ fontSize:13, color:"#fcd34d" }}>✎ {pendingLoanApps.length} loan application{pendingLoanApps.length > 1 ? "s" : ""} awaiting review</span>}
          {overdueLoans.length > 0     && <span style={{ fontSize:13, color:"#f87171" }}>⚠ {overdueLoans.length} overdue loan{overdueLoans.length > 1 ? "s" : ""}</span>}
        </div>
      )}

      {/* Financial snapshot — all roles */}
      <div style={{ ...styles.panel, marginBottom:14 }}>
        <div style={styles.panelTitle}>ORGANISATION FINANCIAL SNAPSHOT</div>
        {cardRow([
          { label:"Net Savings Balance",   val: fmt(kpi.netSavings),      color:"#22c55e" },
          { label:"Outstanding Loans",     val: fmt(kpi.outstandingLoans),color:"#f87171" },
          { label:"Deployable Fund",       val: fmt(kpi.deployableFund),  color:"#14b8a6" },
          { label:"Net Profit (All-time)", val: fmt(kpi.netProfit),       color:"#0ea5e9" },
          { label:"Total Members",         val: totalMembers,             color:"#f97316" },
          { label:"Welfare Fund",          val: fmt(kpi.welfare),         color:"#a855f7" },
        ])}
      </div>

      {/* Loan health — Treasurer / Admin */}
      {(role === "Treasurer" || role === "Admin") && (
        <div style={{ ...styles.panel, marginBottom:14 }}>
          <div style={styles.panelTitle}>LOAN PORTFOLIO HEALTH</div>
          {cardRow([
            { label:"Active Loans",   val: activeLoans.length,  color:"#f59e0b" },
            { label:"Overdue Loans",  val: overdueLoans.length, color:"#ef4444" },
            { label:"Total Disbursed",val: fmt(kpi.totalLoans), color:"#f97316" },
            { label:"Total Interest Collected", val: fmt(kpi.totalLoanInterest), color:"#22c55e" },
          ])}
          {overdueLoans.length > 0 && (
            <ResizableTableWrap headers={["Loan ID","Member","Amount","Due Date","Days Overdue"]} defaultWidth={130}>
              <tbody>
                {overdueLoans.slice(0,10).map((l,i) => {
                  const days = Math.floor((Date.now() - new Date(l.dueDate)) / 86400000);
                  return (
                    <tr key={i} style={styles.tr}>
                      <td style={{ ...styles.td, fontFamily:"monospace" }}>{l.loanId}</td>
                      <td style={styles.td}>{l.memberName || l.memberId}</td>
                      <td style={{ ...styles.td, color:"#f87171", fontWeight:700 }}>{fmt(l.balance)}</td>
                      <td style={styles.td}>{l.dueDate}</td>
                      <td style={{ ...styles.td, color:"#ef4444", fontWeight:700 }}>{days}d</td>
                    </tr>
                  );
                })}
              </tbody>
            </ResizableTableWrap>
          )}
        </div>
      )}

      {/* Pending deposits queue — Manager / Admin */}
      {(role === "Manager" || role === "Admin") && pendingDeposits.length > 0 && (
        <div style={{ ...styles.panel, marginBottom:14 }}>
          <div style={styles.panelTitle}>PENDING MOBILE DEPOSITS ({pendingDeposits.length})</div>
          <ResizableTableWrap headers={["Date","Member","Amount","Type","Ref"]} defaultWidth={130}>
            <tbody>
              {pendingDeposits.slice(0,15).map((d,i) => (
                <tr key={i} style={styles.tr}>
                  <td style={styles.td}>{d.date}</td>
                  <td style={styles.td}>{d.memberName || d.memberId}</td>
                  <td style={{ ...styles.td, color:"#22c55e", fontWeight:700 }}>{fmt(d.amount)}</td>
                  <td style={styles.td}>{d.depositType || "Savings"}</td>
                  <td style={{ ...styles.td, fontFamily:"monospace", color:"#93c5fd" }}>{d.networkRef || "—"}</td>
                </tr>
              ))}
            </tbody>
          </ResizableTableWrap>
        </div>
      )}

      {/* Pending loan applications — Manager / Admin */}
      {(role === "Manager" || role === "Admin") && pendingLoanApps.length > 0 && (
        <div style={{ ...styles.panel, marginBottom:14 }}>
          <div style={styles.panelTitle}>PENDING LOAN APPLICATIONS ({pendingLoanApps.length})</div>
          <ResizableTableWrap headers={["App ID","Member","Amount Requested","Date","Status"]} defaultWidth={130}>
            <tbody>
              {pendingLoanApps.slice(0,15).map((a,i) => (
                <tr key={i} style={styles.tr}>
                  <td style={{ ...styles.td, fontFamily:"monospace" }}>{a.appId || a.id}</td>
                  <td style={styles.td}>{a.memberName || a.memberId}</td>
                  <td style={{ ...styles.td, color:"#f59e0b", fontWeight:700 }}>{fmt(a.amount || a.loanAmount)}</td>
                  <td style={styles.td}>{a.date}</td>
                  <td style={styles.td}><span style={{ ...styles.badge, background:"#3b2100", color:"#fcd34d" }}>{a.status}</span></td>
                </tr>
              ))}
            </tbody>
          </ResizableTableWrap>
        </div>
      )}
    </div>
  );
}

// ─── Personal member statement ────────────────────────────────────────────────
function MyPersonalStatement({ data, persist, setModal, currentUser }) {
  // Link user account to a member record via:
  // 1. member.userId === currentUser.id  (linked from Members side)
  // 2. currentUser.linkedMemberId === member.id  (linked from Users side)
  // 3. member.username === currentUser.username  (legacy username match)
  const member = data.members.find(m =>
    m.userId === currentUser.id ||
    (currentUser.linkedMemberId && m.id === currentUser.linkedMemberId) ||
    m.username === currentUser.username
  );

  if (!member) {
    return (
      <div style={{ textAlign:"center", padding:60 }}>
        <div style={{ fontSize:48, marginBottom:12 }}>🔗</div>
        <div style={{ fontSize:18, fontWeight:700, color:"#f8fafc", marginBottom:8 }}>Account Not Linked</div>
        <div style={{ fontSize:14, color:"#64748b", maxWidth:400, margin:"0 auto" }}>
          Your user account (<strong style={{ color:"#93c5fd" }}>{currentUser.username}</strong>) is not yet linked to a member record.
          Please ask an <strong>Administrator</strong> to link your account in the Members section.
        </div>
      </div>
    );
  }

  // Member's own savings and withdrawals
  const mySavings = data.savings.filter(s => s.memberId === member.id);
  const myWithdrawals = (data.withdrawals || []).filter(w => w.memberId === member.id);
  const totalDeposited = mySavings.reduce((s, r) => s + Number(r.amount || 0), 0);
  const totalWithdrawn = myWithdrawals.reduce((s, r) => s + Number(r.amount || 0) + Number(r.charge || 0), 0);
  const balance = totalDeposited - totalWithdrawn;

  // Member's shares
  const sc = data.shareCapital || [];
  const bought    = sc.filter(e => e.memberId === member.id && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
  const received  = sc.filter(e => e.toMemberId === member.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
  const sent      = sc.filter(e => e.memberId === member.id && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
  const sharesHeld = bought + received - sent;
  const shareValue = sharesHeld * SHARE_PRICE;

  const exportPDF = () => {
    const myLoans = data.loans.filter(l => String(l.memberId).trim() === String(member.id).trim());
    const myRepayments = (data.mobileDeposits || []).filter(d => d.memberId === member.id && d.depositType === "Loan Repayment");
    const myShares = sc.filter(e => e.memberId === member.id || e.toMemberId === member.id);
    const savingsRows = [...mySavings].reverse().map(s => `<tr><td>${s.date}</td><td>${fmt(s.amount)}</td><td>${s.month}</td><td>${s.year}</td></tr>`).join("");
    const withdrawalRows = [...myWithdrawals].reverse().map(w => `<tr><td>${w.date}</td><td>${fmt(w.amount)}</td><td>${fmt(w.charge||0)}</td><td>${fmt(Number(w.amount||0)+Number(w.charge||0))}</td><td>${w.reason||"-"}</td></tr>`).join("");
    const loanRows = myLoans.map(l => `<tr><td>${l.loanId}</td><td>${fmt(l.loanAmount)}</td><td>${l.interestRate}%</td><td>${fmt(l.totalPayable)}</td><td>${fmt(l.amountPaid)}</td><td>${fmt(l.balance)}</td><td>${l.dueDate||"—"}</td><td><span class="badge ${l.status==="Paid"?"badge-green":"badge-yellow"}">${l.status}</span></td></tr>`).join("");
    const repayRows = myRepayments.map(d => `<tr><td>${d.date}</td><td>${d.loanId||"—"}</td><td>${fmt(d.amount)}</td><td>${d.networkRef||"—"}</td><td>${d.month} ${d.year}</td><td><span class="badge ${d.status==="Approved"?"badge-green":d.status==="Rejected"?"badge-red":"badge-yellow"}">${d.status}</span></td></tr>`).join("");
    const shareRows = myShares.map(e => `<tr><td>${e.date}</td><td>${e.type==="Transfer"?(e.toMemberId===member.id?"Received":"Transferred Out"):"Purchase"}</td><td>${Number(e.shares).toFixed(2)}</td><td>${e.amountPaid?fmt(e.amountPaid):"-"}</td><td>${e.receiptNo||"-"}</td></tr>`).join("");
    const html = `
      <h1>Member Statement</h1>
      <div class="meta">Member: <strong>${member.fullName}</strong> &nbsp;|&nbsp; ID: <strong>${member.id}</strong> &nbsp;|&nbsp; Joined: ${member.joinDate} &nbsp;|&nbsp; Status: ${member.status} &nbsp;|&nbsp; Generated: ${new Date().toLocaleDateString()}</div>
      <div class="kpi-grid">
        <div class="kpi"><div class="val">${fmt(totalDeposited)}</div><div class="lbl">Total Deposited</div></div>
        <div class="kpi"><div class="val">${fmt(totalWithdrawn)}</div><div class="lbl">Total Withdrawn</div></div>
        <div class="kpi"><div class="val">${fmt(balance)}</div><div class="lbl">Current Balance</div></div>
        <div class="kpi"><div class="val">${sharesHeld.toFixed(2)} shares</div><div class="lbl">Shares Held (${fmt(shareValue)})</div></div>
      </div>
      ${mySavings.length ? `<h2>Savings History (${mySavings.length} records)</h2><table><thead><tr><th>Date</th><th>Amount</th><th>Month</th><th>Year</th></tr></thead><tbody>${savingsRows}</tbody></table>` : ""}
      ${myWithdrawals.length ? `<h2>Withdrawals (${myWithdrawals.length} records)</h2><table><thead><tr><th>Date</th><th>Amount</th><th>Charge</th><th>Total Deducted</th><th>Reason</th></tr></thead><tbody>${withdrawalRows}</tbody></table>` : ""}
      ${myLoans.length ? `<h2>My Loans (${myLoans.length} records)</h2><table><thead><tr><th>Loan ID</th><th>Amount</th><th>Rate</th><th>Total Pay.</th><th>Paid</th><th>Balance</th><th>Due Date</th><th>Status</th></tr></thead><tbody>${loanRows}</tbody></table>` : ""}
      ${myRepayments.length ? `<h2>Loan Repayments (${myRepayments.length} records)</h2><table><thead><tr><th>Date</th><th>Loan ID</th><th>Amount</th><th>Network Ref</th><th>Period</th><th>Status</th></tr></thead><tbody>${repayRows}</tbody></table>` : ""}
      ${myShares.length ? `<h2>Share Capital (${myShares.length} transactions)</h2><table><thead><tr><th>Date</th><th>Type</th><th>Shares</th><th>Amount Paid</th><th>Receipt No.</th></tr></thead><tbody>${shareRows}</tbody></table>` : ""}
    `;
    printStyledHTML(`ACUJUS Statement – ${member.fullName}`, html);
  };

  // ── Profile photo self-upload ──────────────────────────────────────────────
  const [photoUploading, setPhotoUploading] = React.useState(false);
  const [photoSaved, setPhotoSaved]         = React.useState(false);
  const fileInputRef = React.useRef(null);

  const handlePhotoChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { alert("Photo must be under 2 MB"); return; }
    setPhotoUploading(true);
    const reader = new FileReader();
    reader.onload = ev => {
      const updated = { ...member, photoUrl: ev.target.result };
      persist("members", data.members.map(m => m.id === member.id ? updated : m),
        { action: "edited", target: member.id + " - " + member.fullName, detail: "Member updated their profile photo" });
      setPhotoUploading(false);
      setPhotoSaved(true);
      setTimeout(() => setPhotoSaved(false), 2500);
    };
    reader.onerror = () => { alert("Failed to read file"); setPhotoUploading(false); };
    reader.readAsDataURL(file);
  };

  const handleRemovePhoto = () => {
    if (!confirm("Remove your profile photo?")) return;
    const updated = { ...member, photoUrl: "" };
    persist("members", data.members.map(m => m.id === member.id ? updated : m),
      { action: "edited", target: member.id + " - " + member.fullName, detail: "Member removed their profile photo" });
  };

  return (
    <div>
      {/* Member banner */}
      <div style={{ background:"linear-gradient(135deg,#1e3a5f,#0f172a)", border:"1px solid #1e3a5f", borderRadius:10, padding:"18px 20px", marginBottom:16, display:"flex", alignItems:"center", gap:16, flexWrap:"wrap" }}>
        <div style={{ position:"relative", flexShrink:0, cursor:"pointer" }}
          title="Tap to change your profile photo"
          onClick={() => !photoUploading && fileInputRef.current && fileInputRef.current.click()}>
          <MemberAvatar member={member} size={60} fontSize={24} />
          <div style={{ position:"absolute", bottom:0, right:0, width:22, height:22, borderRadius:"50%", background: photoUploading ? "#334155" : "#3b82f6", border:"2px solid #0f172a", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, pointerEvents:"none" }}>
            {photoUploading ? "⏳" : "📷"}
          </div>
          <input ref={fileInputRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handlePhotoChange} disabled={photoUploading} />
        </div>
        <div style={{ flex:1 }}>
          <div style={{ fontSize:20, fontWeight:800, color:"#f8fafc" }}>{member.fullName}</div>
          <div style={{ fontSize:13, color:"#64748b" }}>Member ID: <strong style={{ color:"#93c5fd" }}>{member.id}</strong> &nbsp;·&nbsp; Joined: {member.joinDate} &nbsp;·&nbsp; Status: <strong style={{ color: member.status === "Active" ? "#22c55e" : "#f87171" }}>{member.status}</strong></div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:6, flexWrap:"wrap" }}>
            <button onClick={() => !photoUploading && fileInputRef.current && fileInputRef.current.click()} disabled={photoUploading}
              style={{ fontSize:11, color: photoUploading ? "#475569" : "#93c5fd", background:"transparent", border:"1px solid #1e3a5f", borderRadius:5, padding:"3px 10px", cursor: photoUploading ? "default" : "pointer", fontFamily:"inherit" }}>
              {photoUploading ? "Uploading..." : photoSaved ? "✓ Photo saved!" : member.photoUrl ? "Change Photo" : "📷 Add Photo"}
            </button>
            {member.photoUrl && !photoUploading && (
              <button onClick={handleRemovePhoto} style={{ fontSize:11, color:"#f87171", background:"transparent", border:"1px solid #450a0a", borderRadius:5, padding:"3px 10px", cursor:"pointer", fontFamily:"inherit" }}>✕ Remove</button>
            )}
            <span style={{ fontSize:10, color:"#334155" }}>JPG / PNG · max 2 MB</span>
          </div>
        </div>
        <ExportPDFButton label="⬇ Export Statement PDF" onClick={exportPDF} />
      </div>

      {/* KPI cards */}
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(140px, 1fr))", gap:10, marginBottom:16 }}>
        <div style={{ ...styles.card, borderLeft:"4px solid #22c55e" }}><div style={{ ...styles.cardVal, color:"#22c55e" }}>{fmt(totalDeposited)}</div><div style={styles.cardLabel}>Total Deposited</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #f97316" }}><div style={{ ...styles.cardVal, color:"#f97316" }}>{fmt(totalWithdrawn)}</div><div style={styles.cardLabel}>Total Withdrawn</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #14b8a6", gridColumn: balance < 0 ? undefined : undefined }}><div style={{ ...styles.cardVal, color: balance >= 0 ? "#14b8a6" : "#ef4444" }}>{fmt(balance)}</div><div style={styles.cardLabel}>Current Balance</div></div>
        <div style={{ ...styles.card, borderLeft:"4px solid #a855f7" }}><div style={{ ...styles.cardVal, color:"#a855f7" }}>{sharesHeld.toFixed(2)}</div><div style={styles.cardLabel}>Shares Held ({fmt(shareValue)})</div></div>
      </div>

      {/* Mobile money deposit info banner */}
      <div style={{ background:"linear-gradient(135deg,#0c1a2e,#0f172a)", border:"1px solid #1e3a5f", borderRadius:8, padding:"12px 16px", marginBottom:14, display:"flex", alignItems:"center", gap:14, flexWrap:"wrap" }}>
        <div style={{ fontSize:22 }}>📲</div>
        <div style={{ flex:1, minWidth:180 }}>
          <div style={{ fontSize:11, color:"#64748b", fontWeight:600, letterSpacing:0.4, textTransform:"uppercase", marginBottom:2 }}>Send Mobile Money Deposits & Loan Repayments To</div>
          <div style={{ fontSize:20, fontWeight:900, color:"#f8fafc", letterSpacing:2 }}>+256 394 744 956</div>
          <div style={{ fontSize:11, color:"#475569", marginTop:2 }}>After sending, use the buttons below to submit your request for Admin approval.</div>
        </div>
      </div>

      {/* Quick action buttons */}
      <div style={{ display:"flex", gap:10, marginBottom:18, flexWrap:"wrap" }}>
        <button style={{ ...styles.btnPrimary, flex:1, minWidth:140, padding:"13px", fontSize:15, borderRadius:8 }}
          onClick={() => setModal({ type:"addMobileDeposit", payload:{ prefillMemberId: member.id, prefillDepositType: "Savings" } })}>
          📥 Initiate Deposit
        </button>
        <button style={{ ...styles.btnPrimary, flex:1, minWidth:140, padding:"13px", fontSize:15, borderRadius:8, background:"#b45309" }}
          onClick={() => setModal({ type:"addWithdrawal", payload:{ prefillMemberId: member.id } })}>
          📤 Initiate Withdrawal
        </button>
        <button style={{ ...styles.btnPrimary, flex:1, minWidth:140, padding:"13px", fontSize:15, borderRadius:8, background:"#1d4ed8" }}
          onClick={() => setModal({ type:"addLoanApplication", payload:{ prefillMemberId: member.id } })}>
          🏦 Apply for Loan
        </button>
      </div>

      {/* Savings history */}
      <div style={{ ...styles.panel, marginBottom:14 }}>
        <div style={styles.panelTitle}>MY SAVINGS HISTORY ({mySavings.length} records)</div>
        {mySavings.length === 0
          ? <div style={styles.empty}>No savings records yet</div>
          : <ResizableTableWrap headers={["Date","Amount","Month","Year"]} defaultWidth={150}>
              <tbody>
                {[...mySavings].reverse().map((s, i) => (
                  <tr key={i} style={styles.tr}>
                    <td style={styles.td}>{s.date}</td>
                    <td style={{ ...styles.td, color:"#22c55e", fontWeight:700 }}>{fmt(s.amount)}</td>
                    <td style={styles.td}>{s.month}</td>
                    <td style={styles.td}>{s.year}</td>
                  </tr>
                ))}
              </tbody>
            </ResizableTableWrap>
        }
      </div>

      {/* My Mobile Deposits (Savings) — pending/approved */}
      {(() => {
        const mySavingsDeposits = (data.mobileDeposits || []).filter(d => d.memberId === member.id && (d.depositType === "Savings" || !d.depositType || d.depositType === "savings"));
        if (mySavingsDeposits.length === 0) return null;
        const pendingCount = mySavingsDeposits.filter(d => d.status === "Pending").length;
        return (
          <div style={{ ...styles.panel, marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, flexWrap:"wrap", gap:6 }}>
              <div style={styles.panelTitle}>MY MOBILE SAVINGS DEPOSITS ({mySavingsDeposits.length} record{mySavingsDeposits.length !== 1 ? "s" : ""})</div>
              {pendingCount > 0 && (
                <span style={{ ...styles.badge, background:"#3b2100", color:"#fcd34d", fontSize:11 }}>⏳ {pendingCount} pending admin approval</span>
              )}
            </div>
            <ResizableTableWrap headers={["Date","Amount","TNX ID / Ref","Month","Year","Status"]} defaultWidth={120}>
              <tbody>
                {[...mySavingsDeposits].reverse().map((d, i) => {
                  const sc = d.status === "Approved" ? { bg:"#14532d", col:"#4ade80" } : d.status === "Rejected" ? { bg:"#450a0a", col:"#fca5a5" } : { bg:"#3b2100", col:"#fcd34d" };
                  return (
                    <tr key={i} style={styles.tr}>
                      <td style={styles.td}>{d.date}</td>
                      <td style={{ ...styles.td, color:"#22c55e", fontWeight:700 }}>{fmt(d.amount)}</td>
                      <td style={{ ...styles.td, fontFamily:"monospace", color:"#93c5fd" }}>{d.networkRef || "—"}</td>
                      <td style={styles.td}>{d.month}</td>
                      <td style={styles.td}>{d.year}</td>
                      <td style={styles.td}><span style={{ ...styles.badge, background:sc.bg, color:sc.col }}>{d.status || "Pending"}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </ResizableTableWrap>
            {pendingCount > 0 && (
              <div style={{ fontSize:11, color:"#64748b", marginTop:8, fontStyle:"italic" }}>
                ⏳ Pending deposits are awaiting admin review. You will be notified once approved and posted to your savings balance.
              </div>
            )}
          </div>
        );
      })()}
      <div style={{ ...styles.panel, marginBottom:14 }}>
        <div style={styles.panelTitle}>MY WITHDRAWALS ({myWithdrawals.length} records)</div>
        {myWithdrawals.length === 0
          ? <div style={styles.empty}>No withdrawal records yet</div>
          : <ResizableTableWrap headers={["Date","Amount","Charge","Total Deducted","Reason"]} defaultWidth={150}>
              <tbody>
                {[...myWithdrawals].reverse().map((w, i) => (
                  <tr key={i} style={styles.tr}>
                    <td style={styles.td}>{w.date}</td>
                    <td style={{ ...styles.td, color:"#f97316", fontWeight:700 }}>{fmt(w.amount)}</td>
                    <td style={{ ...styles.td, color:"#f59e0b" }}>{fmt(w.charge || 0)}</td>
                    <td style={{ ...styles.td, color:"#ef4444", fontWeight:700 }}>{fmt(Number(w.amount||0)+Number(w.charge||0))}</td>
                    <td style={styles.td}>{w.reason || "-"}</td>
                  </tr>
                ))}
              </tbody>
            </ResizableTableWrap>
        }
      </div>

      {/* My Loans section */}
      {(() => {
        const myLoans = data.loans.filter(l => String(l.memberId).trim() === String(member.id).trim());
        if (myLoans.length === 0) return null;
        const activeLoans = myLoans.filter(l => l.status !== "Paid");
        return (
          <div style={{ ...styles.panel, marginBottom:14 }}>
            <div style={styles.panelTitle}>MY LOANS ({myLoans.length} record{myLoans.length !== 1 ? "s" : ""})</div>
            {activeLoans.length > 0 && (
              <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap" }}>
                {activeLoans.map(l => (
                  <div key={l.loanId} style={{ flex:"1 1 200px", background:"#0a1628", border:"1px solid #1e3a5f", borderRadius:8, padding:"10px 14px" }}>
                    <div style={{ fontSize:11, color:"#64748b", marginBottom:2 }}>Loan {l.loanId}</div>
                    <div style={{ fontSize:16, fontWeight:800, color:"#f87171" }}>{fmt(l.balance)}</div>
                    <div style={{ fontSize:11, color:"#94a3b8" }}>outstanding of {fmt(l.totalPayable)}</div>
                    <button
                      onClick={() => setModal({ type:"loanSchedule", payload: l })}
                      style={{ marginTop:8, background:"#1e3a5f", border:"1px solid #1e40af", color:"#93c5fd", borderRadius:6, padding:"5px 12px", fontSize:12, fontWeight:700, cursor:"pointer", width:"100%" }}>
                      📅 View Repayment Schedule
                    </button>
                  </div>
                ))}
              </div>
            )}
            <ResizableTableWrap headers={["Loan ID","Amount","Rate","Total","Paid","Balance","Due Date","Status","Schedule"]} defaultWidth={120}>
              <tbody>
                {[...myLoans].reverse().map((l, i) => {
                  const daysLate = l.dueDate && l.status !== "Paid" ? Math.max(0, Math.floor((Date.now() - new Date(l.dueDate)) / 86400000)) : 0;
                  const sc = l.status === "Paid" ? { bg:"#dcfce7", col:"#16a34a" } : daysLate > 0 ? { bg:"#fee2e2", col:"#dc2626" } : { bg:"#fef9c3", col:"#854d0e" };
                  return (
                    <tr key={i} style={styles.tr}>
                      <td style={{ ...styles.td, fontFamily:"monospace" }}>{l.loanId}</td>
                      <td style={styles.td}>{fmt(l.loanAmount)}</td>
                      <td style={styles.td}><span style={{ ...styles.badge, background:"#451a03", color:"#fcd34d" }}>{l.interestRate}%/mo</span></td>
                      <td style={styles.td}>{fmt(l.totalPayable)}</td>
                      <td style={{ ...styles.td, color:"#4ade80" }}>{fmt(l.amountPaid)}</td>
                      <td style={{ ...styles.td, color: l.status === "Paid" ? "#4ade80" : "#f87171", fontWeight:700 }}>{fmt(l.balance)}</td>
                      <td style={{ ...styles.td, whiteSpace:"nowrap" }}>{l.dueDate || "—"}</td>
                      <td style={styles.td}><span style={{ ...styles.badge, background:sc.bg, color:sc.col }}>{l.status || "Active"}{daysLate > 0 ? ` (${daysLate}d late)` : ""}</span></td>
                      <td style={styles.td}>
                        <button onClick={() => setModal({ type:"loanSchedule", payload: l })}
                          style={{ background:"#1e3a5f", border:"1px solid #1e40af", color:"#93c5fd", borderRadius:6, padding:"4px 10px", fontSize:11, fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }}>
                          📅 Schedule
                        </button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </ResizableTableWrap>
          </div>
        );
      })()}

      {/* My Loan Repayments via Mobile Deposit */}
      {(() => {
        const myRepayments = (data.mobileDeposits || []).filter(d => d.memberId === member.id && d.depositType === "Loan Repayment");
        if (myRepayments.length === 0) return null;
        const totalRepaid = myRepayments.filter(d => d.status === "Approved").reduce((s, d) => s + Number(d.amount || 0), 0);
        const pending = myRepayments.filter(d => d.status === "Pending").length;
        return (
          <div style={{ ...styles.panel, marginBottom:14 }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, flexWrap:"wrap", gap:6 }}>
              <div style={styles.panelTitle}>MY LOAN REPAYMENTS ({myRepayments.length} record{myRepayments.length !== 1 ? "s" : ""})</div>
              {pending > 0 && (
                <span style={{ ...styles.badge, background:"#3b2100", color:"#fcd34d", fontSize:11 }}>⏳ {pending} pending approval</span>
              )}
            </div>
            <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap" }}>
              <div style={{ ...styles.card, flex:1, borderLeft:"4px solid #0d9488" }}>
                <div style={{ ...styles.cardVal, color:"#0d9488" }}>{fmt(totalRepaid)}</div>
                <div style={styles.cardLabel}>Total Repaid (Approved)</div>
              </div>
              <div style={{ ...styles.card, flex:1, borderLeft:"4px solid #f59e0b" }}>
                <div style={{ ...styles.cardVal, color:"#f59e0b" }}>{pending}</div>
                <div style={styles.cardLabel}>Pending Approval</div>
              </div>
            </div>
            <ResizableTableWrap headers={["Date","Loan ID","Amount","Network Ref","Month","Year","Status"]} defaultWidth={120}>
              <tbody>
                {[...myRepayments].reverse().map((d, i) => {
                  const sc = d.status === "Approved" ? { bg:"#052e16", col:"#22c55e" } : d.status === "Rejected" ? { bg:"#2d0000", col:"#f87171" } : { bg:"#2d1b00", col:"#fcd34d" };
                  return (
                    <tr key={i} style={styles.tr}>
                      <td style={styles.td}>{d.date}</td>
                      <td style={{ ...styles.td, fontFamily:"monospace", color:"#f87171" }}>{d.loanId || "—"}</td>
                      <td style={{ ...styles.td, color:"#0d9488", fontWeight:700 }}>{fmt(d.amount)}</td>
                      <td style={styles.td}>{d.networkRef || "—"}</td>
                      <td style={styles.td}>{d.month}</td>
                      <td style={styles.td}>{d.year}</td>
                      <td style={styles.td}><span style={{ ...styles.badge, background:sc.bg, color:sc.col }}>{d.status}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </ResizableTableWrap>
          </div>
        );
      })()}

      {/* Shares history */}
      <div style={styles.panel}>
        <div style={styles.panelTitle}>MY SHARE CAPITAL ({sc.filter(e => e.memberId === member.id || e.toMemberId === member.id).length} transactions)</div>
        <div style={{ display:"flex", gap:12, marginBottom:12 }}>
          <div style={{ ...styles.card, flex:1, borderLeft:"4px solid #a855f7" }}><div style={{ ...styles.cardVal, color:"#a855f7", fontSize:18 }}>{sharesHeld.toFixed(2)}</div><div style={styles.cardLabel}>Shares Held</div></div>
          <div style={{ ...styles.card, flex:1, borderLeft:"4px solid #8b5cf6" }}><div style={{ ...styles.cardVal, color:"#8b5cf6", fontSize:18 }}>{fmt(shareValue)}</div><div style={styles.cardLabel}>Share Value</div></div>
        </div>
        {sc.filter(e => e.memberId === member.id || e.toMemberId === member.id).length === 0
          ? <div style={styles.empty}>No share transactions yet</div>
          : <ResizableTableWrap headers={["Date","Type","Shares","Amount Paid","Receipt No."]} defaultWidth={150}>
              <tbody>
                {[...sc].filter(e => e.memberId === member.id || e.toMemberId === member.id).reverse().map((e, i) => (
                  <tr key={i} style={styles.tr}>
                    <td style={styles.td}>{e.date}</td>
                    <td style={styles.td}>
                      <span style={{ ...styles.badge,
                        background: e.type === "Purchase" ? "#dcfce7" : e.toMemberId === member.id ? "#dbeafe" : "#fee2e2",
                        color: e.type === "Purchase" ? "#16a34a" : e.toMemberId === member.id ? "#1d4ed8" : "#dc2626"
                      }}>
                        {e.type === "Transfer" ? (e.toMemberId === member.id ? "Received" : "Transferred Out") : "Purchase"}
                      </span>
                    </td>
                    <td style={styles.td}>{Number(e.shares).toFixed(2)}</td>
                    <td style={styles.td}>{e.amountPaid ? fmt(e.amountPaid) : "-"}</td>
                    <td style={styles.td}>{e.receiptNo || "-"}</td>
                  </tr>
                ))}
              </tbody>
            </ResizableTableWrap>
        }
      </div>
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ kpi, data, setTab, isMobile }) {
  const gridCols = isMobile ? "1fr" : "repeat(3, 1fr)";
  const grid2Cols = isMobile ? "1fr" : "1fr 1fr";
  const cards = [
    { label: "Total Savings", val: fmt(kpi.totalSavings), color: "#22c55e" },
    { label: "Total Withdrawals", val: fmt(kpi.totalWithdrawals), color: "#f97316" },
    { label: "Net Savings Balance", val: fmt(kpi.netSavings), color: "#10b981" },
    { label: "Total Loans Out", val: fmt(kpi.totalLoans), color: "#f59e0b" },
    { label: "Outstanding Loans", val: fmt(kpi.outstandingLoans), color: "#ef4444" },
    { label: "Total Invested", val: fmt(kpi.totalInvested), color: "#3b82f6" },
    { label: "Investment Portfolio", val: fmt(kpi.totalInvestmentValue), color: "#6366f1" },
    { label: "Total Income", val: fmt(kpi.totalIncome), color: "#10b981" },
    { label: "Total Expenses", val: fmt(kpi.totalExpenses), color: "#f43f5e" },
    { label: "Welfare Fund", val: fmt(kpi.welfare), color: "#8b5cf6" },
    { label: "Net Profit", val: fmt(kpi.netProfit), color: "#0ea5e9" },
    { label: "Deployable Fund", val: fmt(kpi.deployableFund), color: "#14b8a6" },
    { label: "Members' Savings (Liability)", val: fmt(kpi.netSavings), color: "#f59e0b" },
    { label: "Total Members", val: kpi.totalMembers, color: "#f97316" },
    { label: "Shares Issued", val: Number(kpi.totalShares).toFixed(2) + ` / ${COMPANY_MAX_SHARES}`, color: "#a855f7" },
    { label: "Total Share Capital", val: fmt(kpi.totalShareCapital), color: "#8b5cf6" },
  ];
  return (
    <div>
      {(kpi.pendingDeposits > 0 || kpi.pendingLoanApps > 0) && (
        <div style={{ background:"#451a03", border:"1px solid #92400e", borderRadius:8, padding:"10px 16px", marginBottom:14, display:"flex", gap:20, flexWrap:"wrap" }}>
          {kpi.pendingDeposits > 0 && <span style={{ fontSize:13, color:"#fcd34d" }}>📲 {kpi.pendingDeposits} mobile deposit{kpi.pendingDeposits > 1 ? "s" : ""} awaiting approval</span>}
          {kpi.pendingLoanApps > 0 && <span style={{ fontSize:13, color:"#fcd34d" }}>✎ {kpi.pendingLoanApps} loan application{kpi.pendingLoanApps > 1 ? "s" : ""} awaiting review</span>}
        </div>
      )}
      <div style={{ ...styles.grid3, gridTemplateColumns: gridCols }}>
        {cards.map(c => (
          <div key={c.label} style={{ ...styles.card, borderLeft: `4px solid ${c.color}` }}>
            <div style={{ ...styles.cardVal, color: c.color }}>{c.val}</div>
            <div style={styles.cardLabel}>{c.label}</div>
          </div>
        ))}
      </div>
      <div style={{ background:"#0c1a2e", border:"1px solid #1e3a5f", borderRadius:8, padding:"10px 16px", marginBottom:14, marginTop:4 }}>
        <span style={{ fontSize:12, color:"#7dd3fc", fontWeight:600 }}>💡 CASH POSITION NOTE: </span>
        <span style={{ fontSize:12, color:"#94a3b8" }}>
          <strong style={{ color:"#14b8a6" }}>Deployable Fund</strong> is what the company can freely lend or invest (Share Capital + Income − Deployed).&nbsp;
          <strong style={{ color:"#f59e0b" }}>Members' Savings</strong> is a <em>liability</em> — it belongs to members and must remain available for withdrawal at any time.
          Loans and investments are disbursed from the Deployable Fund only.
        </span>
      </div>
      <div style={styles.panel}>
        <div style={styles.panelTitle}>DEPLOYABLE FUND BREAKDOWN</div>
        <Row label="(+) Total Share Capital" val={fmt(kpi.totalShareCapital)} color="#22c55e" />
        <Row label="(+) Loan Interest Received" val={fmt(kpi.totalLoanInterest)} color="#22c55e" />
        <Row label="(+) Other Income" val={fmt(kpi.otherIncome)} color="#22c55e" />
        <Row label="(+) Investment Returns (Actual)" val={fmt(kpi.actualReturns)} color="#22c55e" />
        <div style={styles.divider} />
        <Row label="(−) Outstanding Loans" val={fmt(kpi.outstandingLoans)} color="#ef4444" />
        <Row label="(−) Total Principal Invested" val={fmt(kpi.totalInvested)} color="#ef4444" />
        <Row label="(+) Principal Recovered" val={fmt(kpi.principalRecovered)} color="#22c55e" />
        <Row label="(−) Total Expenses" val={fmt(kpi.totalExpenses)} color="#ef4444" />
        <div style={styles.divider} />
        <Row label="= DEPLOYABLE FUND" val={fmt(kpi.deployableFund)} bold color="#14b8a6" />
        <Row label="   Members Savings (Liability — excluded)" val={fmt(kpi.netSavings)} color="#f59e0b" />
      </div>
      {/* ── Fund Allocation Policy Panel ── */}
      {(() => {
        // Policy thresholds (% of deployable fund)
        const POLICY_BUFFER_MIN  = 0.20; // minimum cash buffer — never deploy below this
        const POLICY_LOAN_MAX    = 0.50; // max loans
        const POLICY_INV_MAX     = 0.30; // max investments
        const POLICY_TOTAL_MAX   = 0.80; // combined cap (loans + investments)

        const df = kpi.deployableFund > 0 ? kpi.deployableFund : 1; // avoid /0

        // Active (currently deployed) values
        const loanDeployed = kpi.outstandingLoans;
        const invDeployed  = data.investments.filter(i => i.status === "Active").reduce((s,i) => s + Number(i.poolAmount||0), 0);
        const totalDeployed = loanDeployed + invDeployed;
        const cashBuffer   = kpi.deployableFund - totalDeployed;

        // Ratios vs deployable fund
        const loanPct    = loanDeployed    / df;
        const invPct     = invDeployed     / df;
        const totalPct   = totalDeployed   / df;
        const bufferPct  = cashBuffer      / df;

        // Remaining headroom
        const loanHeadroom = Math.max(0, (POLICY_LOAN_MAX * df) - loanDeployed);
        const invHeadroom  = Math.max(0, (POLICY_INV_MAX  * df) - invDeployed);
        const totalHeadroom= Math.max(0, (POLICY_TOTAL_MAX* df) - totalDeployed);

        // Status helpers
        const status = (pct, limit, isBuffer=false) => {
          if (isBuffer) return pct >= POLICY_BUFFER_MIN ? "ok" : pct >= 0.10 ? "warn" : "danger";
          return pct <= limit * 0.75 ? "ok" : pct <= limit ? "warn" : "danger";
        };
        const colorMap = { ok: "#22c55e", warn: "#f59e0b", danger: "#ef4444" };
        const bgMap    = { ok: "#052e16", warn: "#451a03", danger: "#450a0a" };
        const borderMap= { ok: "#166534", warn: "#92400e", danger: "#7f1d1d" };
        const labelMap = { ok: "✅ OK", warn: "⚠ Monitor", danger: "🔴 Over Limit" };

        const loanStatus   = status(loanPct,   POLICY_LOAN_MAX);
        const invStatus    = status(invPct,    POLICY_INV_MAX);
        const totalStatus  = status(totalPct,  POLICY_TOTAL_MAX);
        const bufferStatus = status(bufferPct, POLICY_BUFFER_MIN, true);


        // Visual bar component inline
        const Bar = ({ pct, limit, color }) => {
          const filled = Math.min(pct, 1);
          const limitPos = Math.min(limit, 1);
          return (
            <div style={{ position: "relative", height: 8, background: "#1e293b", borderRadius: 4, overflow: "hidden", marginTop: 5 }}>
              <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: `${filled * 100}%`, background: color, borderRadius: 4, transition: "width 0.4s" }} />
              {/* limit marker */}
              <div style={{ position: "absolute", left: `${limitPos * 100}%`, top: 0, height: "100%", width: 2, background: "#fff", opacity: 0.4 }} />
            </div>
          );
        };

        const AllocRow = ({ label, deployed, pct, limit, headroom, stKey }) => (
          <div style={{ background: bgMap[stKey], border: `1px solid ${borderMap[stKey]}`, borderRadius: 8, padding: "12px 14px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 700, color: "#f8fafc" }}>{label}</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: colorMap[stKey], background: bgMap[stKey], border: `1px solid ${borderMap[stKey]}`, borderRadius: 20, padding: "2px 8px" }}>{labelMap[stKey]}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
              <span style={{ fontSize: 18, fontWeight: 800, color: colorMap[stKey] }}>{(pct * 100).toFixed(1)}%</span>
              <span style={{ fontSize: 11, color: "#64748b" }}>limit: {(limit * 100).toFixed(0)}%</span>
            </div>
            <Bar pct={pct} limit={limit} color={colorMap[stKey]} />
            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 6, flexWrap: "wrap", gap: 4 }}>
              <span style={{ fontSize: 11, color: "#94a3b8" }}>Deployed: <strong style={{ color: "#f8fafc" }}>{fmt(deployed)}</strong></span>
              <span style={{ fontSize: 11, color: "#94a3b8" }}>Headroom: <strong style={{ color: headroom > 0 ? "#22c55e" : "#ef4444" }}>{headroom > 0 ? fmt(headroom) : "NONE"}</strong></span>
            </div>
          </div>
        );

        return (
          <div style={{ ...styles.panel, marginTop: 10, border: "1px solid #1e3a5f" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ ...styles.panelTitle, margin: 0 }}>⚖ FUND ALLOCATION POLICY — Live Status</div>
              <span style={{ fontSize: 10, color: "#475569", fontStyle: "italic" }}>Recommended: Loans ≤50% | Investments ≤30% | Combined ≤80% | Buffer ≥20%</span>
            </div>

            {/* Deployable Fund summary line */}
            <div style={{ background: "#0a0f1e", border: "1px solid #1e293b", borderRadius: 7, padding: "8px 14px", marginBottom: 12, display: "flex", flexWrap: "wrap", gap: 20, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: "#64748b" }}>Deployable Fund: <strong style={{ color: "#14b8a6", fontSize: 14 }}>{fmt(kpi.deployableFund)}</strong></span>
              <span style={{ fontSize: 12, color: "#64748b" }}>Total Deployed: <strong style={{ color: totalStatus === "ok" ? "#22c55e" : totalStatus === "warn" ? "#f59e0b" : "#ef4444", fontSize: 14 }}>{fmt(totalDeployed)}</strong></span>
              <span style={{ fontSize: 12, color: "#64748b" }}>Cash Buffer: <strong style={{ color: bufferStatus === "ok" ? "#22c55e" : bufferStatus === "warn" ? "#f59e0b" : "#ef4444", fontSize: 14 }}>{fmt(cashBuffer)}</strong></span>
              <span style={{ fontSize: 12, color: "#64748b", marginLeft: "auto" }}>Available to Deploy: <strong style={{ color: "#38bdf8", fontSize: 14 }}>{fmt(Math.max(0, (POLICY_TOTAL_MAX * df) - totalDeployed))}</strong></span>
            </div>

            {/* 4-card grid */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(220px,1fr))", gap: 10 }}>
              <AllocRow
                label="📋 Loans to Members"
                deployed={loanDeployed} pct={loanPct} limit={POLICY_LOAN_MAX}
                headroom={loanHeadroom} stKey={loanStatus}
              />
              <AllocRow
                label="📈 Active Investments"
                deployed={invDeployed} pct={invPct} limit={POLICY_INV_MAX}
                headroom={invHeadroom} stKey={invStatus}
              />
              <AllocRow
                label="⚡ Combined Deployment"
                deployed={totalDeployed} pct={totalPct} limit={POLICY_TOTAL_MAX}
                headroom={totalHeadroom} stKey={totalStatus}
              />
              {/* Buffer card (inverted — higher is better) */}
              <div style={{ background: bgMap[bufferStatus], border: `1px solid ${borderMap[bufferStatus]}`, borderRadius: 8, padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                  <span style={{ fontSize: 12, fontWeight: 700, color: "#f8fafc" }}>🏦 Cash Buffer (Undeployed)</span>
                  <span style={{ fontSize: 11, fontWeight: 700, color: colorMap[bufferStatus], background: bgMap[bufferStatus], border: `1px solid ${borderMap[bufferStatus]}`, borderRadius: 20, padding: "2px 8px" }}>{bufferStatus === "ok" ? "✅ Healthy" : bufferStatus === "warn" ? "⚠ Low" : "🔴 Critical"}</span>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
                  <span style={{ fontSize: 18, fontWeight: 800, color: colorMap[bufferStatus] }}>{(bufferPct * 100).toFixed(1)}%</span>
                  <span style={{ fontSize: 11, color: "#64748b" }}>minimum: {(POLICY_BUFFER_MIN * 100).toFixed(0)}%</span>
                </div>
                <div style={{ position: "relative", height: 8, background: "#1e293b", borderRadius: 4, overflow: "hidden", marginTop: 5 }}>
                  <div style={{ position: "absolute", left: 0, top: 0, height: "100%", width: `${Math.min(bufferPct, 1) * 100}%`, background: colorMap[bufferStatus], borderRadius: 4, transition: "width 0.4s" }} />
                  <div style={{ position: "absolute", left: `${POLICY_BUFFER_MIN * 100}%`, top: 0, height: "100%", width: 2, background: "#fff", opacity: 0.4 }} />
                </div>
                <div style={{ marginTop: 6 }}>
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>Held back: <strong style={{ color: "#f8fafc" }}>{fmt(cashBuffer)}</strong></span>
                </div>
              </div>
            </div>

            {/* Policy note */}
            <div style={{ marginTop: 10, fontSize: 11, color: "#475569", background: "#0a0f1e", borderRadius: 6, padding: "8px 12px", borderLeft: "3px solid #1e3a5f" }}>
              <strong style={{ color: "#64748b" }}>Policy:</strong> Never deploy more than 80% of the deployable fund combined.
              Keep at least 20% as a liquid cash buffer for unexpected member withdrawals and operational needs.
              Loans are preferred over investments (lower risk, known borrowers).
              The white marker on each bar shows your policy limit.
            </div>
          </div>
        );
      })()}

      <div style={{ ...styles.grid2, gridTemplateColumns: grid2Cols }}>
        <div style={styles.panel}>
          <div style={styles.panelTitle}>INCOME SUMMARY (ACTUAL RECEIVED)</div>
          <Row label="Loan Interest Received" val={fmt(kpi.totalLoanInterest)} onNav={() => setTab("loans")} />
          <Row label="  ↳ Accrued (projected)" val={fmt(kpi.totalLoanInterestAccrued)} />
          <Row label="Investment Returns (Actual)" val={fmt(kpi.actualReturns)} onNav={() => setTab("investments")} />
          <Row label="Other Income" val={fmt(kpi.otherIncome)} onNav={() => setTab("otherIncome")} />
          <Row label="Penalty Income" val={fmt(kpi.penaltyIncome)} onNav={() => setTab("loans")} />
          <Row label="Total Income Received" val={fmt(kpi.totalIncome)} bold />
          <div style={styles.divider} />
          <Row label="Total Expenses" val={fmt(kpi.totalExpenses)} onNav={() => setTab("expenses")} />
          <Row label="NET PROFIT" val={fmt(kpi.netProfit)} bold color="#22c55e" />
        </div>
        <div style={styles.panel}>
          <div style={styles.panelTitle}>PROFIT DISTRIBUTION</div>
          <Row label="Total Income Received" val={fmt(kpi.totalIncome)} />
          <Row label="Less: Total Expenses" val={fmt(kpi.totalExpenses)} />
          <Row label="Net Profit" val={fmt(kpi.netProfit)} bold />
          <div style={styles.divider} />
          <Row label={`Reserve Fund (${RESERVE_FUND_PCT * 100}%)`} val={fmt(kpi.reserveFund)} />
          <Row label={`Admin Fees (${ADMIN_FEE_PCT * 100}%)`} val={fmt(kpi.adminFees)} />
          <Row label={`Shareable to Members (${SHAREABLE_PCT * 100}%)`} val={fmt(kpi.shareableProfit)} color="#22c55e" bold />
          <div style={{ fontSize:11, color:"#475569", marginTop:4, textAlign:"right" }}>
            {fmt(kpi.reserveFund)} + {fmt(kpi.adminFees)} + {fmt(kpi.shareableProfit)} = {fmt(kpi.reserveFund + kpi.adminFees + kpi.shareableProfit)}
          </div>
          <div style={styles.divider} />
          <div style={styles.panelTitle}>SHARES & DIVIDENDS</div>
          <Row label="Share Price" val={fmt(SHARE_PRICE)} />
          <Row label="Total Shares Issued" val={kpi.totalShares.toFixed(2)} />
          <Row label="Dividend Per Share" val={fmt(kpi.dividendPerShare)} />
          <Row label="Total Members" val={kpi.totalMembers} />
        </div>
      </div>

      {/* ── VISUAL KPI CHARTS ─────────────────────────────────────────────── */}
      {(() => {
        const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

        // ── 1. Savings Growth — last 6 months bar chart ──────────────────
        const now = new Date();
        const last6 = Array.from({ length: 6 }, (_, i) => {
          const d = new Date(now.getFullYear(), now.getMonth() - 5 + i, 1);
          return { y: d.getFullYear(), m: d.getMonth(), label: MONTHS[d.getMonth()] };
        });
        const monthlySavings = last6.map(({ y, m }) =>
          data.savings
            .filter(s => { const d = new Date(s.date); return d.getFullYear() === y && d.getMonth() === m; })
            .reduce((a, s) => a + Number(s.amount || 0), 0)
        );
        const monthlyWithdrawals = last6.map(({ y, m }) =>
          (data.withdrawals || [])
            .filter(w => { const d = new Date(w.date); return d.getFullYear() === y && d.getMonth() === m; })
            .reduce((a, w) => a + Number(w.amount || 0) + Number(w.charge || 0), 0)
        );
        const savingsMax = Math.max(...monthlySavings, ...monthlyWithdrawals, 1);

        // ── 2. Loan Status — donut chart ─────────────────────────────────
        const loanActive  = data.loans.filter(l => l.status === "Active").length;
        const loanOverdue = data.loans.filter(l => {
          if (l.status === "Paid") return false;
          const due = l.dueDate ? new Date(l.dueDate) : null;
          return due && due < now;
        }).length;
        const loanPaid    = data.loans.filter(l => l.status === "Paid").length;
        const loanOther   = Math.max(0, data.loans.length - loanActive - loanOverdue - loanPaid);
        const totalLoansCount = data.loans.length || 1;
        const donutData = [
          { label: "Active",  count: loanActive,  color: "#22c55e" },
          { label: "Overdue", count: loanOverdue, color: "#ef4444" },
          { label: "Paid",    count: loanPaid,    color: "#3b82f6" },
          { label: "Other",   count: loanOther,   color: "#64748b" },
        ].filter(d => d.count > 0);
        // SVG donut arcs
        const R = 52, CX = 72, CY = 68, stroke = 18;
        const circ = 2 * Math.PI * R;
        let cumPct = 0;
        const donutArcs = donutData.map(seg => {
          const pct = seg.count / totalLoansCount;
          const dash = pct * circ;
          const gap = circ - dash;
          const offset = circ - cumPct * circ;
          cumPct += pct;
          return { ...seg, dash, gap, offset };
        });

        // ── 3. Share Distribution — top-5 members horizontal bar ─────────
        const memberShares = data.members.map(m => {
          const mid = String(m.id).trim();
          const bought = (data.shareCapital || []).filter(e => String(e.memberId).trim() === mid && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
          const received = (data.shareCapital || []).filter(e => String(e.toMemberId).trim() === mid && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
          const xferred = (data.shareCapital || []).filter(e => String(e.memberId).trim() === mid && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
          return { name: m.fullName || m.id, shares: bought + received - xferred };
        }).filter(m => m.shares > 0).sort((a, b) => b.shares - a.shares).slice(0, 5);
        const maxShares = Math.max(...memberShares.map(m => m.shares), 1);
        const shareColors = ["#a855f7","#6366f1","#3b82f6","#0ea5e9","#8b5cf6"];

        const chartTitle = (t) => ({
          fontSize: 12, fontWeight: 700, color: "#94a3b8",
          textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 14
        });
        const chartCard = {
          background: "#0c1422", border: "1px solid #1e2d40", borderRadius: 10,
          padding: "16px 18px", flex: 1, minWidth: 0
        };

        return (
          <div style={{ marginTop: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 10 }}>
              📊 Visual KPIs
            </div>
            <div style={{ display: "flex", gap: 12, flexWrap: isMobile ? "wrap" : "nowrap" }}>

              {/* ── Savings Growth Bar Chart ── */}
              <div style={{ ...chartCard, minWidth: isMobile ? "100%" : 0 }}>
                <div style={chartTitle()}>Savings vs Withdrawals — Last 6 Months</div>
                <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 90, paddingBottom: 20, position: "relative" }}>
                  {last6.map((mo, i) => {
                    const sH = monthlySavings[i] > 0 ? Math.max(6, (monthlySavings[i] / savingsMax) * 72) : 0;
                    const wH = monthlyWithdrawals[i] > 0 ? Math.max(6, (monthlyWithdrawals[i] / savingsMax) * 72) : 0;
                    return (
                      <div key={mo.label} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 0, position: "relative" }}>
                        <div style={{ display: "flex", alignItems: "flex-end", gap: 2, height: 72 }}>
                          <div title={`Savings: UGX ${monthlySavings[i].toLocaleString()}`}
                            style={{ width: 10, height: sH, background: "#22c55e", borderRadius: "3px 3px 0 0", opacity: 0.9, transition: "height 0.4s", cursor: "default" }} />
                          <div title={`Withdrawals: UGX ${monthlyWithdrawals[i].toLocaleString()}`}
                            style={{ width: 10, height: wH, background: "#f97316", borderRadius: "3px 3px 0 0", opacity: 0.9, transition: "height 0.4s", cursor: "default" }} />
                        </div>
                        <div style={{ position: "absolute", bottom: 0, fontSize: 9, color: "#475569", whiteSpace: "nowrap" }}>{mo.label}</div>
                      </div>
                    );
                  })}
                </div>
                <div style={{ display: "flex", gap: 14, marginTop: 4 }}>
                  <span style={{ fontSize: 10, color: "#22c55e" }}>■ Savings</span>
                  <span style={{ fontSize: 10, color: "#f97316" }}>■ Withdrawals</span>
                </div>
              </div>

              {/* ── Loan Status Donut ── */}
              <div style={{ ...chartCard, minWidth: isMobile ? "100%" : 0 }}>
                <div style={chartTitle()}>Loan Status Breakdown</div>
                {data.loans.length === 0 ? (
                  <div style={{ fontSize: 12, color: "#475569", textAlign: "center", paddingTop: 24 }}>No loans recorded</div>
                ) : (
                  <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
                    <svg width={144} height={136} style={{ flexShrink: 0 }}>
                      <circle cx={CX} cy={CY} r={R} fill="none" stroke="#1e293b" strokeWidth={stroke} />
                      {donutArcs.map((seg, i) => (
                        <circle key={i} cx={CX} cy={CY} r={R} fill="none"
                          stroke={seg.color} strokeWidth={stroke}
                          strokeDasharray={`${seg.dash} ${seg.gap}`}
                          strokeDashoffset={seg.offset}
                          style={{ transform: `rotate(-90deg)`, transformOrigin: `${CX}px ${CY}px`, transition: "stroke-dasharray 0.5s" }}
                        />
                      ))}
                      <text x={CX} y={CY - 6} textAnchor="middle" fill="#e2e8f0" fontSize={18} fontWeight={700}>{data.loans.length}</text>
                      <text x={CX} y={CY + 10} textAnchor="middle" fill="#64748b" fontSize={9}>TOTAL</text>
                    </svg>
                    <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                      {donutData.map(seg => (
                        <div key={seg.label} style={{ display: "flex", alignItems: "center", gap: 7 }}>
                          <div style={{ width: 8, height: 8, borderRadius: "50%", background: seg.color, flexShrink: 0 }} />
                          <div>
                            <div style={{ fontSize: 11, color: "#94a3b8" }}>{seg.label}</div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: seg.color, lineHeight: 1 }}>{seg.count}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* ── Share Distribution ── */}
              <div style={{ ...chartCard, minWidth: isMobile ? "100%" : 0 }}>
                <div style={chartTitle()}>Top Share Holders</div>
                {memberShares.length === 0 ? (
                  <div style={{ fontSize: 12, color: "#475569", textAlign: "center", paddingTop: 24 }}>No shares issued</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {memberShares.map((m, i) => {
                      const pct = (m.shares / (kpi.totalShares || 1)) * 100;

}

function Members({ data, persist, setModal, kpi, currentUser }) {

    if (!confirm("Delete this member?")) return;
    const m = data.members.find(x => x.id === id);
    persist("members", data.members.filter(m => m.id !== id), { action: "deleted", target: m ? `${m.id} – ${m.fullName}` : id, detail: "Member record removed" });
  };
  const { q, setQ, filtered } = useSearch(data.members, ["id", "fullName", "phone", "status"]);
  return (
    <div>
      <div style={styles.toolbar}>
        <SearchBar q={q} setQ={setQ} placeholder="Search by name, ID, phone, status…" count={filtered.length} total={data.members.length} />
        <span style={{ ...styles.count, flexShrink: 0 }}>{data.members.length} Members</span>
        <ExportCSVButton onClick={() => exportCSV("members.csv",
          ["Member ID","Full Name","Phone","Join Date","Status","Email","Address"],
          filtered.map(m => [m.id, m.fullName, m.phone, m.joinDate, m.status, m.email||"", m.address||""])

        {!readOnly && <button style={styles.btnPrimary} onClick={() => setModal({ type: "addMember" })}>+ Add Member</button>}
        {readOnly && <span style={{ fontSize:11, color:"#64748b", fontStyle:"italic" }}>🔒 View only</span>}
      </div>
      <ResizableTableWrap headers={["ID","Full Name","Phone","Join Date","Shares","Share %","Status","Net Savings","Loan Bal.","Net Worth",...(readOnly ? [] : ["Actions"])]}>
        <tbody>
          {filtered.length === 0 && <tr><td colSpan={readOnly ? 10 : 11} style={styles.empty}>{q ? "No members match your search" : "No members yet"}</td></tr>}
          {filtered.map(m => {
            const mid = String(m.id).trim();
            const memberSavings = data.savings.filter(s => String(s.memberId).trim() === mid).reduce((a, s) => a + Number(s.amount || 0), 0);
            const memberWithdrawals = (data.withdrawals || []).filter(w => String(w.memberId).trim() === mid).reduce((a, w) => a + Number(w.amount || 0) + Number(w.charge || 0), 0);
            const memberNetSavings = memberSavings - memberWithdrawals;
            const memberLoanBal = data.loans.filter(l => String(l.memberId).trim() === mid && l.status !== "Paid").reduce((a, l) => a + Number(l.balance || 0), 0);
            const bought = (data.shareCapital || []).filter(e => String(e.memberId).trim() === mid && e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
            const received = (data.shareCapital || []).filter(e => String(e.toMemberId).trim() === mid && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
            const transferred = (data.shareCapital || []).filter(e => String(e.memberId).trim() === mid && e.type === "Transfer").reduce((s, e) => s + Number(e.shares || 0), 0);
            const sharesHeld = bought + received - transferred;
            const shareVal = sharesHeld * SHARE_PRICE;
            const netWorth = shareVal + memberNetSavings - memberLoanBal;
            const sharePct = kpi.totalShares > 0 ? (sharesHeld / kpi.totalShares * 100).toFixed(2) : "0.00";
            return (
              <tr key={m.id} style={styles.tr}>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.id}</td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <MemberAvatar member={m} size={28} fontSize={12} />
                    <strong>{m.fullName}</strong>
                  </div>
                </td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.phone}</td>
                <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{m.joinDate}</td>
                <td style={styles.td}>{Number(sharesHeld).toFixed(2)}</td>
                <td style={styles.td}>{sharePct}%</td>
                <td style={styles.td}><span style={{ ...styles.badge, background: m.status === "Active" ? "#dcfce7" : "#fee2e2", color: m.status === "Active" ? "#16a34a" : "#dc2626" }}>{m.status}</span></td>
                <td style={{ ...styles.td, color: memberNetSavings >= 0 ? "#4ade80" : "#f87171" }}>{fmt(memberNetSavings)}</td>
                <td style={{ ...styles.td, color: memberLoanBal > 0 ? "#f87171" : "#4ade80" }}>{fmt(memberLoanBal)}</td>
                <td style={{ ...styles.td, color: netWorth >= 0 ? "#e2e8f0" : "#f87171", fontWeight: 600 }}>{fmt(netWorth)}</td>
                {!readOnly && (
                  <td style={{ ...styles.td, whiteSpace:"nowrap" }}>
                    <button style={styles.btnSm} onClick={() => setModal({ type: "editMember", payload: m })}>Edit</button>
                    <button style={{ ...styles.btnSm, ...styles.btnDanger }} onClick={() => del(m.id)}>Del</button>
                  </td>
                )}
              </tr>
            );
          })}
        </tbody>
      </ResizableTableWrap>
    </div>
  );
}

function Savings({ data, persist, setModal, currentUser }) {
  const isMember = currentUser?.role === "Member";
  const linkedMemberId = isMember ? (data.members.find(m =>
    m.userId === currentUser?.id ||
    (currentUser?.linkedMemberId && m.id === currentUser.linkedMemberId) ||
    m.username === currentUser?.username
  )?.id || null) : null;
  // Members only see their own savings; Admins/Managers see all
  const rows = isMember && linkedMemberId
    ? data.savings.filter(s => s.memberId === linkedMemberId)
    : data.savings;
  const total = rows.reduce((s, r) => s + Number(r.amount), 0);
  const { q, setQ, filtered: filteredRows } = useSearch(rows, ["memberId", "memberName", "month", "year", "date"]);
  return (
    <div>

        <div style={{ background:"#451a03", border:"1px solid #92400e", borderRadius:8, padding:"12px 16px", marginBottom:14, fontSize:13, color:"#fcd34d" }}>
