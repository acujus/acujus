        const URLS = [

<body>
  <div id="root"></div>

  <!-- React + Babel from CDN — works offline after first load -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase SDKs -->
  <script type="module" id="firebase-init">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      updatePassword,
      reauthenticateWithCredential,
      EmailAuthProvider,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBh5kyfbP8UlPgJbb_-AIgu-0gdo0BKWa8",
      authDomain: "acujus-51e72.firebaseapp.com",
      projectId: "acujus-51e72",
      storageBucket: "acujus-51e72.firebasestorage.app",
      messagingSenderId: "444371340209",
      appId: "1:444371340209:web:a62a7828953fc501f68b90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // ── Auth email convention: username@acujus.internal ───────────────────────
    // Firebase Auth requires an email. We use a synthetic domain so usernames
    // stay simple (no real email needed). The actual email is never sent.
    const toAuthEmail = (username) => `${username.toLowerCase()}@acujus.internal`;

    // Expose Firebase helpers to window so Babel/React code can access them
    window.__firebase = {
      db, auth,
      setDoc, getDoc, onSnapshot, doc, collection,

      // ── Authentication helpers ──────────────────────────────────────────────
      async signIn(username, password) {
        return signInWithEmailAndPassword(auth, toAuthEmail(username), password);
      },
      async signOut() {
        return signOut(auth);
      },
      async createAuthUser(username, password) {
        return createUserWithEmailAndPassword(auth, toAuthEmail(username), password);
      },
      async resetPassword(username) {
        // Look up the user's real email from Firestore; fall back to synthetic address
        const snap = await getDoc(doc(db, "acujus", "users"));
        const allUsers = snap.exists() ? (snap.data().data || []) : [];
        const profile = allUsers.find(u => u.username && u.username.toLowerCase() === username.toLowerCase());
        if (!profile) throw new Error("Username not found.");
        const email = profile.email && profile.email.trim() ? profile.email.trim() : toAuthEmail(username);
        return sendPasswordResetEmail(auth, email);
      },
      async changePassword(currentPassword, newPassword) {
        const user = auth.currentUser;
        if (!user) throw new Error("Not signed in");
        const credential = EmailAuthProvider.credential(user.email, currentPassword);
        await reauthenticateWithCredential(user, credential);
        await updatePassword(user, newPassword);
      },
      onAuthStateChanged(cb) {
        return onAuthStateChanged(auth, cb);
      },
      getCurrentAuthUser() {
        return auth.currentUser;
      },

      // ── Admin config helpers (single-document, not a collection array) ────
      // Reads /acujus/config and returns its plain fields (not a .data array).
      async getConfig() {
        try {
          const snap = await getDoc(doc(db, "acujus", "config"));
          return snap.exists() ? snap.data() : null;
        } catch(e) { console.warn("Firebase getConfig error", e); return null; }
      },
      // Merges fields into /acujus/config.
      async setConfig(fields) {
        try {
          await setDoc(doc(db, "acujus", "config"), fields, { merge: true });
        } catch(e) { console.error("Firebase setConfig error", e); }
      },

      // ── Firestore data helpers ──────────────────────────────────────────────
      // Save a collection (array) to Firestore under /acujus/<key>
      async saveCollection(key, val) {
        try {
          await setDoc(doc(db, "acujus", key), { data: val }, { merge: false });
        } catch(e) { console.error("Firebase save error", key, e); }
      },
      // Load all collections at once
      async loadAll(keys) {
        const result = {};
        await Promise.all(keys.map(async (k) => {
          try {
            const snap = await getDoc(doc(db, "acujus", k));
            result[k] = snap.exists() ? (snap.data().data || []) : [];
          } catch(e) { result[k] = []; }
        }));
        return result;
      },
      // Subscribe to real-time changes for a key
      subscribe(key, callback) {
        return onSnapshot(doc(db, "acujus", key), (snap) => {
          if (snap.exists()) callback(snap.data().data || []);
          else callback([]);
        }, (err) => console.error("Firebase listen error", key, err));
      }
    };

    window.dispatchEvent(new Event("firebase-ready"));
    console.log("Firebase initialized ✓ (Auth + Firestore)");
  </script>

const COLLECTIONS = ["members","savings","loans","investments","expenses","otherIncome","welfare","welfareWithdrawals","dividends","users","withdrawals","mobileDeposits","loanApplications","shareCapital","announcements","auditLog"];

// ─── Firebase helpers (falls back to localStorage if Firebase not ready) ─────
const FB = () => window.__firebase;

// ─── One-time Auth migration: provision Firebase Auth accounts for existing users ──
// Called once after data loads. Idempotent — skips users that already have accounts.
// One-time Auth migration for legacy data that still has plain-text passwords
// in-memory (loaded from localStorage before the migration ran). After migration,
// passwords are stripped from all persistence paths, so this loop becomes a no-op
// (the `if (!u.password)` guard skips every user). Safe to call repeatedly.
async function provisionFirebaseAuthAccounts(users) {
  if (!FB() || !FB().createAuthUser) return;
  const allUsers = [
    DEFAULT_ADMIN,
    ...users
  ];
  for (const u of allUsers) {
    // After migration, password field will be absent — skip those users safely.
    if (!u.username || !u.password || u.password === "__CHANGE_ME__") continue;
    try {
      await FB().createAuthUser(u.username, u.password);
      console.log("Provisioned Firebase Auth for:", u.username);
    } catch (e) {
      // auth/email-already-in-use = already provisioned, skip silently
      if (e.code !== "auth/email-already-in-use") {
        console.warn("Could not provision Auth for", u.username, e.code);
      }
    }
  }
}

// ─── Security: strip plain-text passwords before any persistence ──────────────
// Firebase Auth is the authoritative credential store. The `password` field must
// never reach Firestore (or localStorage). Always call stripPassword() on user
// objects before saving them anywhere outside of the Firebase Auth SDK.
function stripPassword(user) {
  if (!user || typeof user !== "object") return user;
  const { password, ...safe } = user; // eslint-disable-line no-unused-vars
  return safe;
}
function stripPasswords(users) {
  if (!Array.isArray(users)) return users;
  return users.map(stripPassword);
}

async function fbSave(key, val) {
  // Never persist passwords to Firestore or localStorage
  const safeVal = key === "users" ? stripPasswords(val) : val;
  if (FB()) await FB().saveCollection(key, safeVal);
  // Always keep localStorage as offline backup
  try { localStorage.setItem("acujus:" + key, JSON.stringify(safeVal)); } catch {}
}

function fbSubscribe(key, callback) {
  if (FB()) return FB().subscribe(key, callback);
  return () => {};
}

// Legacy localStorage fallback
function loadLocal(key) {
  try { const v = localStorage.getItem("acujus:" + key); return v ? JSON.parse(v) : null; }
  catch { return null; }
}

// ─── Search & Filter Utilities ───────────────────────────────────────────────
// Generic search hook — filters an array of objects by a query string across
// any combination of specified keys.
function useSearch(rows, keys) {
  const [q, setQ] = useState("");
  const filtered = React.useMemo(() => {
    const t = q.trim().toLowerCase();
    if (!t) return rows;
    return rows.filter(row =>
      keys.some(k => String(row[k] ?? "").toLowerCase().includes(t))
    );
  }, [rows, q, keys.join(",")]);
  return { q, setQ, filtered };
}

// Reusable search bar component
function SearchBar({ q, setQ, placeholder = "Search…", count, total }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
      <div style={{ position: "relative", flex: 1, minWidth: 0 }}>
        <span style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", fontSize: 13, color: "#475569", pointerEvents: "none" }}>🔍</span>
        <input
          value={q}
          onChange={e => setQ(e.target.value)}
          placeholder={placeholder}
          style={{ ...styles.input, paddingLeft: 30, paddingRight: q ? 28 : 10, width: "100%", fontSize: 12 }}
        />
        {q && (
          <button onClick={() => setQ("")} style={{ position: "absolute", right: 6, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#64748b", fontSize: 14, cursor: "pointer", padding: "0 2px", lineHeight: 1 }}>✕</button>
        )}
      </div>
      {count !== undefined && total !== undefined && q && (
        <span style={{ fontSize: 11, color: "#64748b", whiteSpace: "nowrap", flexShrink: 0 }}>
          {count} / {total}
        </span>
      )}
    </div>
  );
}

// ─── Export Utilities ─────────────────────────────────────────────────────────
function exportCSV(filename, headers, rows) {
  const escape = v => {
    const s = v === null || v === undefined ? "" : String(v);
    return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const lines = [headers.map(escape).join(","), ...rows.map(r => r.map(escape).join(","))];
  const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ─── Default admin account (created on first launch) ─────────────────────────
// Password is intentionally absent from source. On first login the admin is
// forced to set one; thereafter it lives in Firebase Auth + Firestore config.
// password field intentionally omitted — Firebase Auth is the credential store.
// The __CHANGE_ME__ sentinel lives only in-memory to block login until admin sets a real password.
const DEFAULT_ADMIN = { id: "U001", username: "admin", password: "__CHANGE_ME__", role: "Admin", fullName: "System Administrator", createdAt: today() };
// Safe version (no password) used for all persistence paths
const DEFAULT_ADMIN_SAFE = stripPassword(DEFAULT_ADMIN);

// ─── Role permissions ─────────────────────────────────────────────────────────
// Admin:           Full access — system control, users, audit log, all finance
// Manager:         Oversight & approvals only — does NOT enter transactions
// Treasurer:       Enters all financial transactions — no dividends, mobile deposit approval, users
// Teller:          Front desk only — savings & withdrawals, dashboard & reports
// LoanOfficer:     Loans-focused — loan applications, active loans, members, reports, dashboard
// InternalAuditor: Read-only audit access — audit log, reports, dashboard, members (view only)
// Member:          Own statement and settings only
const ROLE_ACCESS = {
  Admin:           ["myStatement","dashboard","members","savings","loans","investments","expenses","otherIncome","welfare","dividends","reports","users","settings","withdrawals","mobileDeposits","loanApplications","shareCapital","auditLog","notifications"],
  Manager:         ["myStatement","dashboard","members","loans","investments","reports","settings","mobileDeposits","loanApplications","auditLog","notifications"],
  Treasurer:       ["myStatement","dashboard","members","savings","loans","investments","expenses","otherIncome","welfare","reports","settings","withdrawals","shareCapital","loanApplications"],
  Teller:          ["dashboard","savings","withdrawals","reports","settings"],
  LoanOfficer:     ["myStatement","dashboard","members","loans","loanApplications","reports","settings"],
  InternalAuditor: ["myStatement","dashboard","members","reports","auditLog","settings"],
  Member:          ["myStatement","settings"],
};

// ─── Initial seed data ───────────────────────────────────────────────────────
const EMPTY = { members: [], savings: [], loans: [], investments: [], expenses: [], otherIncome: [], welfare: [], welfareWithdrawals: [], dividends: [], users: [], withdrawals: [], mobileDeposits: [], loanApplications: [], shareCapital: [], announcements: [], auditLog: [] };

// ══════════════════════════════════════════════════════════════════════════════
// LOGIN SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function LoginScreen({ onLogin, onMustChangePassword, users, announcements }) {
  const { isDark, toggleTheme } = useTheme();
  const ls = makeLs(isDark);

  // ── Remember last username ────────────────────────────────────────────────
  const [username, setUsername] = useState(() => {
    try { return localStorage.getItem("acujus:lastUsername") || ""; } catch { return ""; }
  });
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [showPw, setShowPw] = useState(false);

  // ── Forgot-password flow ──────────────────────────────────────────────────
  const [forgotMode, setForgotMode] = useState(false);   // show reset panel
  const [resetUsername, setResetUsername] = useState(""); // username typed in reset panel
  const [resetStatus, setResetStatus] = useState(null);  // { ok: bool, msg: string } | null
  const [resetBusy, setResetBusy] = useState(false);

  const handleLogin = async () => {
    if (!username || !password) { setError("Please enter username and password."); return; }
    setError("");
    const allUsers = [DEFAULT_ADMIN, ...users];
    const userProfile = allUsers.find(u => u.username.toLowerCase() === username.toLowerCase());
    if (!userProfile) { setError("Invalid username or password."); return; }

    // Use Firebase Auth when available, with legacy fallback for pre-migration accounts
    if (FB() && FB().signIn) {
      try {
        await FB().signIn(username, password);
        // ── Persist last username on successful login ──
        try { localStorage.setItem("acujus:lastUsername", username.toLowerCase()); } catch {}
        // ── Check if admin needs to set a password (first-ever login) ──────────
        if (userProfile.id === "U001" && FB().getConfig) {
          const cfg = await FB().getConfig();
          if (!cfg || !cfg.adminPasswordSet) {
            onLogin(stripPassword(userProfile));
            onMustChangePassword(true);
            return;
          }
        }
        onLogin(stripPassword(userProfile));
      } catch (err) {
        // Firebase Auth account doesn't exist yet — could be first-ever setup (admin)
        // or a pre-migration user with a plain-text password in their profile.
        const isAdminFirstSetup = userProfile.id === "U001" && userProfile.password === "__CHANGE_ME__";
        if (isAdminFirstSetup) {
          // No Auth account + sentinel password = genuine first-time setup.
          // Create the Auth account with whatever password was typed, then force a change.
          try { await FB().createAuthUser(userProfile.username, password); } catch (createErr) {
            if (createErr.code !== "auth/email-already-in-use") {
              setError("Could not create admin account: " + (createErr.message || createErr.code));
              return;
            }
          }
          // Reset the flag so ForcePasswordChange screen is shown (account was deleted+recreated)
          if (FB().setConfig) await FB().setConfig({ adminPasswordSet: false });
          // Sign in with the just-created account
          try { await FB().signIn(userProfile.username, password); } catch (_) {}
          try { localStorage.setItem("acujus:lastUsername", userProfile.username.toLowerCase()); } catch {}
          onLogin(stripPassword(userProfile));
          onMustChangePassword(true);
          return;
        }
        // Legacy pre-migration user with plain-text password stored in profile
        const legacyOk = userProfile.password === password;
        if (legacyOk) {
          try { await FB().createAuthUser(userProfile.username, password); } catch (_) {}
          try { localStorage.setItem("acujus:lastUsername", username.toLowerCase()); } catch {}
          onLogin(stripPassword(userProfile));
        } else {
          setError("Invalid username or password.");
        }
      }
    } else {
      // Offline path: Firebase Auth unavailable. Verify against in-memory password (legacy).
      if (userProfile.password !== password) { setError("Invalid username or password."); return; }
      try { localStorage.setItem("acujus:lastUsername", username.toLowerCase()); } catch {}
      onLogin(stripPassword(userProfile));
    }
  };

  const handleForgotSubmit = async () => {
    if (!resetUsername.trim()) { setResetStatus({ ok: false, msg: "Please enter your username." }); return; }
    if (!FB() || !FB().resetPassword) {
      setResetStatus({ ok: false, msg: "Password reset is unavailable (offline mode)." });
      return;
    }
    setResetBusy(true);
    setResetStatus(null);
    try {
      await FB().resetPassword(resetUsername.trim());
      setResetStatus({ ok: true, msg: "Reset email sent! Check the inbox linked to your account." });
    } catch (e) {
      const msg = e.message && e.message.includes("Username not found")
        ? "Username not found. Contact your administrator."
        : "Could not send reset email. Contact your administrator.";
      setResetStatus({ ok: false, msg });
    } finally {
      setResetBusy(false);
    }
  };

  // ── Forgot-password panel ─────────────────────────────────────────────────
  if (forgotMode) {
    return (
      <div style={ls.bg}>
        <button
          onClick={toggleTheme}
          title={isDark ? "Switch to Light mode" : "Switch to Dark mode"}
          style={{ position: "fixed", top: 12, right: 16, background: isDark ? "#1e293b" : "#f1f5f9", color: isDark ? "#fcd34d" : "#475569", border: isDark ? "1px solid #334155" : "1px solid #cbd5e1", borderRadius: 8, padding: "6px 12px", fontSize: 16, cursor: "pointer", zIndex: 10 }}
        >
          {isDark ? "☀" : "🌙"}
        </button>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "100%" }}>
          <div style={ls.card}>
            <div style={ls.logoBlock}>
              <img src={LOGO_URI} alt="ACUJUS Logo" style={{ width: 120, height: 120, objectFit: "contain", borderRadius: "50%", display: "block", margin: "0 auto 8px" }} />
              <div style={ls.tagline}>Password Reset</div>
            </div>
            <div style={ls.formBlock}>
              <div style={{ fontSize: 13, color: isDark ? "#94a3b8" : "#64748b", marginBottom: 18, lineHeight: 1.6 }}>
                Enter your username and we'll send a reset link to the email address associated with your account.
              </div>
              <div style={ls.fieldLabel}>Username</div>
              <input
                style={ls.input}
                value={resetUsername}
                onChange={e => { setResetUsername(e.target.value); setResetStatus(null); }}
                onKeyDown={e => e.key === "Enter" && handleForgotSubmit()}
                placeholder="Enter your username"
                autoFocus
                autoComplete="username"
              />
              {resetStatus && (
                <div style={{ background: resetStatus.ok ? (isDark ? "#052e16" : "#dcfce7") : (isDark ? "#450a0a" : "#fee2e2"), color: resetStatus.ok ? (isDark ? "#86efac" : "#166534") : (isDark ? "#fca5a5" : "#991b1b"), borderRadius: 6, padding: "10px 16px", fontSize: 14, marginTop: 14 }}>
                  {resetStatus.msg}
                </div>
              )}
              <button
                style={{ ...ls.loginBtn, opacity: resetBusy ? 0.7 : 1 }}
                onClick={handleForgotSubmit}
                disabled={resetBusy}
              >
                {resetBusy ? "Sending…" : "Send Reset Link →"}
              </button>
              <button
                onClick={() => { setForgotMode(false); setResetStatus(null); setResetUsername(""); }}
                style={{ background: "none", border: "none", color: isDark ? "#3b82f6" : "#2563eb", cursor: "pointer", fontSize: 13, marginTop: 14, width: "100%", textAlign: "center" }}
              >
                ← Back to Sign In
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── Normal sign-in panel ──────────────────────────────────────────────────
  return (
    <div style={ls.bg}>
      {/* Theme toggle on login screen */}
      <button
        onClick={toggleTheme}
        title={isDark ? "Switch to Light mode" : "Switch to Dark mode"}
        style={{ position: "fixed", top: 12, right: 16, background: isDark ? "#1e293b" : "#f1f5f9", color: isDark ? "#fcd34d" : "#475569", border: isDark ? "1px solid #334155" : "1px solid #cbd5e1", borderRadius: 8, padding: "6px 12px", fontSize: 16, cursor: "pointer", zIndex: 10 }}
      >
        {isDark ? "☀" : "🌙"}
      </button>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "100%" }}>
        <div style={ls.card}>
          <div style={ls.logoBlock}>
            <img src={LOGO_URI} alt="ACUJUS Logo" style={{ width: 160, height: 160, objectFit: "contain", borderRadius: "50%", display: "block", margin: "0 auto 8px" }} />
            <div style={ls.tagline}>Fully Automated Finance System</div>
          </div>
          <div style={ls.formBlock}>
            <div style={ls.fieldLabel}>Username</div>
            <input
              style={ls.input}
              value={username}
              onChange={e => { setUsername(e.target.value); setError(""); }}
              onKeyDown={e => e.key === "Enter" && handleLogin()}
              placeholder="Enter your username"
              autoComplete="username"
            />
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={ls.fieldLabel}>Password</div>
              <button
                onClick={() => { setForgotMode(true); setResetUsername(username); }}
                style={{ background: "none", border: "none", color: isDark ? "#3b82f6" : "#2563eb", cursor: "pointer", fontSize: 12, padding: "0 0 2px", fontFamily: "inherit" }}
              >
                Forgot password?
              </button>
            </div>
            <div style={ls.pwWrap}>
              <input
                style={{ ...ls.input, paddingRight: 44 }}
                type={showPw ? "text" : "password"}
                value={password}
                onChange={e => { setPassword(e.target.value); setError(""); }}
                onKeyDown={e => e.key === "Enter" && handleLogin()}
                placeholder="Enter your password"
                autoComplete="current-password"
              />
              <button style={ls.eyeBtn} onClick={() => setShowPw(p => !p)}>{showPw ? "🙈" : "👁"}</button>
            </div>
            {error && <div style={ls.error}>{error}</div>}
            <button style={ls.loginBtn} onClick={handleLogin}>Sign In →</button>
            <div style={ls.hint}>Contact your system administrator if you need access.</div>
          </div>
        </div>
        <LoginAnnouncementPanel announcements={announcements} />
      </div>
    </div>
  );
}


function LoginAnnouncementPanel({ announcements }) {
  const active = (announcements || []).filter(a => a.active !== false);
  const [idx, setIdx] = useState(0);
  const [expanded, setExpanded] = useState(null);

  useEffect(() => {
    if (active.length <= 1) { setIdx(0); return; }
    const t = setInterval(() => setIdx(i => (i + 1) % active.length), 6000);
    return () => clearInterval(t);
  }, [active.length]);

  if (active.length === 0) return null;

  const safeIdx = idx % active.length;
  const item = active[safeIdx];
  const cfg = ANNC_COLORS[item.type] || ANNC_COLORS.Announcement;
  const hasMedia = item.mediaType === "image" || item.mediaType === "video" || item.mediaType === "youtube";
  const goNext = () => setIdx(i => (i + 1) % active.length);
  const goPrev = () => setIdx(i => (i - 1 + active.length) % active.length);

  return (
    <div style={{
      width: 440, maxWidth: "95vw",
      background: cfg.bg,
      border: "1px solid " + cfg.border,
      borderTop: "none",
      borderRadius: "0 0 16px 16px",
      overflow: "hidden",
      boxShadow: "0 16px 48px rgba(0,0,0,0.5)",
      marginBottom: 16,
    }}>
      <style>{`
        @keyframes lp-scroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
        .lp-ticker-inner { display:inline-flex; white-space:nowrap; animation:lp-scroll 60s linear infinite; }
        .lp-ticker-wrap:hover .lp-ticker-inner { animation-play-state:paused; }
        @keyframes lp-fade { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
        .lp-card-enter { animation:lp-fade 0.3s ease; }
      `}</style>

      <div style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 16px", borderBottom: expanded === item.id && hasMedia ? "1px solid " + cfg.border + "44" : "none" }}>
        <span style={{ background:cfg.badge, color:"#fff", fontSize:11, fontWeight:800, borderRadius:4, padding:"3px 9px", whiteSpace:"nowrap", letterSpacing:0.5, flexShrink:0 }}>
          {cfg.icon} {item.type ? item.type.toUpperCase() : ""}
        </span>
        <div className="lp-ticker-wrap" style={{ flex:1, overflow:"hidden" }} title="Hover to pause">
          <span className="lp-ticker-inner" style={{ fontSize:14, color:"#f1f5f9", fontWeight:500, gap:"60px" }}>
            <span>{item.message}&nbsp;&nbsp;&nbsp;\u2605&nbsp;&nbsp;&nbsp;</span>
            <span>{item.message}&nbsp;&nbsp;&nbsp;\u2605&nbsp;&nbsp;&nbsp;</span>
          </span>
        </div>
        {hasMedia && (
          <button onClick={() => setExpanded(expanded === item.id ? null : item.id)}
            style={{ background:cfg.badge+"33", color:cfg.badge, border:"1px solid "+cfg.badge+"66", borderRadius:5, padding:"3px 10px", fontSize:11, cursor:"pointer", fontWeight:700, flexShrink:0, whiteSpace:"nowrap" }}>
            {expanded === item.id ? "\u25b2 Hide" : (item.mediaType === "video" || item.mediaType === "youtube" ? "\u25b6 Play" : "\ud83d\uddbc\ufe0f View")}
          </button>
        )}
        {active.length > 1 && (
          <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
            <button onClick={goPrev} style={{ background:"none", border:"none", color:"#94a3b8", fontSize:14, cursor:"pointer", padding:"0 2px" }}>\u2039</button>
            {active.map((_, i) => (
              <button key={i} onClick={() => setIdx(i)} style={{ width:7, height:7, borderRadius:"50%", border:"none", cursor:"pointer", padding:0, background: i === safeIdx ? cfg.badge : "#334155", transition:"background .3s" }} />
            ))}
            <button onClick={goNext} style={{ background:"none", border:"none", color:"#94a3b8", fontSize:14, cursor:"pointer", padding:"0 2px" }}>\u203a</button>
            <span style={{ fontSize:10, color:"#475569" }}>{safeIdx+1}/{active.length}</span>
          </div>
        )}
      </div>

      {expanded === item.id && hasMedia && (
        <div className="lp-card-enter" style={{ padding:"12px 16px", display:"flex", justifyContent:"center", background:cfg.bg+"cc" }}>
          {item.mediaType === "image" && item.mediaData && (
            <img src={item.mediaData} alt={item.message}
              style={{ maxHeight:260, maxWidth:"100%", borderRadius:8, objectFit:"contain", boxShadow:"0 4px 24px rgba(0,0,0,.5)" }} />
          )}
          {item.mediaType === "video" && item.mediaData && (
            <video controls autoPlay style={{ maxHeight:260, maxWidth:"100%", borderRadius:8, boxShadow:"0 4px 24px rgba(0,0,0,.5)" }}>
              <source src={item.mediaData} />
            </video>
          )}
          {item.mediaType === "youtube" && item.mediaData && (
            <iframe
              src={(() => {
                const u = item.mediaData.trim();
                const m = u.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
                const vid = m ? m[1] : u;
                return "https://www.youtube.com/embed/" + vid + "?autoplay=1";
              })()}
              title={item.message}
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowFullScreen
              style={{ width:"100%", maxWidth:580, height:280, border:"none", borderRadius:8, boxShadow:"0 4px 24px rgba(0,0,0,.5)" }}
            />
          )}
        </div>
      )}
    </div>
  );
}

function UserManagement({ data, persist, setModal }) {
  const allUsers = [DEFAULT_ADMIN, ...data.users];
  const { q, setQ, filtered } = useSearch(allUsers, ["id", "username", "fullName", "role"]);
  return (
    <div>
      <div style={styles.toolbar}>
        <SearchBar q={q} setQ={setQ} placeholder="Search by username, name, role…" count={filtered.length} total={allUsers.length} />
        <span style={{ ...styles.count, flexShrink: 0 }}>{allUsers.length} system users</span>
        <button style={styles.btnPrimary} onClick={() => setModal({ type: "addUser" })}>+ Add User</button>
      </div>
      <ResizableTableWrap headers={["User ID","Username","Full Name","Role","Created","Actions"]}>
        <tbody>
          {filtered.length === 0 && <tr><td colSpan={6} style={styles.empty}>{q ? "No users match your search" : "No users"}</td></tr>}
          {filtered.map((u, i) => (
            <tr key={u.id} style={styles.tr}>
              <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{u.id}</td>
              <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}><strong>{u.username}</strong></td>
              <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{u.fullName}</td>
              <td style={styles.td}>
                <span style={{ ...styles.badge, background: u.role === "Admin" ? "#1e3a5f" : u.role === "Manager" ? "#1a2f1a" : u.role === "Treasurer" ? "#3b2100" : u.role === "Teller" ? "#1c1407" : u.role === "LoanOfficer" ? "#0d2b1f" : u.role === "InternalAuditor" ? "#2d1026" : "#1a1a2e", color: u.role === "Admin" ? "#93c5fd" : u.role === "Manager" ? "#86efac" : u.role === "Treasurer" ? "#fbbf24" : u.role === "Teller" ? "#f97316" : u.role === "LoanOfficer" ? "#34d399" : u.role === "InternalAuditor" ? "#f472b6" : "#c4b5fd" }}>
                  {u.role}
                </span>
              </td>
              <td style={{ ...styles.td, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{u.createdAt}</td>
              <td style={{ ...styles.td, whiteSpace:"nowrap" }}>
                {u.id !== "U001" && <>
                  <button style={styles.btnSm} onClick={() => setModal({ type: "editUser", payload: u })}>Edit</button>
                  <button style={{ ...styles.btnSm, ...styles.btnDanger }} onClick={() => { const uid = u.id; const uname = u.username; const uful = u.fullName; if (confirm("Delete user " + uname + "?")) { persist("users", data.users.filter(x => x.id !== uid), { action: "deleted", target: uname + " (" + uful + ")", detail: "User account removed" }); } }}>Del</button>
                </>}
                {u.id === "U001" && <span style={{ fontSize: 11, color: "#475569" }}>System</span>}
              </td>
            </tr>
          ))}
        </tbody>
      </ResizableTableWrap>
    </div>
  );
}

// ─── Force Password Change (admin first-login interstitial) ──────────────────
// Shown when admin logs in and Firestore has no adminPasswordSet flag.
// Cannot be dismissed — the admin must complete it before accessing the app.
function ForcePasswordChange({ currentUser, onComplete }) {
  const { isDark } = useTheme();
  const ls = makeLs(isDark);

  const [newPw,     setNewPw]     = React.useState("");
  const [confirmPw, setConfirmPw] = React.useState("");
  const [showNew,   setShowNew]   = React.useState(false);
  const [showConf,  setShowConf]  = React.useState(false);
  const [busy,      setBusy]      = React.useState(false);
  const [error,     setError]     = React.useState("");

  const handleSubmit = async () => {
    setError("");
    if (!newPw || !confirmPw) { setError("Both fields are required."); return; }
    if (newPw.length < 8)     { setError("Password must be at least 8 characters."); return; }
    if (newPw !== confirmPw)  { setError("Passwords do not match."); return; }

    setBusy(true);
    try {
      // 1. Create (or overwrite) the Firebase Auth account for admin with the new password.
      //    createAuthUser throws auth/email-already-in-use if the account already exists,
      //    so we always try changePassword first, then fall back to create.
      if (FB()) {
        const authUser = FB().getCurrentAuthUser && FB().getCurrentAuthUser();
        if (authUser && FB().changePassword) {
          // Already signed in — re-auth not needed here because this is first-time setup
          // and Firebase issued the session in this same page load.
          try {
            await FB().changePassword(newPw, newPw); // current=same since account was just created
          } catch (_) {
            // If re-auth fails (e.g. account was provisioned with sentinel), recreate
            try { await FB().createAuthUser(currentUser.username, newPw); } catch (_2) {}
          }
        } else {
          try { await FB().createAuthUser(currentUser.username, newPw); } catch (_) {}
        }
        // 2. Persist the flag to Firestore so this interstitial never appears again.
        if (FB().setConfig) {
          await FB().setConfig({ adminPasswordSet: true, adminPasswordSetAt: new Date().toISOString() });
        }
      }
      // 3. Remove any leftover localStorage override (legacy).
      try { localStorage.removeItem("acujus:users:adminpw"); } catch {}
      onComplete(newPw);
    } catch (err) {
      setError("Failed to set password: " + (err.message || err.code || "unknown error"));
    } finally {
      setBusy(false);
    }
  };

  const PwRow = ({ label, value, onChange, show, toggle }) => (
    <div style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 12, color: isDark ? "#94a3b8" : "#64748b", fontWeight: 600,
                    textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>{label}</div>
      <div style={{ position: "relative" }}>
        <input
          type={show ? "text" : "password"}
          value={value}
          onChange={e => { onChange(e.target.value); setError(""); }}
          onKeyDown={e => e.key === "Enter" && handleSubmit()}
          style={{ ...ls.input, fontSize: 15, padding: "12px 48px 12px 14px" }}
          placeholder="••••••••"
          autoComplete="new-password"
        />
        <button onClick={toggle} style={{ position: "absolute", right: 14, top: "50%",
          transform: "translateY(-50%)", background: "none", border: "none",
          cursor: "pointer", fontSize: 18, color: "#64748b" }}>
          {show ? "🙈" : "👁"}
        </button>
      </div>
    </div>
  );

  return (
    <div style={ls.bg}>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: "100%" }}>
        <div style={{ ...ls.card, maxWidth: 420 }}>
          <div style={ls.logoBlock}>
            <img src={LOGO_URI} alt="ACUJUS" style={{ width: 80, height: 80, objectFit: "contain",
              borderRadius: "50%", display: "block", margin: "0 auto 10px" }} />
            <div style={{ ...ls.tagline, fontSize: 15 }}>Set Admin Password</div>
          </div>

          <div style={{ background: isDark ? "#1e3a1e" : "#dcfce7",
                        border: `1px solid ${isDark ? "#166534" : "#86efac"}`,
                        borderRadius: 8, padding: "12px 16px", marginBottom: 22,
                        fontSize: 13, color: isDark ? "#86efac" : "#166534", lineHeight: 1.6 }}>
            <strong>Welcome, {currentUser.fullName}.</strong> For security, you must set a
            permanent admin password before continuing. This replaces the factory default and
            cannot be skipped.
          </div>

          {error && (
            <div style={{ background: isDark ? "#450a0a" : "#fee2e2",
                          color: isDark ? "#fca5a5" : "#991b1b",
                          borderRadius: 8, padding: "10px 16px", marginBottom: 18, fontSize: 14 }}>
              ✗ {error}
            </div>
          )}

          <PwRow label="New Password (min 8 chars)"
            value={newPw} onChange={setNewPw} show={showNew} toggle={() => setShowNew(p => !p)} />
          <PwRow label="Confirm New Password"
            value={confirmPw} onChange={setConfirmPw} show={showConf} toggle={() => setShowConf(p => !p)} />

          <button
            onClick={handleSubmit}
            disabled={busy}
            style={{ ...ls.loginBtn, opacity: busy ? 0.7 : 1 }}>
            {busy ? "Saving…" : "Set Password & Continue →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App() {
  const { isDark, toggleTheme } = useTheme();
  // Recompute styles on every render so theme changes propagate
  Object.assign(styles, makeStyles(isDark ? DARK : LIGHT));
  const [data, setData] = useState(EMPTY);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("dashboard");

  // Once user logs in, redirect Member role to myStatement
  useEffect(() => {
    if (currentUser && currentUser.role === "Member") setTab("myStatement");
    else if (currentUser && currentUser.role !== "Member") setTab("dashboard");
  }, [currentUser?.id]);
  const [modal, setModal] = useState(null);
  const [currentUser, setCurrentUser] = useState(null); // logged-in user
  const [installPrompt, setInstallPrompt] = useState(null);
  const [showInstallBanner, setShowInstallBanner] = useState(false);
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  const [mobileOverride, setMobileOverride] = useState(null); // null = auto, true/false = manual

  // Auto-detect screen size unless user has manually overridden
  useEffect(() => {
    const handler = () => {
      if (mobileOverride === null) setIsMobile(window.innerWidth < 768);
    };
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, [mobileOverride]);

  const effectiveMobile = mobileOverride !== null ? mobileOverride : isMobile;
  const toggleView = () => setMobileOverride(prev => prev === null ? !isMobile : !prev);

  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setInstallPrompt(e); setShowInstallBanner(true); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  const handleInstall = () => {
    if (installPrompt) { installPrompt.prompt(); installPrompt.userChoice.then(() => { setInstallPrompt(null); setShowInstallBanner(false); }); }
  };

  const [syncStatus, setSyncStatus] = useState("connecting"); // connecting | live | offline
  const [sidebarOpen, setSidebarOpen] = useState(false); // mobile drawer
  const [authChecked, setAuthChecked] = useState(false); // true once Firebase Auth resolves
  const [mustChangeAdminPassword, setMustChangeAdminPassword] = useState(false); // force first-login password set
  const [pullState, setPullState] = useState({ pulling: false, refreshing: false, distance: 0 });
  const pullRef = React.useRef({ startY: 0, pulling: false });

  // ── Inactivity auto-logout ────────────────────────────────────────────────
  // Logs out after 15 minutes of no activity. Shows a 60-second warning first.
  const INACTIVITY_MS  = 14 * 60 * 1000; // 14 min → then show warning
  const WARNING_MS     = 60 * 1000;       // 1 min warning countdown
  const [inactivityWarning, setInactivityWarning] = useState(false);
  const [warningCountdown, setWarningCountdown] = useState(60);
  const inactivityTimer  = React.useRef(null);
  const warningTimer     = React.useRef(null);
  const countdownTimer   = React.useRef(null);

  const doLogout = React.useCallback(async () => {
    setInactivityWarning(false);
    if (FB() && FB().signOut) { try { await FB().signOut(); } catch(_) {} }
    setCurrentUser(null);
  }, []);

  const resetInactivityTimer = React.useCallback(() => {
    if (!currentUser) return;
    clearTimeout(inactivityTimer.current);
    clearTimeout(warningTimer.current);
    clearInterval(countdownTimer.current);
    setInactivityWarning(false);
    setWarningCountdown(60);
    inactivityTimer.current = setTimeout(() => {
      setInactivityWarning(true);
      setWarningCountdown(60);
      let secs = 60;
      countdownTimer.current = setInterval(() => {
        secs -= 1;
        setWarningCountdown(secs);
        if (secs <= 0) clearInterval(countdownTimer.current);
      }, 1000);
      warningTimer.current = setTimeout(() => {
        clearInterval(countdownTimer.current);
        doLogout();
      }, WARNING_MS);
    }, INACTIVITY_MS);
  }, [currentUser, doLogout]);

  useEffect(() => {
    if (!currentUser) {
      clearTimeout(inactivityTimer.current);
      clearTimeout(warningTimer.current);
      clearInterval(countdownTimer.current);
      setInactivityWarning(false);
      return;
    }
    const events = ["mousemove", "mousedown", "keydown", "touchstart", "scroll", "click"];
    const handler = () => resetInactivityTimer();
    events.forEach(e => window.addEventListener(e, handler, { passive: true }));
    resetInactivityTimer();
    return () => {
      events.forEach(e => window.removeEventListener(e, handler));
      clearTimeout(inactivityTimer.current);
      clearTimeout(warningTimer.current);
      clearInterval(countdownTimer.current);
    };
  }, [currentUser, resetInactivityTimer]);
  // ─────────────────────────────────────────────────────────────────────────

  // ── Firebase Auth state: persist login across page refreshes ────────────
  useEffect(() => {
    const attachAuthListener = () => {
      if (!FB() || !FB().onAuthStateChanged) { setAuthChecked(true); return; }
      const unsub = FB().onAuthStateChanged(async (firebaseUser) => {
        if (firebaseUser) {
          // Firebase has a valid session — restore the user profile from Firestore.
          // This is the key fix for new devices: when a user is already signed in
          // (e.g. page refresh, or opening the app on a new device after login),
          // we look up their profile from Firestore and restore currentUser automatically.
          try {
            const snap = await FB().loadAll(["users"]);
            const allUsers = [DEFAULT_ADMIN_SAFE, ...(snap.users || [])];
            // Firebase Auth email is username@acujus.internal — extract the username
            const username = firebaseUser.email.replace(/@acujus\.internal$/, "");
            const profile = allUsers.find(u => u.username && u.username.toLowerCase() === username.toLowerCase());
            if (profile && !currentUserRef.current) {
              setCurrentUser(stripPassword(profile));
            }
          } catch(e) {
            console.warn("Could not restore session profile:", e);
          }
        } else {
          // No Firebase session — ensure user is logged out
          if (currentUserRef.current) setCurrentUser(null);
        }
        setAuthChecked(true);
      });
      return unsub;
    };
    let unsub;
    if (FB()) {
      unsub = attachAuthListener();
    } else {
      const onReady = () => {
        window.removeEventListener("firebase-ready", onReady);
        unsub = attachAuthListener();
      };
      window.addEventListener("firebase-ready", onReady);
      // Safety-net: if Firebase never fires the ready event (e.g. blocked by
      // an ad-blocker or network error), unblock the UI after 500 ms instead
      // of making the user stare at a blank screen for 3 full seconds.
      const timer = setTimeout(() => setAuthChecked(true), 500);
      return () => { clearTimeout(timer); window.removeEventListener("firebase-ready", onReady); if (unsub) unsub(); };
    }
    return () => { if (unsub) unsub(); };
  }, []);

  // ── Helper: load share price + max shares from config ─────────────────────
  const loadSharePrice = async () => {
    try {
      if (FB() && FB().getConfig) {
        const cfg = await FB().getConfig();
        if (cfg && cfg[SHARE_PRICE_CONFIG_KEY] && Number(cfg[SHARE_PRICE_CONFIG_KEY]) > 0) {
          SHARE_PRICE = Number(cfg[SHARE_PRICE_CONFIG_KEY]);
          try { localStorage.setItem("acujus:sharePrice", String(SHARE_PRICE)); } catch(e) {}
        }
        if (cfg && cfg[MAX_SHARES_CONFIG_KEY] && Number(cfg[MAX_SHARES_CONFIG_KEY]) > 0) {
          COMPANY_MAX_SHARES = Number(cfg[MAX_SHARES_CONFIG_KEY]);
          try { localStorage.setItem("acujus:maxShares", String(COMPANY_MAX_SHARES)); } catch(e) {}
        }
        return;
      }
    } catch(e) {}
    try {
      const lp = localStorage.getItem("acujus:sharePrice");
      if (lp && !isNaN(Number(lp)) && Number(lp) > 0) SHARE_PRICE = Number(lp);
    } catch(e) {}
    try {
      const lm = localStorage.getItem("acujus:maxShares");
      if (lm && !isNaN(Number(lm)) && Number(lm) > 0) COMPANY_MAX_SHARES = Number(lm);
    } catch(e) {}
  };

  // ── Manual refresh: re-fetch all collections from Firebase ────────────────
  const doRefresh = useCallback(async () => {
    if (!FB()) { setSyncStatus("offline"); return; }
    setPullState(s => ({ ...s, refreshing: true, pulling: false, distance: 0 }));
    setSyncStatus("connecting");
    try {
      const d = await FB().loadAll(COLLECTIONS);
      const merged = {};
      for (const k of COLLECTIONS) {
        // Always prefer Firebase data; only fall back to localStorage if Firebase returns nothing.
        // On new devices localStorage is empty — we must use Firebase data directly.
        if (d[k] && d[k].length > 0) {
          merged[k] = d[k];
          try { localStorage.setItem("acujus:" + k, JSON.stringify(d[k])); } catch {}
        } else {
          merged[k] = loadLocal(k) || [];
        }
      }
      await loadSharePrice();
      setData(merged);
      setSyncStatus("live");
    } catch(e) {
      setSyncStatus("offline");
    }
    setPullState({ pulling: false, refreshing: false, distance: 0 });
  }, []);

  // Load all data — Firebase first, localStorage fallback
  useEffect(() => {
    let cancelled = false;

    const doLoad = async () => {
      if (FB()) {
        try {
          setSyncStatus("connecting");
          const d = await FB().loadAll(COLLECTIONS);
          // Prefer Firebase data; cache to localStorage for offline use.
          // On new devices localStorage is empty — Firebase data must win.
          const merged = {};
          for (const k of COLLECTIONS) {
            if (d[k] && d[k].length > 0) {
              merged[k] = d[k];
              try { localStorage.setItem("acujus:" + k, JSON.stringify(d[k])); } catch {}
            } else {
              merged[k] = loadLocal(k) || [];
            }
          }
          if (!cancelled) {
            setData(merged);
            setLoaded(true);
            setSyncStatus("live");
            // Load share price from config
            loadSharePrice().catch(()=>{});
            // One-time migration: provision Firebase Auth accounts for existing users
            const migDone = localStorage.getItem("acujus:auth:migrated");
            if (!migDone) {
              provisionFirebaseAuthAccounts(merged.users || []).then(() => {
                localStorage.setItem("acujus:auth:migrated", "1");
              }).catch(() => {});
            }
          }
        } catch(e) {
          console.error("Firebase load failed, using localStorage", e);
          const d = {};
          for (const k of COLLECTIONS) { d[k] = loadLocal(k) || []; }
          if (!cancelled) { setData(d); setLoaded(true); setSyncStatus("offline"); }
        }
      } else {
        // Firebase not ready yet — wait for it
        const onReady = async () => {
          window.removeEventListener("firebase-ready", onReady);
          const d = await FB().loadAll(COLLECTIONS);
          const merged = {};
          for (const k of COLLECTIONS) {
            if (d[k] && d[k].length > 0) {
              merged[k] = d[k];
              try { localStorage.setItem("acujus:" + k, JSON.stringify(d[k])); } catch {}
            } else {
              merged[k] = loadLocal(k) || [];
            }
          }
          if (!cancelled) { setData(merged); setLoaded(true); setSyncStatus("live"); }
        };
        window.addEventListener("firebase-ready", onReady);
        // Also load localStorage immediately so app isn't blank
        const d = {};
        for (const k of COLLECTIONS) { d[k] = loadLocal(k) || []; }
        if (!cancelled) { setData(d); setLoaded(true); }
      }
    };

    doLoad();

    // Real-time listeners for all collections
    const unsubs = [];
    const attachListeners = () => {
      if (!FB()) return;
      for (const k of COLLECTIONS) {
        const unsub = fbSubscribe(k, (val) => {
          if (!cancelled) {
            setData(prev => ({ ...prev, [k]: val }));
            setSyncStatus("live");
          }
        });
        unsubs.push(unsub);
      }
    };

    if (FB()) attachListeners();
    else window.addEventListener("firebase-ready", attachListeners);

    return () => {
      cancelled = true;
      unsubs.forEach(u => u && u());
    };
  }, []);

  const persist = useCallback(async (key, val, auditMeta) => {
    // Optimistic local update first (instant UI)
    setData(prev => {
      const updated = { ...prev, [key]: val };
      // Auto-generate audit log entry (skip when key IS auditLog to avoid recursion)
      if (key !== "auditLog" && auditMeta !== false) {
        const actor = currentUserRef.current;
        // Auto-detect action from array size change when not explicitly provided
        let action = auditMeta?.action;
        if (!action && Array.isArray(val) && Array.isArray(prev[key])) {
          if (val.length > prev[key].length) action = "added";
          else if (val.length < prev[key].length) action = "deleted";
          else action = "edited";
        }
        action = action || "modified";
        const entry = {
          id: "AL" + Date.now() + Math.random().toString(36).slice(2, 6).toUpperCase(),
          ts: new Date().toISOString(),
          userId: actor?.id || "?",
          userName: actor?.fullName || actor?.username || "Unknown",
          userRole: actor?.role || "?",
          collection: key,
          action,
          target: auditMeta?.target || "",
          detail: auditMeta?.detail || "",
        };
        const prevLog = prev.auditLog || [];
        // Cap at 2000 entries (drop oldest)
        const newLog = [entry, ...prevLog].slice(0, 2000);
        updated.auditLog = newLog;
        // Persist auditLog async (fire and forget)
        fbSave("auditLog", newLog);
      }
      return updated;
    });
    // Then save to Firebase (+ localStorage backup)
    await fbSave(key, val);
  }, []);

  // Keep a ref to currentUser so persist's closure can read the latest value
  const currentUserRef = React.useRef(currentUser);
  useEffect(() => { currentUserRef.current = currentUser; }, [currentUser]);

  // ── Derived KPIs ──────────────────────────────────────────────────────────
  const kpi = (() => {
    const totalSavings = data.savings.reduce((s, r) => s + Number(r.amount || 0), 0);
    const totalWithdrawals = data.withdrawals.reduce((s, r) => s + Number(r.amount || 0) + Number(r.charge || 0), 0);
    const netSavings = totalSavings - totalWithdrawals;
    const totalLoans = data.loans.reduce((s, r) => s + Number(r.loanAmount || 0), 0);
    // Actual interest received = min(amountPaid, interestAmount) per loan
    // (interest is collected before principal; if fully paid, all interest is received)
    const totalLoanInterest = data.loans.reduce((s, r) => {
      const paid = Number(r.amountPaid || 0);
      const interest = Number(r.interestAmount || 0);
      return s + Math.min(paid, interest);
    }, 0);
    // Projected (accrued) interest — for display reference only
    const totalLoanInterestAccrued = data.loans.reduce((s, r) => s + Number(r.interestAmount || 0), 0);
    const outstandingLoans = data.loans.filter(l => l.status !== "Paid").reduce((s, r) => s + Number(r.balance || 0), 0);
    const totalExpenses = data.expenses.reduce((s, r) => s + Number(r.amount || 0), 0);
    const otherIncome = data.otherIncome.reduce((s, r) => s + Number(r.amount || 0), 0);
    const welfareContributions = data.welfare.reduce((s, r) => s + Number(r.contribution || 0), 0);
    const welfareWithdrawn = (data.welfareWithdrawals || []).reduce((s, r) => s + Number(r.amount || 0), 0);
    const welfare = welfareContributions - welfareWithdrawn;
    const totalInvested = data.investments.reduce((s, r) => s + Number(r.poolAmount || 0), 0);
    const expectedReturns = data.investments.reduce((s, r) => s + Number(r.expectedReturn || 0), 0);
    const actualReturns = data.investments.reduce((s, r) => s + Number(r.actualReturn || 0), 0);
    const principalRecovered = data.investments.reduce((s, r) => s + Number(r.principalRecovered || 0), 0);
    const penaltyIncome = data.loans.reduce((s, r) => s + Number(r.penaltyAmount || 0), 0);
    const totalIncome = totalLoanInterest + actualReturns + otherIncome + penaltyIncome;
    const netProfit = totalIncome - totalExpenses;
    const reserveFund = netProfit * RESERVE_FUND_PCT;
    const adminFees = netProfit * ADMIN_FEE_PCT;
    const shareableProfit = netProfit * SHAREABLE_PCT;
    // Total shares in circulation = all purchased shares (transfers just move between members, net = 0)
    const totalShares = (data.shareCapital || []).filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.shares || 0), 0);
    const totalShareCapital = (data.shareCapital || []).filter(e => e.type === "Purchase").reduce((s, e) => s + Number(e.amountPaid || 0), 0);
    const dividendPerShare = totalShares > 0 ? shareableProfit / totalShares : 0;
    // Cash position split:
    // DEPLOYABLE FUND: funds the company can freely lend or invest
    //   IN:  share capital + other income + loan interest received + actual investment returns + principal recovered
    //   OUT: outstanding loan balances still owed + active investments still deployed + total expenses paid
    // MEMBERS' SAVINGS: a liability — belongs to members, can be withdrawn at any time. NOT deployable.
    const loanRepayments = data.loans.reduce((s, l) => s + Number(l.amountPaid || 0), 0);
    const activeInvestmentsDeployed = data.investments.filter(i => i.status === "Active").reduce((s, i) => s + Number(i.poolAmount || 0), 0);
    // Loan principal repayments NOT added separately — outstandingLoans already reflects net principal balances.
    // Loan INTEREST is now included (+totalLoanInterest) as it is real earned cash returned to the fund.
    // totalInvested (ALL principal ever deployed) is subtracted, then principalRecovered is added back.
    // This correctly handles both active and matured investments without double-counting.
    const deployableFund = totalShareCapital + otherIncome + totalLoanInterest + actualReturns + principalRecovered - outstandingLoans - totalInvested - totalExpenses;
    // Keep netCash for backward compat (full picture incl. savings) — used in reports reconciliation only
    const netCash = deployableFund + netSavings;
    return {
      totalSavings, totalLoans, totalLoanInterest, totalLoanInterestAccrued, outstandingLoans,
      totalExpenses, otherIncome, welfare, welfareContributions, welfareWithdrawn, totalInvested, expectedReturns,
      actualReturns, principalRecovered, penaltyIncome, totalIncome, netProfit,
      reserveFund, adminFees, shareableProfit, totalShares, dividendPerShare,
      deployableFund, netCash, totalInvested, totalMembers: data.members.length,
      totalInvestmentValue: data.investments.reduce((s, r) => s + Number(r.currentValue || 0), 0),
      totalWithdrawals, netSavings, totalShareCapital, loanRepayments,
      pendingDeposits: (data.mobileDeposits || []).filter(d => d.status === "Pending").length,
      pendingLoanApps: (data.loanApplications || []).filter(a => a.status === "Pending").length,
    };
  })();

  if (!authChecked || !loaded) return (
    <div style={styles.splash}>
      <div style={styles.splashInner}>

  if (!currentUser) return <LoginScreen onLogin={setCurrentUser} onMustChangePassword={setMustChangeAdminPassword} users={data.users} announcements={data.announcements} />;

  // ── Forced password change for admin on first login ───────────────────────
  if (mustChangeAdminPassword && currentUser.id === "U001") {
    return <ForcePasswordChange

            const el = e.currentTarget;
            if (el.scrollTop > 0) return; // only trigger at top of scroll
            pullRef.current = { startY: e.touches[0].clientY, pulling: true };
          }}
          onTouchMove={e => {
            if (!pullRef.current.pulling) return;
            const el = e.currentTarget;
            if (el.scrollTop > 2) { pullRef.current.pulling = false; setPullState({ pulling: false, refreshing: false, distance: 0 }); return; }
            const dist = Math.max(0, Math.min(90, e.touches[0].clientY - pullRef.current.startY));
            if (dist > 5) setPullState(s => ({ ...s, pulling: true, distance: dist }));
          }}
          onTouchEnd={() => {
            if (!pullRef.current.pulling) return;
            pullRef.current.pulling = false;
            if (pullState.distance >= 65) {
              doRefresh();
            } else {
              setPullState({ pulling: false, refreshing: false, distance: 0 });
            }
          }}
        >
          {/* Pull-to-refresh indicator */}
          {(pullState.pulling || pullState.refreshing) && (

              position: "sticky", top: 0, left: 0, right: 0, zIndex: 99,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 10,
              height: pullState.refreshing ? 56 : Math.max(0, pullState.distance * 0.7),
              overflow: "hidden", background: "linear-gradient(to bottom, #0f172a, transparent)",
              transition: pullState.refreshing ? "height 0.2s" : "none",
              pointerEvents: "none",
            }}>
              <div style={{
                display: "flex", alignItems: "center", gap: 8,
                opacity: Math.min(1, pullState.distance / 50),

                transition: pullState.refreshing ? "opacity 0.2s" : "none",

// Persist dismissed alert IDs in localStorage so they survive refresh
const DISMISSED_KEY = "acujus:dismissedAlerts";
function loadDismissed() {
  try { const v = localStorage.getItem(DISMISSED_KEY); return v ? JSON.parse(v) : []; }
  catch { return []; }
}
function saveDismissed(ids) {
  try { localStorage.setItem(DISMISSED_KEY, JSON.stringify(ids)); } catch {}
}

// Build a stable ID for each auto-generated alert
function makeAlertId(type, ref) { return `${type}::${ref}`; }

// Generate alerts from live data
function buildAlerts(data) {
  const alerts = [];
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);

  // 1. Pending mobile deposits
  (data.mobileDeposits || []).filter(d => d.status === "Pending").forEach(d => {
    alerts.push({
      id: makeAlertId("deposit", d.id || d.networkRef || d.date),
      type: "deposit",
      priority: "high",
      icon: "📲",
      title: "Mobile Deposit Awaiting Approval",
      body: `${d.memberName || d.memberId} · ${fmt(d.amount)} · ${d.date}`,
      tab: "mobileDeposits",
      color: "#f59e0b",
      bg: "#2d1b00",
      border: "#92400e",
    });
  });

  // 2. Pending loan applications
  (data.loanApplications || []).filter(a => a.status === "Pending").forEach(a => {
    alerts.push({
      id: makeAlertId("loanapp", a.id || a.memberId + a.date),
      type: "loanapp",
      priority: "high",
      icon: "✎",
      title: "Loan Application Pending Review",
      body: `${a.memberName || a.memberId} · ${fmt(a.amount || a.loanAmount)} · ${a.date}`,
      tab: "loanApplications",
      color: "#fb923c",
      bg: "#2d1200",
      border: "#92400e",
    });
  });

  // 3. Overdue loans (dueDate < today, not Paid)
  (data.loans || []).filter(l => l.status !== "Paid" && l.dueDate && l.dueDate < todayStr).forEach(l => {
    const daysLate = Math.floor((now - new Date(l.dueDate)) / 86400000);
    alerts.push({
      id: makeAlertId("overloan", l.loanId),
      type: "overloan",
      priority: "critical",
      icon: "⚠️",
      title: "Overdue Loan",
      body: `${l.memberName || l.memberId} · ${l.loanId} · ${daysLate}d overdue · Balance ${fmt(l.balance)}`,
      tab: "loans",
      color: "#ef4444",
      bg: "#450a0a",
      border: "#991b1b",
    });
  });

  // 4. Investments maturing within 7 days or already matured (still Active)
  (data.investments || []).filter(i => i.status === "Active" && i.maturityDate).forEach(inv => {
    const daysLeft = Math.floor((new Date(inv.maturityDate) - now) / 86400000);
    if (daysLeft <= 7) {
      const overdue = daysLeft < 0;
      alerts.push({
        id: makeAlertId("invest", inv.id || inv.name + inv.maturityDate),
        type: "invest",
        priority: overdue ? "critical" : "medium",
        icon: overdue ? "🔴" : "🟡",
        title: overdue ? "Investment Matured — Action Required" : `Investment Maturing in ${daysLeft}d`,
        body: `${inv.name || inv.id} · ${fmt(inv.poolAmount)} · Due ${inv.maturityDate}`,
        tab: "investments",
        color: overdue ? "#ef4444" : "#eab308",
        bg: overdue ? "#450a0a" : "#2d2200",
        border: overdue ? "#991b1b" : "#854d0e",
      });
    }
  });

  // Sort: critical first, then high, then medium
  const order = { critical: 0, high: 1, medium: 2 };
  alerts.sort((a, b) => (order[a.priority] ?? 9) - (order[b.priority] ?? 9));
  return alerts;
}

          <button onClick={onNavigate} style={{ background: alert.color + "22", color: alert.color, border: `1px solid ${alert.color}44`, borderRadius: 5, padding: "4px 11px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>

const ANNC_COLORS = {
  Announcement: { bg: "#1e3a5f", border: "#3b82f6", badge: "#3b82f6", icon: "📢" },
  Promotion:    { bg: "#1a2e1a", border: "#22c55e", badge: "#22c55e", icon: "🎉" },

// ─── Announcement Bar ─────────────────────────────────────────────────────────
// Shows ALL active announcements simultaneously as cards/ticker.
// Each item can have: message (text), mediaType ("image"|"video"|"youtube"|null),
//   mediaData (base64 or youtube URL), and type (Announcement/Promotion/Advert).
//
// BUG FIX: previously only showed ONE item at a time (rotating idx).
//           Now all active items are shown in a horizontal carousel + full card view.

function AnnouncementBar({ announcements, currentUser, persist, insidePanel }) {
  const active = (announcements || []).filter(a => a.active !== false);
  const [idx, setIdx] = useState(0);
  const [editing, setEditing] = useState(false);
  const [expanded, setExpanded] = useState(null); // id of expanded media item

  // Auto-advance carousel every 6s when there are multiple items
  useEffect(() => {
    if (active.length <= 1) { setIdx(0); return; }
    const t = setInterval(() => setIdx(i => (i + 1) % active.length), 6000);
    return () => clearInterval(t);
  }, [active.length]);

  // Clamp idx in case items get deleted
  const safeIdx = active.length > 0 ? idx % active.length : 0;

  if (active.length === 0 && currentUser?.role !== "Admin") return null;

  const item = active.length > 0 ? active[safeIdx] : null;
  const cfg  = item ? (ANNC_COLORS[item.type] || ANNC_COLORS.Announcement) : ANNC_COLORS.Announcement;

  const hasMedia = item && (item.mediaType === "image" || item.mediaType === "video" || item.mediaType === "youtube");

  const goNext = () => setIdx(i => (i + 1) % active.length);
  const goPrev = () => setIdx(i => (i - 1 + active.length) % active.length);

  return (
    <div style={{ position: "relative" }}>
      <style>{`
        @keyframes acj-scroll {
          0%   { transform: translateX(0); }
          100% { transform: translateX(-50%); }
        }
        .acj-ticker-inner {
          display: inline-flex;
          white-space: nowrap;
          animation: acj-scroll 60s linear infinite;
        }
        .acj-ticker-wrap:hover .acj-ticker-inner {
          animation-play-state: paused;
        }
        .acj-card-enter { animation: acj-fade 0.35s ease; }
        @keyframes acj-fade { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
      `}</style>

      {active.length > 0 && item && (
        <div style={{ background: cfg.bg, borderBottom: `2px solid ${cfg.border}` }}>

          {/* ── Top strip: type badge + scrolling ticker text + nav ── */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, padding: insidePanel ? "12px 18px" : "7px 12px", minHeight: insidePanel ? 52 : 36 }}>
            {/* Type badge */}
            <span style={{ background: cfg.badge, color: "#fff", fontSize: insidePanel ? 12 : 10, fontWeight: 800, borderRadius: 4, padding: insidePanel ? "4px 10px" : "2px 7px", whiteSpace: "nowrap", letterSpacing: 0.5, flexShrink: 0 }}>
              {cfg.icon} {item.type?.toUpperCase()}
            </span>

            {/* Scrolling ticker — duplicated text for seamless loop */}
            <div className="acj-ticker-wrap" style={{ flex: 1, overflow: "hidden", cursor: "default" }} title="Hover to pause">
              <span className="acj-ticker-inner" style={{ fontSize: insidePanel ? 15 : 13, color: "#f1f5f9", fontWeight: 500, gap: "60px" }}>
                {/* Duplicate the text so the loop is seamless */}
                <span>{item.message}&nbsp;&nbsp;&nbsp;★&nbsp;&nbsp;&nbsp;</span>
                <span>{item.message}&nbsp;&nbsp;&nbsp;★&nbsp;&nbsp;&nbsp;</span>
              </span>
            </div>

            {/* If item has media, show expand button */}
            {hasMedia && (
              <button onClick={() => setExpanded(expanded === item.id ? null : item.id)}
                style={{ background: cfg.badge + "33", color: cfg.badge, border: `1px solid ${cfg.badge}66`, borderRadius: 5, padding: "2px 9px", fontSize: 11, cursor: "pointer", fontWeight: 700, flexShrink: 0, whiteSpace: "nowrap" }}>
                {expanded === item.id ? "▲ Hide" : (item.mediaType === "video" || item.mediaType === "youtube" ? "▶ Play" : "🖼 View")}
              </button>
            )}

            {/* Dot nav */}
            {active.length > 1 && (
              <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                <button onClick={goPrev} style={{ background: "none", border: "none", color: "#94a3b8", fontSize: 14, cursor: "pointer", padding: "0 2px", lineHeight: 1 }}>‹</button>
                {active.map((_, i) => (
                  <button key={i} onClick={() => setIdx(i)} style={{ width: 7, height: 7, borderRadius: "50%", border: "none", cursor: "pointer", padding: 0, background: i === safeIdx ? cfg.badge : "#334155", transition: "background .3s" }} />
                ))}
                <button onClick={goNext} style={{ background: "none", border: "none", color: "#94a3b8", fontSize: 14, cursor: "pointer", padding: "0 2px", lineHeight: 1 }}>›</button>
                <span style={{ fontSize: 10, color: "#475569", marginLeft: 2 }}>{safeIdx + 1}/{active.length}</span>
              </div>
            )}

            {/* Admin manage button — only shown when NOT inside the dedicated panel */}
            {currentUser?.role === "Admin" && !insidePanel && (
              <button onClick={() => setEditing(true)} style={{ background: "none", border: "1px solid #334155", color: "#94a3b8", borderRadius: 5, padding: "2px 8px", fontSize: 11, cursor: "pointer", flexShrink: 0 }}>✎ Manage</button>
            )}
          </div>

          {/* ── Expanded media panel ── */}
          {expanded === item.id && hasMedia && (
            <div className="acj-card-enter" style={{ borderTop: `1px solid ${cfg.border}44`, padding: "10px 14px", display: "flex", justifyContent: "center", background: cfg.bg + "cc" }}>
              {item.mediaType === "image" && item.mediaData && (
                <img src={item.mediaData} alt={item.message}
                  style={{ maxHeight: 280, maxWidth: "100%", borderRadius: 8, objectFit: "contain", boxShadow: "0 4px 24px rgba(0,0,0,.5)" }} />
              )}
              {item.mediaType === "video" && item.mediaData && (
                <video controls autoPlay style={{ maxHeight: 300, maxWidth: "100%", borderRadius: 8, boxShadow: "0 4px 24px rgba(0,0,0,.5)" }}>
                  <source src={item.mediaData} />
                  Your browser does not support video playback.
                </video>
              )}
              {item.mediaType === "youtube" && item.mediaData && (
                <iframe
                  src={(() => {
                    // Accept full URL or just the video ID
                    const u = item.mediaData.trim();
                    const m = u.match(/(?:v=|youtu\.be\/|embed\/)([A-Za-z0-9_-]{11})/);
                    const vid = m ? m[1] : u;
                    return `https://www.youtube.com/embed/${vid}?autoplay=1`;
                  })()}
                  title={item.message}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen
                  style={{ width: "100%", maxWidth: 640, height: 300, border: "none", borderRadius: 8, boxShadow: "0 4px 24px rgba(0,0,0,.5)" }}
                />
              )}
            </div>
          )}
        </div>
      )}

      {active.length === 0 && currentUser?.role === "Admin" && (
        <div style={{ background: "#0f172a", borderBottom: "1px dashed #1e293b", display: "flex", alignItems: "center", gap: 10, padding: "6px 16px" }}>
          <span style={{ fontSize: 12, color: "#475569", flex: 1 }}>No active announcements — add one to display a ticker bar to all users.</span>
          <button onClick={() => setEditing(true)} style={{ background: "#1e293b", border: "1px solid #334155", color: "#94a3b8", borderRadius: 5, padding: "3px 10px", fontSize: 11, cursor: "pointer" }}>+ Add</button>
        </div>
      )}

      {editing && !insidePanel && <AnnouncementManager announcements={announcements} persist={persist} onClose={() => setEditing(false)} />}
    </div>
  );
}
